function CreateEventView(){
  const [f,setF]=useState({
    name:"",sport:"Baseball",state:"FL",city:"",
    startDate:"",endDate:"",entryDeadline:"",stature:"Double State Qualifier",
    format:"Double Elimination",minGames:3,maxEntries:16,director:"",
    lodgingDirector:"",lwc:"open",divisions:[],
    quickDetails:"",advancedDesc:"",hotelInfo:"",
    alertEnabled:false,alertMsg:"",
    streamEnabled:false,streamURL:"",rainoutEmbed:"",
    entryFeeAmt:"",entryFeePublic:"",teamEntryOption:"online_only",
    gateFeeAmt:"",gateFeePublic:"",
    otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",
    refundPolicy:""
  });
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleDiv=d=>setF(p=>({...p,divisions:p.divisions.includes(d)?p.divisions.filter(x=>x!==d):[...p.divisions,d]}));

  function handleCreate(){
    if(!f.name.trim()){alert("Event Name is required.");return;}
    if(!f.startDate){alert("Start Date is required.");return;}
    if(!f.director.trim()){alert("Event Director is required.");return;}
    const newEvent={
      id:Date.now(),
      evid:String(Math.floor(410000+Math.random()*20000)),
      name:f.name.trim(),
      loc:`${f.city}, ${f.state}`,
      state:f.state, city:f.city,
      date:new Date(f.startDate).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),
      endDate:f.endDate, entryDeadline:f.entryDeadline, sport:f.sport, sanctionState:f.sanctionState,
      status:"upcoming", stature:f.stature, format:f.format, minGames:f.minGames, maxEntries:f.maxEntries, director:f.director.trim(),
      lodgingDirector:f.lodgingDirector, lwc:f.lwc,
      quickDetails:f.quickDetails, advancedDesc:f.advancedDesc, hotelInfo:f.hotelInfo,
      alertEnabled:f.alertEnabled, alertMsg:f.alertMsg,
      streamEnabled:f.streamEnabled, streamURL:f.streamURL, rainoutEmbed:f.rainoutEmbed,
      entryFeeAmt:f.entryFeeAmt, entryFeePublic:f.entryFeePublic, teamEntryOption:f.teamEntryOption,
      gateFeeAmt:f.gateFeeAmt, gateFeePublic:f.gateFeePublic,
      otherFeeAmt:f.otherFeeAmt, otherFeePublic:f.otherFeePublic, otherFeeDesc:f.otherFeeDesc,
      refundPolicy:f.refundPolicy,
      parks:[],
      divisions:f.divisions.map((d,i)=>({id:Date.now()+i,code:d.replace(/\s+/g,""),label:d,wl:"0-0-0",teams:0,flights:[]}))
    };
    dbSave('events',newEvent);
    alert(`Event "${newEvent.name}" created! Event ID: ${newEvent.evid}`);
    setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false,entryFeeAmt:"",entryFeePublic:"",gateFeeAmt:"",gateFeePublic:"",otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",refundPolicy:""}));
  }

  const inputStyle={width:"100%",padding:"7px 10px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13};
  const labelStyle={display:"block",fontWeight:600,fontSize:12,color:"#4a5568",marginBottom:4,textTransform:"uppercase",letterSpacing:.5};
  const fieldWrap={display:"flex",flexDirection:"column"};
  const grid2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:16};
  const grid3={display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16};
  const toggleRow={display:"flex",alignItems:"center",gap:10,padding:"6px 0"};

  return(
    <div style={{maxWidth:900}}>
      <div className="card">
        <div className="card-hd"><span className="card-title">➕ Create New Event</span></div>
        <div className="card-body">

          <SectionHead title="Event Information"/>
          <div style={grid2}>
            <div style={{...fieldWrap,gridColumn:"1/-1"}}><label style={labelStyle}>Event Name *</label><input style={inputStyle} value={f.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Spring State Qualifier"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Sport</label>
              <select style={inputStyle} value={f.sport} onChange={e=>set("sport",e.target.value)}>
                <option>Baseball</option><option>Softball</option><option>Soccer</option>
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Stature</label>
              <select style={inputStyle} value={f.stature} onChange={e=>set("stature",e.target.value)}>
                {STATURES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Event Format</label>
              <select style={inputStyle} value={f.format} onChange={e=>set("format",e.target.value)}>
                {EVENT_FORMATS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Start Date *</label><input style={inputStyle} type="date" value={f.startDate} onChange={e=>set("startDate",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>End Date</label><input style={inputStyle} type="date" value={f.endDate} onChange={e=>set("endDate",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>Entry Deadline</label><input style={inputStyle} type="date" value={f.entryDeadline} onChange={e=>set("entryDeadline",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>City / Location *</label><input style={inputStyle} value={f.city} onChange={e=>set("city",e.target.value)} placeholder="City"/></div>
            <div style={fieldWrap}><label style={labelStyle}>State *</label>
              <select style={inputStyle} value={f.state} onChange={e=>set("state",e.target.value)}>
                {ALL_STATES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Entry Policy</label>
              <select style={inputStyle} value={f.lwc} onChange={e=>set("lwc",e.target.value)}>
                {LWC_OPTIONS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Minimum Number of Games</label>
              <select style={inputStyle} value={f.minGames} onChange={e=>set("minGames",Number(e.target.value))}>
                {[2,3,4,5,6,7,8].map(n=><option key={n} value={n}>{n} Games</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Maximum Entries per Division</label>
              <select style={inputStyle} value={f.maxEntries} onChange={e=>set("maxEntries",Number(e.target.value))}>
                {[3,4,5,6,7,8,9,10,12,14,16,18,20,24,28,32,40,48,56,64].map(n=><option key={n} value={n}>{n} Teams</option>)}
              </select>
            </div>
          </div>

          <SectionHead title="Directors"/>
          <div style={grid2}>
            <div style={fieldWrap}><label style={labelStyle}>Event Director *</label><input style={inputStyle} value={f.director} onChange={e=>set("director",e.target.value)} placeholder="Director full name"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Lodging Director</label><input style={inputStyle} value={f.lodgingDirector} onChange={e=>set("lodgingDirector",e.target.value)} placeholder="Lodging contact (optional)"/></div>
          </div>

          <SectionHead title="Age Divisions"/>
          <div style={{overflowX:"auto",marginBottom:8}}>
            <table style={{borderCollapse:"collapse",fontSize:13,width:"auto"}}>
              <thead>
                <tr>
                  <th style={{padding:"6px 14px",background:"#1a3a5c",color:"#fff",textAlign:"left",borderRadius:"4px 0 0 0",fontWeight:700,fontSize:12,letterSpacing:.5}}>Age</th>
                  {DIV_CLASSES.map(c=><th key={c} style={{padding:"6px 20px",background:"#1a3a5c",color:"#fff",textAlign:"center",fontWeight:700,fontSize:12,letterSpacing:.5,minWidth:60}}>{c}</th>)}
                </tr>
              </thead>
              <tbody>
                {AGES_WITH_CLASS.map((age,i)=>(
                  <tr key={age} style={{background:i%2===0?"#f8fafc":"#fff"}}>
                    <td style={{padding:"7px 14px",fontWeight:700,color:"#1a3a5c",borderRight:"1px solid #e2e8f0",whiteSpace:"nowrap"}}>{age}</td>
                    {DIV_CLASSES.map(cls=>{
                      const key=`${age} ${cls}`;
                      const sel=f.divisions.includes(key);
                      return(
                        <td key={cls} style={{padding:"7px 20px",textAlign:"center",border:"1px solid #e2e8f0"}}>
                          <input type="checkbox" checked={sel} onChange={()=>toggleDiv(key)}
                            style={{width:16,height:16,cursor:"pointer",accentColor:"#1a3a5c"}}/>
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {AGES_NO_CLASS.map((age,i)=>(
                  <tr key={age} style={{background:(AGES_WITH_CLASS.length+i)%2===0?"#f8fafc":"#fff"}}>
                    <td style={{padding:"7px 14px",fontWeight:700,color:"#1a3a5c",borderRight:"1px solid #e2e8f0"}}>{age}</td>
                    <td colSpan={5} style={{padding:"7px 20px",textAlign:"center",border:"1px solid #e2e8f0",color:"#888",fontSize:12}}>
                      <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                        <input type="checkbox" checked={f.divisions.includes(age)} onChange={()=>toggleDiv(age)}
                          style={{width:16,height:16,cursor:"pointer",accentColor:"#1a3a5c"}}/>
                        <span>Single Age Division</span>
                      </label>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {f.divisions.length>0&&<div style={{fontSize:12,color:"#1a3a5c",fontWeight:600,marginBottom:4}}>
            {f.divisions.length} selected: {f.divisions.join(" · ")}
          </div>}

          <SectionHead title="Event Details"/>
          <div style={{display:"grid",gap:14}}>
            <div style={fieldWrap}><label style={labelStyle}>Quick Details</label><input style={inputStyle} value={f.quickDetails} onChange={e=>set("quickDetails",e.target.value)} placeholder="Short summary shown on public event listing"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Advanced Description</label><textarea style={{...inputStyle,resize:"vertical"}} rows={4} value={f.advancedDesc} onChange={e=>set("advancedDesc",e.target.value)} placeholder="Full event description, rules, special notes..."/></div>
            <div style={fieldWrap}><label style={labelStyle}>Hotel Information</label><textarea style={{...inputStyle,resize:"vertical"}} rows={3} value={f.hotelInfo} onChange={e=>set("hotelInfo",e.target.value)} placeholder="Hotel partner info, discount codes, booking links..."/></div>
          </div>

          <SectionHead title="Fees & Payments"/>
          <div style={{display:"grid",gap:16,marginBottom:8}}>
            <div style={grid3}>
              <div style={fieldWrap}>
                <label style={{...labelStyle,color:"#c0392b"}}>Entry Fee Amount *</label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:15,color:"#4a5568"}}>$</span>
                  <input style={inputStyle} type="number" min="0" step="0.01" value={f.entryFeeAmt} onChange={e=>set("entryFeeAmt",e.target.value)} placeholder="0.00"/>
                </div>
              </div>
              <div style={fieldWrap}>
                <label style={{...labelStyle,color:"#c0392b"}}>Entry Fees Displayed to Public *</label>
                <input style={inputStyle} value={f.entryFeePublic} onChange={e=>set("entryFeePublic",e.target.value)} placeholder='e.g. "$395 per team"'/>
              </div>
              <div style={fieldWrap}>
                <label style={{...labelStyle,color:"#c0392b"}}>Team Entry Options *</label>
                <select style={inputStyle} value={f.teamEntryOption} onChange={e=>set("teamEntryOption",e.target.value)}>
                  <option value="cc_only">Allow credit card entries only</option>
                  <option value="with_or_without">Allow entries with or without payment</option>
                </select>
              </div>
            </div>
            <div style={grid3}>
              <div style={fieldWrap}>
                <label style={labelStyle}>Gate Fee Amount <span style={{color:"#888",fontWeight:400}}>(Optional)</span></label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:15,color:"#4a5568"}}>$</span>
                  <input style={inputStyle} type="number" min="0" step="0.01" value={f.gateFeeAmt} onChange={e=>set("gateFeeAmt",e.target.value)} placeholder="0.00"/>
                </div>
              </div>
              <div style={fieldWrap}>
                <label style={labelStyle}>Gate Fees Displayed to Public</label>
                <input style={inputStyle} value={f.gateFeePublic} onChange={e=>set("gateFeePublic",e.target.value)} placeholder='e.g. "$5 adults, kids free"'/>
              </div>
            </div>
            <div style={grid3}>
              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fee Amount <span style={{color:"#888",fontWeight:400}}>(Optional)</span></label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:15,color:"#4a5568"}}>$</span>
                  <input style={inputStyle} type="number" min="0" step="0.01" value={f.otherFeeAmt} onChange={e=>set("otherFeeAmt",e.target.value)} placeholder="0.00"/>
                </div>
              </div>
              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fees Displayed to Public</label>
                <input style={inputStyle} value={f.otherFeePublic} onChange={e=>set("otherFeePublic",e.target.value)} placeholder="Public description of other fee"/>
              </div>
              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fee Description <span style={{color:"#888",fontWeight:400}}>(Optional)</span></label>
                <input style={inputStyle} value={f.otherFeeDesc} onChange={e=>set("otherFeeDesc",e.target.value)} placeholder="Internal note on other fee"/>
              </div>
            </div>
            <div style={fieldWrap}>
              <label style={{...labelStyle,color:"#c0392b"}}>Refund Policy Notes *</label>
              <textarea style={{...inputStyle,resize:"vertical"}} rows={3} value={f.refundPolicy} onChange={e=>set("refundPolicy",e.target.value)} placeholder="Describe your refund policy for teams..."/>
            </div>
          </div>

          <SectionHead title="Alerts & Features"/>
          <div style={{display:"grid",gap:12}}>
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.alertEnabled} onChange={e=>set("alertEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Alert Message</span>
            </label>
            {f.alertEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.alertMsg} onChange={e=>set("alertMsg",e.target.value)} placeholder="Alert message shown to teams on this event..."/></div>}
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.streamEnabled} onChange={e=>set("streamEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Live Streaming</span>
            </label>
            {f.streamEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.streamURL} onChange={e=>set("streamURL",e.target.value)} placeholder="Live stream URL..."/></div>}
            <div style={fieldWrap}><label style={labelStyle}>Rainout Line Embed</label><input style={inputStyle} value={f.rainoutEmbed} onChange={e=>set("rainoutEmbed",e.target.value)} placeholder="Rainout line embed code or URL"/></div>
          </div>

          <div style={{marginTop:28,display:"flex",gap:12}}>
            <button className="btn btn-primary" onClick={handleCreate}>✓ Create Event</button>
            <button className="btn btn-secondary" onClick={()=>setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false,entryFeeAmt:"",entryFeePublic:"",gateFeeAmt:"",gateFeePublic:"",otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",refundPolicy:""}))}>✕ Clear Form</button>
          </div>

        </div>
      </div>
    </div>
  );
}

function ShortcutHint({id}){
  const labels={"s-game-mgr":["🗂","Game Manager","View/edit game assignments, swap teams, enter scores. Access via: Events → Event → Division → Pool Flight → Game Manager tab."],"s-grid":["🗺","Grid Builder","Plan which divisions play on which fields at each time slot across all your parks. The division assignment layer before scheduling. Access via: Scheduling Tools → Grid Builder."],"s-layout":["📋","Schedule Builder","Build matchups, assign games to time slots and fields, import from Excel. Access via: Events → Event → Division → Pool Flight → Schedule Builder tab."],"s-bracket":["🏆","Brackets","Single/double elimination bracket management. Access via: Events → Event → Division → Bracket Flight → Bracket tab."],"s-standings":["📊","Pool Standings","Real-time W/L/T, PF/PA, run differential. Access via: Events → Event → Division → Pool Flight → Standings tab."],"s-seeds":["🎯","Seeding","USSSA Points + Power Rating seeding table. Access via: Events → Event → Division → Flight → Seeds tab."],"s-parks":["🏟","Parks & Fields","Select and assign tournament parks. Access via: Events → Event → Division → Flight → Parks tab."],"s-umpires":["🟡","Umpires","Assign certified umpires to games. Access via: Events → Event → Division → Flight → Umpires tab."],"s-pitching":["⚾","Pitching Tracker","Pitch counts and rest requirements by age group. Access via: Events → Event → Division → Pool Flight → Pitching tab."],"s-ppmatrix":["🔢","Pool Matrix","Serpentine seeding matrix calculator. Access via: Events → Event → Division → Flight → PP Matrix tab."],"s-placing":["🥇","Final Placing","Division champion and runner-up display. Access via: Events → Event → Division → Bracket Flight → Placing tab."],"s-rosters":["👥","Rosters","Team rosters for any division. Access via: Events → Event → Division → Flight → Contact tab."],"s-livelock":["🔒","Live & Lock Settings","Control public visibility and lock events. Access via: Events → Event → Division → Flight → Live & Lock tab."],"s-public":["👁","Public Fan View","Toggle any event to Public Fan View mode using the view toggle in the event detail page."]};
  const info=labels[id];
  if(!info)return null;
  const [ico,title,desc]=info;
  return(
    <div className="card">
      <div className="card-body" style={{textAlign:"center",padding:"50px 28px"}}>
        <div style={{fontSize:48,marginBottom:10}}>{ico}</div>

        </div>
      </div>
    </div>
  );
}

/* ════════════════════ APP ROOT ════════════════════ */
function App(){
  const [view,setView]=useState("events");
  const [selEv,setSelEv]=useState(null);
  const [events,setEvents]=useState(EVENTS_DB);
  const [allGames,setAllGames]=useState([...PG8,...PG9,...PG12]);
  const [allBracketGames,setAllBracketGames]=useState([...BG8,...BG9]);
  const [evRosters,setEvRosters]=useState({});
  const [schedCtx,setSchedCtx]=useState(null);
  const [dbStatus,setDbStatus]=useState('connecting');
  const [liveDiv,setLiveDiv]=useState({status:'idle',updatedAt:null});
  useEffect(()=>{
    (async()=>{
      const rows=await dbLoad('events');
      if(rows&&rows.length>0){
        const merged=[...EVENTS_DB];
        rows.forEach(r=>{
          if(!merged.find(e=>String(e.id)===String(r.id)))
            merged.push({...r,divisions:r.divisions||[]});
        });
        setEvents(merged);
        setDbStatus('connected');
      }else{
        setDbStatus(rows!==null?'connected':'offline');
      }
    })();
  },[]);
  useEffect(()=>{
    setLiveDiv({status:'loading',updatedAt:null});
    fetch('https://usssa-poller.chad-157.workers.dev/divisions')
      .then(r=>r.json())
      .then(data=>{
        if(data.status==='ok'&&data.divisions){
          setEvents(prev=>prev.map(ev=>{
            const live=data.divisions[String(ev.id)];
            if(live&&live.length>0)return{...ev,divisions:live};
            return ev;
          }));
          setLiveDiv({status:'loaded',updatedAt:data.updatedAt,source:data.source});
        }else{
          setLiveDiv({status:'error',updatedAt:null});
        }
      })
      .catch(()=>setLiveDiv({status:'error',updatedAt:null}));
  },[]);
  function nav(id){setView(id);if(id==="events")setSelEv(null)}
  function selectEvent(ev){setSelEv(ev);setView("event-detail")}
  function handleSchedule(ctx){setSchedCtx(ctx);nav("s-layout");}
  const title=()=>{
    if(view==="event-detail"&&selEv)return selEv.name;
    if(view==="create")return "Create New Event";
    return NAV.flatMap(s=>s.items).find(i=>i.id===view)?.label||"USSSA Tournament Manager";
  };
  const sub=()=>view==="event-detail"&&selEv?`${selEv.loc} · ${selEv.date}`:null;
  return(
    <div className="app">
      <nav className="sidebar">
        <div className="sb-logo">
          <div className="brand">USSSA</div>
          <div className="sub">Tournament Manager</div>
        </div>
        {NAV.map(s=>(
          <div key={s.sec} className="sb-sec">
            <div className="sb-lbl">{s.sec}</div>
            {s.items.map(item=>(
              <div key={item.id}
                className={`sb-item ${view===item.id||(item.id==="events"&&view==="event-detail")?"active":""}`}
                onClick={()=>nav(item.id)}>
                <span className="ico">{item.ico}</span>{item.label}
              </div>
            ))}
          </div>
        ))}
        <div className="sb-user">
          <div style={{fontSize:10,color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:.8}}>Signed in as</div>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",marginTop:2}}>Steve Hassett</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>steve@utproducts.com</div>
        </div>
      </nav>
      <main className="main">
        <div className="topbar">
          <div>
            <div className="tb-title">{title()}</div>
            {sub()&&<div className="tb-sub">{sub()}</div>}
          </div>
          <div className="tb-right">
            <span className={`badge ${dbStatus==='connected'?'b-green':dbStatus==='connecting'?'b-gold':'b-red'}`} style={{fontSize:10}}>{dbStatus==='connected'?'● DB Connected':dbStatus==='connecting'?'◌ Connecting...':'○ Offline (Demo)'}</span>
            {liveDiv.status==='loading'&&<span className="badge b-gold" style={{fontSize:10}}>⟳ Divisions loading…</span>}
            {liveDiv.status==='loaded'&&<span className="badge b-green" title={`Source: ${liveDiv.source} · Updated: ${new Date(liveDiv.updatedAt).toLocaleTimeString()}`} style={{fontSize:10}}>● Divisions live</span>}
            {liveDiv.status==='error'&&<span className="badge b-red" style={{fontSize:10}}>○ Divisions offline</span>}
            <span className="badge b-gray" style={{fontSize:10}}>2026 Season</span>
            {view!=="create"&&<button className="btn btn-primary btn-sm" onClick={()=>nav("create")}>+ New Event</button>}
          </div>
        </div>
        <div className="content">
          {view==="events"&&<Dashboard events={events} onSelect={selectEvent} onNav={nav}/>}
          {view==="event-detail"&&selEv&&<EventDetailView ev={selEv} onBack={()=>nav("events")} onNav={nav} evRosters={evRosters} setEvRosters={setEvRosters} onSchedule={handleSchedule}/>}
          {view==="create"&&<CreateEventView/>}
          {view==="s-game-mgr"&&<GameMgrView games={allGames} setGames={setAllGames} teams={ALL_TEAMS}/>}
          {view==="s-grid"&&<GridBuilderView/>}
          {view==="s-layout"&&<LayoutView games={allGames} setGames={setAllGames} teams={ALL_TEAMS} schedCtx={schedCtx} setSchedCtx={setSchedCtx}/>}
          {view==="s-bracket"&&<BracketView bGames={allBracketGames} setBGames={setAllBracketGames} teams={ALL_TEAMS} games={allGames} editable={true}/>}
          {view==="s-standings"&&<StandingsView teams={ALL_TEAMS} games={allGames}/>}
          {view==="s-seeds"&&<SeedsView teams={ALL_TEAMS}/>}
          {view==="s-parks"&&<ParksView eventParks={[]}/>}
          {view==="s-umpires"&&<UmpiresView/>}
          {view==="s-pitching"&&<PitchingView teams={ALL_TEAMS} games={allGames}/>}
          {view==="s-ppmatrix"&&<PPMatrixView/>}
          {view==="s-placing"&&<PlacingView bGames={allBracketGames} teams={ALL_TEAMS}/>}
          {view==="s-livelock"&&<LiveLockView/>}
          {SHORTCUT_IDS.has(view)&&!["s-game-mgr","s-grid","s-layout","s-bracket","s-standings","s-seeds","s-parks","s-umpires","s-pitching","s-ppmatrix","s-placing","s-livelock"].includes(view)&&<ShortcutHint id={view}/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
