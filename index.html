          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>

            {/* LEFT: Grid Setup */}
            <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"14px 16px"}}>
              <div style={{fontSize:10,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Grid Setup</div>
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {/* Fields + game length row */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    ["# Fields",<select value={nf} onChange={e=>setNf(+e.target.value)} style={{...F,width:"100%"}}>{Array.from({length:50},(_,i)=><option key={i+1}>{i+1}</option>)}</select>],
                    ["Game Length",<select value={gl} onChange={e=>setGl(e.target.value)} style={{...F,width:"100%"}}><option value="60">1 hr</option><option value="75">1 hr 15 m</option><option value="90">1 hr 30 m</option><option value="105">1 hr 45 m</option><option value="120">2 hrs</option></select>],
                  ].map(([lbl,ctrl])=>(
                    <div key={lbl}>
                      <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:3}}>{lbl}</div>
                      {ctrl}
                    </div>
                  ))}
                </div>
                {/* Max pool play games per team */}
                <div style={{padding:"8px 10px",background:"#fef9ec",border:"1.5px solid #fcd34d",borderRadius:6}}>
                  <div style={{fontSize:10,fontWeight:800,color:"#92400e",marginBottom:5}}>⚠️ Pool Play Limit Per Team</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <select value={maxGames} onChange={e=>setMaxGames(+e.target.value)} style={{...F,width:60}}>
                      {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                    <span style={{fontSize:11,color:"#78350f"}}>games max per team — scheduling beyond this will be blocked</span>
                  </div>
                </div>
                {/* Dates */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[["Start Date",evtStart,setEvtStart],["End Date",evtEnd,setEvtEnd]].map(([lbl,val,setter])=>(
                    <div key={lbl}>
                      <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:3}}>{lbl}</div>
                      <input type="date" value={val} onChange={e=>setter(e.target.value)}
                        style={{...F,width:"100%",color:"#0f172a",fontWeight:600}}/>
                    </div>
                  ))}
                </div>
                {evtStart&&evtEnd&&evtEnd>=evtStart&&(
                  <div style={{fontSize:11,color:"#0284c7",fontWeight:600}}>
                    📅 {(()=>{const d=Math.round((new Date(evtEnd+'T12:00:00')-new Date(evtStart+'T12:00:00'))/(86400000))+1;return `${d} day${d!==1?"s":""}`;})()}
                  </div>
                )}
                {/* Time ranges */}
                {[["Day 1 Start → End",d1Start,setD1Start,d1End,setD1End],["All Other Days",remStart,setRemStart,remEnd,setRemEnd]].map(([lbl,s,ss,e2,se])=>(
                  <div key={lbl}>
                    <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:3}}>{lbl}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input type="time" value={s} onChange={ev=>ss(ev.target.value)} style={{...F,flex:1}}/>
                      <span style={{color:"#94a3b8",fontSize:11}}>to</span>
                      <input type="time" value={e2} onChange={ev=>se(ev.target.value)} style={{...F,flex:1}}/>
                    </div>
                  </div>
                ))}
                <button onClick={submitFieldData} style={{...B(NAVY,"#fff"),width:"100%",marginTop:4,padding:"9px",fontSize:13}}>
                  🏗 Build Grid
                </button>
              </div>
            </div>

            {/* RIGHT: Time Adjust + Quick Actions stacked */}
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* Time Adjustment */}
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"14px 16px"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Adjust Game Times</div>
                <div style={{display:"flex",flexDirection:"column",gap:9}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[
                      ["Start Row",<select value={startRow} onChange={e=>setStartRow(e.target.value)} style={{...F,width:"100%"}}>{Array.from({length:50},(_,i)=><option key={i+1}>{i+1}</option>)}</select>],
                      ["Shift",<select value={timeAct} onChange={e=>setTimeAct(e.target.value)} style={{...F,width:"100%"}}><option value="increase">+ Earlier</option><option value="decrease">− Later</option></select>],
                    ].map(([lbl,ctrl])=>(<div key={lbl}><div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:3}}>{lbl}</div>{ctrl}</div>))}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[
                      ["By (mins)",<select value={timeVar} onChange={e=>setTimeVar(e.target.value)} style={{...F,width:"100%"}}>{["5","10","15","20","30"].map(v=><option key={v} value={v}>{v} mins</option>)}</select>],
                      ["Apply To",<select value={coverage} onChange={e=>setCoverage(e.target.value)} style={{...F,width:"100%"}}><option value="day_chosen">This Day</option><option value="all_days">All Days</option></select>],
                    ].map(([lbl,ctrl])=>(<div key={lbl}><div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:3}}>{lbl}</div>{ctrl}</div>))}
                  </div>
                  <button onClick={setResetTimes} style={{...B("#dc2626","#fff"),width:"100%",marginTop:2,padding:"9px",fontSize:13}}>
                    ↕ Apply Time Shift
                  </button>
                </div>
              </div>

              {/* Quick Actions */}
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"14px 16px"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Quick Actions</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <button onClick={()=>setShowNames(v=>!v)}
                    style={{...B(showNames?NAVY:"#fff",showNames?"#fff":"#374151",{border:`1px solid ${showNames?"#1e3a5f":"#cbd5e1"}`}),width:"100%",padding:"8px",fontSize:12}}>
                    {showNames?"✓ Team Names ON":"👁 Show Team Names"}
                  </button>
                  <button onClick={()=>setShowHomeAway(v=>!v)}
                    style={{...B(showHomeAway?"#15803d":"#fff",showHomeAway?"#fff":"#374151",{border:`1px solid ${showHomeAway?"#15803d":"#cbd5e1"}`}),width:"100%",padding:"8px",fontSize:12}}>
                    {showHomeAway?"✓ Home/Away ON":"🏠 Show Home / Away"}
                  </button>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>{}} style={{...B("#1d4ed8","#fff"),padding:"8px",fontSize:11}}>🔒 Block Selected</button>
                    <button onClick={clearAllBlocked} style={{...B("#64748b","#fff"),padding:"8px",fontSize:11}}>✕ Clear Blocked</button>
                  </div>
                  <button onClick={clearGameCells} style={{...B("#d97706","#fff"),width:"100%",padding:"8px",fontSize:12}}>
                    🗑 Clear All Game Cells
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ══ Teams Panel ══ */}
      {teams&&teams.length>0&&(()=>{
        const ageNums=[...new Set(teams.map(t=>parseInt(t.cls)||0))].filter(Boolean).sort((a,b)=>a-b);
        const ageTeams=selAge?teams.filter(t=>parseInt(t.cls)===selAge):[];
        const divs=[...new Set(ageTeams.map(t=>t.cls))].sort();
        const sel1=teamPick[0]?teams.find(t=>t.id===teamPick[0]):null;
        return(
          <div className="card mb4">
            {/* Header */}
            <div className="card-hd" style={{background:"linear-gradient(135deg,#1e3a5f,#2563eb)"}}>
              <span className="card-title" style={{color:"#fff"}}>⚾ Build Matchups</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,.55)",marginLeft:8}}>Select an age group, then pick two teams to create a game</span>
            </div>

            {/* Age Group Tabs */}
            <div style={{display:"flex",gap:6,padding:"14px 16px 10px",borderBottom:"1px solid #e2e8f0",flexWrap:"wrap",background:"#f8fafc"}}>
              <span style={{fontSize:11,fontWeight:700,color:"#64748b",alignSelf:"center",marginRight:4,textTransform:"uppercase",letterSpacing:.5}}>Age:</span>
              {ageNums.map(age=>{
                const cnt=teams.filter(t=>parseInt(t.cls)===age).length;
                const isAct=selAge===age;
                return(
                  <button key={age} onClick={()=>{setSelAge(isAct?null:age);setTeamPick([]);}}
                    style={{padding:"6px 16px",borderRadius:20,border:isAct?"2px solid #2563eb":"1px solid #cbd5e1",
                      background:isAct?"#2563eb":"#fff",color:isAct?"#fff":"#374151",
                      fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s",
                      boxShadow:isAct?"0 2px 8px rgba(37,99,235,.3)":"0 1px 2px rgba(0,0,0,.06)"}}>
                    {age}U <span style={{fontWeight:400,fontSize:11,opacity:.75}}>({cnt})</span>
                  </button>
                );
              })}
            </div>

            {/* No age selected */}
            {!selAge&&(
              <div style={{padding:"28px 16px",textAlign:"center",color:"#94a3b8",fontSize:13}}>
                ↑ Pick an age group above to see teams
              </div>
            )}

            {/* Teams for selected age */}
            {selAge&&(
              <div style={{padding:"14px 16px"}}>

                {/* Drag instruction banner */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,
                  padding:"9px 14px",borderRadius:8,background:"#eff6ff",border:"1.5px dashed #93c5fd"}}>
                  <span style={{fontSize:18}}>👆</span>
                  <div style={{fontSize:12,color:"#1d4ed8",fontWeight:600,lineHeight:1.4}}>
                    <strong>Drag</strong> a team onto any open slot to start a matchup —
                    then drag a <strong>second team</strong> onto the same slot to complete it.
                  </div>
                  {halfFill&&(
                    <button onClick={()=>setHalfFill(null)}
                      style={{marginLeft:"auto",fontSize:11,padding:"3px 9px",background:"none",
                        border:"1px solid #93c5fd",borderRadius:4,cursor:"pointer",color:"#dc2626",whiteSpace:"nowrap"}}>
                      ✕ Cancel
                    </button>
                  )}
                </div>

                {/* Pool selector */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5}}>Pool:</span>
                  {["A","B","C","D","E","F","Open"].map(p=>(
                    <button key={p} onClick={()=>setGamePool(p)}
                      style={{padding:"3px 11px",borderRadius:6,border:gamePool===p?"2px solid #2563eb":"1px solid #d1d5db",
                        background:gamePool===p?"#eff6ff":"#fff",color:gamePool===p?"#1d4ed8":"#374151",
                        fontWeight:700,fontSize:12,cursor:"pointer"}}>
                      {p}
                    </button>
                  ))}
                </div>

                {/* Teams grouped by division */}
                {divs.map(cls=>(
                  <div key={cls} style={{marginBottom:12}}>
                    <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{background:"#e2e8f0",padding:"1px 7px",borderRadius:10,color:"#475569"}}>{cls}</span>
                      <span style={{fontSize:10,color:"#cbd5e1"}}>{ageTeams.filter(t=>t.cls===cls).length} teams</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                      {ageTeams.filter(t=>t.cls===cls).map((t,ti)=>{
                        const isHalf1=halfFill&&halfFill.t1Id===t.id;
                        const seed=(t.pts||0)+(t.pr||0);
                        // Count placed games for this team
                        const placedCount=rows.flatMap(r=>Object.values(r.cells))
                          .filter(v=>v&&v!=="blocked")
                          .filter(v=>{const g=games.find(g2=>g2.id===v);return g&&(g.t1===t.id||g.t2===t.id);}).length;
                        const isFull=placedCount>=maxGames;
                        return(
                          <div key={t.id}
                            draggable={isFull?"false":"true"}
                            onDragStart={e=>{
                              if(isFull){e.preventDefault();return;}
                              e.dataTransfer.setData("teamId",t.id);
                              e.dataTransfer.setData("teamCls",cls);
                              e.dataTransfer.effectAllowed="copy";
                            }}
                            title={isFull?`Fully scheduled (${placedCount}/${maxGames} games)`:`${placedCount}/${maxGames} games scheduled`}
                            style={{
                              padding:"7px 12px",borderRadius:8,userSelect:"none",
                              cursor:isFull?"not-allowed":"grab",
                              opacity:isFull?0.42:1,
                              border:isFull?"1.5px solid #e2e8f0":isHalf1?"2px solid #2563eb":"1.5px solid #e2e8f0",
                              background:isFull?"#f1f5f9":isHalf1?"#dbeafe":"#fff",
                              color:isFull?"#94a3b8":isHalf1?"#1d4ed8":"#0f172a",
                              fontSize:13,fontWeight:600,
                              boxShadow:isFull?"none":isHalf1?"0 0 0 3px rgba(37,99,235,.15)":"0 1px 3px rgba(0,0,0,.06)",
                              transition:"all .12s",display:"flex",alignItems:"center",gap:7,
                              filter:isFull?"grayscale(1)":"none"
                            }}>
                            {/* Seed rank badge */}
                            <span style={{width:20,height:20,borderRadius:"50%",
                              background:isFull?"#cbd5e1":isHalf1?"#1d4ed8":"#1e3a5f",color:"#fff",
                              fontSize:9,fontWeight:900,display:"flex",alignItems:"center",
                              justifyContent:"center",flexShrink:0}}>{ti+1}</span>
                            <span>{t.name}</span>
                            {/* Game count pill — always visible */}
                            <span style={{marginLeft:"auto",fontSize:9,fontWeight:800,
                              color:isFull?"#fff":"#475569",
                              background:isFull?"#94a3b8":"#e2e8f0",
                              borderRadius:10,padding:"1px 6px",whiteSpace:"nowrap",flexShrink:0}}>
                              {isFull?"✓ done":`${placedCount}/${maxGames}`}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* Picked-game move banner (only shows when moving a placed game via ↩ icon) */}
      {picked&&pickedGame&&(
        <div style={{background:"#eff6ff",border:"2px solid #93c5fd",borderRadius:8,padding:"10px 16px",
          marginBottom:12,display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 8px rgba(37,99,235,.1)"}}>
          <span style={{fontSize:22}}>✋</span>
          <div>
            <strong style={{color:"#1d4ed8",fontSize:13}}>Moving {pickedGame.num}</strong>
            <span style={{fontSize:12,color:"#475569",marginLeft:8}}>Click any open slot to drop it</span>
          </div>
          <button onClick={()=>setPicked(null)} style={{marginLeft:"auto",...B("#fff","#dc2626",{border:"1.5px solid #fca5a5",padding:"4px 12px"})}}>✕ Cancel</button>
        </div>
      )}

      {/* ── Drop Validation Alert ── */}
      {dropAlert&&(
        <div style={{background:"#fef2f2",border:"2px solid #fca5a5",borderRadius:8,padding:"12px 16px",
          marginBottom:12,display:"flex",alignItems:"flex-start",gap:10,boxShadow:"0 2px 8px rgba(220,38,38,.12)"}}>
          <span style={{fontSize:20,flexShrink:0}}>🚫</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,color:"#dc2626",fontSize:13,marginBottom:4}}>Scheduling Conflict</div>
            {dropAlert.map((msg,i)=>(
              <div key={i} style={{fontSize:12,color:"#7f1d1d",lineHeight:1.5}}>• {msg}</div>
            ))}
          </div>
          <button onClick={()=>setDropAlert(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16,flexShrink:0}}>✕</button>
        </div>
      )}

      {/* ══ Schedule Grid ══ */}
      <div style={{overflowX:"auto",border:"1px solid #cbd5e1",borderRadius:8,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
        <table style={{borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr>
              <th style={STH(SL[0],SW[0])}>Row</th>
              <th style={STH(SL[1],SW[1])}>Date</th>
              <th style={{...STH(SL[2],SW[2]),boxShadow:"3px 0 8px rgba(0,0,0,.18)"}}>Time</th>
              {fields.map((f,fi)=>{
                const [hBg,hBdr]=[getFC(fi)[0],getFC(fi)[1]];
                return(
                <th key={fi} style={{background:hBg,color:"#fff",padding:"7px 8px",
                  textAlign:"center",minWidth:130,borderLeft:`3px solid ${hBdr}`,verticalAlign:"middle"}}>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.6)",fontWeight:700,letterSpacing:.8,marginBottom:2,textTransform:"uppercase"}}>Field {fi+1}</div>
                  <select value={fieldNames[fi]} onChange={e=>{const n=[...fieldNames];n[fi]=e.target.value;setFieldNames(n);}}
                    style={{fontSize:12,padding:"3px 5px",borderRadius:3,border:"1px solid rgba(255,255,255,.3)",
                      background:"rgba(255,255,255,.15)",color:"#fff",width:"100%",cursor:"pointer",fontWeight:700}}>
                    {/* If the current name isn't in FIELD_OPTS (e.g. imported), add it first */}
                    {!FIELD_OPTS.includes(fieldNames[fi])&&<option key="__curr" style={{background:"#1e3a5f",color:"#fff"}}>{fieldNames[fi]}</option>}
                    {FIELD_OPTS.map(o=><option key={o} style={{background:"#1e3a5f",color:"#fff"}}>{o}</option>)}
                  </select>
                </th>
                );
              })}
              <th style={{background:NAVY,padding:"7px 6px",width:52,borderLeft:"2px solid rgba(255,255,255,.1)"}}></th>
            </tr>
          </thead>
          <tbody>
            {dayGroups.map((date,dgi)=>{
              const dayRows=rows.filter(r=>r.date===date);
              const d=new Date(date+"T12:00:00");
              const dayName=d.toLocaleDateString('en-US',{weekday:'long'});
              const mo=d.getMonth()+1,dd2=d.getDate(),yr=d.getFullYear();
              const dispDate=`${mo}/${dd2}/${yr}`;
              const dayBg=["#f0f4ff","#f0fff4","#fff8f0","#fdf4ff","#f0f9ff","#fefce8"][dgi%6];
              return(
                <React.Fragment key={date}>
                  {/* Day header row */}
                  <tr>
                    <td colSpan={3+nf+1} style={{padding:0,position:"sticky",left:0,zIndex:2}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"6px 12px",
                        background:dayBg,borderTop:"2px solid #e2e8f0",borderBottom:"1px solid #e2e8f0"}}>
                        <button onClick={()=>blockDay(date)}
                          style={B("#16a34a","#fff",{fontSize:11,padding:"4px 12px",borderRadius:4})}>
                          Block This Day
                        </button>
                        <span style={{fontWeight:800,color:"#1e293b",fontSize:13}}>{dayName}</span>
                        <span style={{fontSize:11,color:"#94a3b8",fontWeight:500}}>{dispDate}</span>
                        <span style={{fontSize:11,color:"#94a3b8",marginLeft:4}}>· {dayRows.length} slot{dayRows.length!==1?"s":""}</span>
                      </div>
                    </td>
                  </tr>
                  {/* Rows for this day */}
                  {dayRows.map((row,ri)=>{
                    const rowBg=ri%2===0?"#fff":"#f9fafb";
                    return(
                      <tr key={row.id}>
                        <td style={STD(SL[0],SW[0],rowBg,{fontWeight:800,fontSize:14,color:NAVY,borderBottom:"1px solid #f1f5f9"})}>{row.num}</td>
                        <td style={STD(SL[1],SW[1],rowBg,{borderBottom:"1px solid #f1f5f9"})}>
                          <input type="date" value={row.date} onChange={e=>updRow(row.id,"date",e.target.value)}
                            style={{...F,width:108,fontSize:11,padding:"3px 4px"}}/>
                        </td>
                        <td style={{...STD(SL[2],SW[2],rowBg,{borderBottom:"1px solid #f1f5f9"}),boxShadow:"2px 0 6px rgba(0,0,0,.06)"}}>
                          <select value={row.time} onChange={e=>updRow(row.id,"time",e.target.value)}
                            style={{...F,width:108,fontSize:11,padding:"3px 4px"}}>
                            {TIME_OPTS.map(t=><option key={t}>{t}</option>)}
                          </select>
                        </td>
                        {fields.map((fieldLabel,fi)=>{
                          const val=row.cells[fi];
                          const game=val&&val!=="blocked"?games.find(g=>g.id===val):null;
                          const isBlocked=val==="blocked";
                          const canPlace=!!picked&&!isBlocked&&!game;
                          const isHalfThis=halfFill&&halfFill.rowId===row.id&&halfFill.fi===fi;
                          // Always show full team names
                          const t1obj=game?tByIdFrom(game.t1,teams):null;
                          const t2obj=game?tByIdFrom(game.t2,teams):null;
                          const t1n=t1obj?.name||"TBD";
                          const t2n=t2obj?.name||"TBD";
                          const half1obj=isHalfThis?teams.find(t=>t.id===halfFill.t1Id):null;
                          const homeId=game?(game.home||game.t1):null;
                          const awayId=game?(homeId===game.t1?game.t2:game.t1):null;
                          const homeName=homeId?(tByIdFrom(homeId,teams)?.name||"TBD"):t1n;
                          const awayName=awayId?(tByIdFrom(awayId,teams)?.name||"TBD"):t2n;
                          const [hBg,hBdr,tintEven,tintOdd,accentText,accentBorder]=getFC(fi);
                          let cellBg=ri%2===0?tintEven:tintOdd;
                          if(isBlocked)cellBg="#fee2e2";
                          else if(isHalfThis)cellBg="#eff6ff";
                          else if(canPlace)cellBg=tintEven;
                          else if(game)cellBg=ri%2===0?tintEven:tintOdd;
                          return(
                            <td key={fi} onClick={()=>clickCell(row.id,fi)}
                              onDragOver={e=>{if(!game&&!isBlocked){e.preventDefault();e.dataTransfer.dropEffect="copy";}}}
                              onDrop={e=>{
                                e.preventDefault();
                                const teamId=e.dataTransfer.getData("teamId");
                                const teamCls=e.dataTransfer.getData("teamCls");
                                if(!teamId||game||isBlocked)return;
                                if(isHalfThis){
                                  // Second team — validate both, then complete matchup
                                  if(teamId===halfFill.t1Id)return;
                                  const errs1=validateDrop(halfFill.t1Id,row.id);
                                  const errs2=validateDrop(teamId,row.id);
                                  const allErrs=[...errs1,...errs2];
                                  if(allErrs.length>0){showDropAlert(allErrs);return;}
                                  const gameId=`gx_${Date.now()}`;

/* ════════════════════ POOL STANDINGS ════════════════════ */
function calcUSSSAStandings(teams,games){
  const s={};
  teams.forEach(t=>{s[t.id]={...t,w:0,l:0,t_:0,pf:0,pa:0,gp:0,rdMax8Sum:0}});
  games.forEach(g=>{
    if(g.status!=="final"||g.s1==null||g.s2==null)return;
    if(!s[g.t1]||!s[g.t2])return;
    s[g.t1].pf+=g.s1;s[g.t1].pa+=g.s2;s[g.t1].gp++;
    s[g.t2].pf+=g.s2;s[g.t2].pa+=g.s1;s[g.t2].gp++;
    const cap=Math.min(8,Math.abs(g.s1-g.s2));
    const rd1=g.s1>g.s2?cap:g.s1<g.s2?-cap:0;
    s[g.t1].rdMax8Sum+=rd1;s[g.t2].rdMax8Sum-=rd1;
    if(g.s1>g.s2){s[g.t1].w++;s[g.t2].l++}
    else if(g.s2>g.s1){s[g.t2].w++;s[g.t1].l++}
    else{s[g.t1].t_++;s[g.t2].t_++}
  });
  // Build base stats array
  const arr=Object.values(s).map(t=>({
    ...t,
    record:`${t.w}-${t.l}-${t.t_}`,
    winPct:t.gp>0?Math.round((t.w+t.t_*0.5)/t.gp*1000):0,
    avgRA:t.gp>0?(t.pa/t.gp).toFixed(1):"—",
    avgRS:t.gp>0?(t.pf/t.gp).toFixed(1):"—",
    avgRD:t.gp>0?((t.pf-t.pa)/t.gp).toFixed(1):"—",
    avgRDMax8:t.gp>0?(t.rdMax8Sum/t.gp).toFixed(1):"—",
    h2hW:0,h2hL:0,h2hT:0,h2hGP:0,h2hWinPct:0,h2hAllPlayed:false,h2hRecord:"—",
  }));
  // Step 4: Compute H2H among tied groups (same winPct)
  // Only valid if ALL tied teams have played each other
  const byWP={};
  arr.forEach(t=>{if(!byWP[t.winPct])byWP[t.winPct]=[];byWP[t.winPct].push(t);});
  Object.values(byWP).forEach(grp=>{
    if(grp.length<2)return;
    const ids=new Set(grp.map(t=>t.id));
    const h2h=games.filter(g=>g.status==="final"&&g.s1!=null&&g.s2!=null&&ids.has(g.t1)&&ids.has(g.t2));
    // Check all n*(n-1)/2 unique pairs played
    const pairs=new Set(h2h.map(g=>[g.t1,g.t2].sort().join("|")));
    const n=grp.length;
    const allPlayed=pairs.size>=n*(n-1)/2;
    h2h.forEach(g=>{
      const a=arr.find(t=>t.id===g.t1),b=arr.find(t=>t.id===g.t2);
      if(!a||!b)return;
      a.h2hGP++;b.h2hGP++;
      if(g.s1>g.s2){a.h2hW++;b.h2hL++;}
      else if(g.s2>g.s1){b.h2hW++;a.h2hL++;}
      else{a.h2hT++;b.h2hT++;}
    });
    grp.forEach(t=>{
      t.h2hAllPlayed=allPlayed;
      t.h2hWinPct=t.h2hGP>0?Math.round((t.h2hW+t.h2hT*0.5)/t.h2hGP*1000):0;
      t.h2hRecord=t.h2hGP>0?`${t.h2hW}-${t.h2hL}-${t.h2hT}`:"—";
    });
  });
  // Full 8-step USSSA sort
  return arr.sort((a,b)=>{
    if(b.winPct!==a.winPct)return b.winPct-a.winPct;           // 1. Win%
    if(b.w!==a.w)return b.w-a.w;                               // 2. Wins
    if(a.l!==b.l)return a.l-b.l;                               // 3. Losses
    // 4. H2H Win% — only if all tied teams played each other
    if(a.h2hAllPlayed&&b.h2hAllPlayed&&(a.h2hGP>0||b.h2hGP>0)){
      if(b.h2hWinPct!==a.h2hWinPct)return b.h2hWinPct-a.h2hWinPct;
    }
    const paA=a.gp>0?a.pa/a.gp:999,paB=b.gp>0?b.pa/b.gp:999;
    if(Math.abs(paA-paB)>0.001)return paA-paB;                 // 5. Avg PA asc
    const rdA=parseFloat(a.avgRDMax8||0),rdB=parseFloat(b.avgRDMax8||0);
    if(Math.abs(rdA-rdB)>0.001)return rdB-rdA;                 // 6. Avg RD Max8 desc
    return (b.pts||0)-(a.pts||0);                               // 7. USSSA Points desc
  });
}
function StandingsView({teams,games}){
  const NAVY="#1e3a5f";
  /* extract age number from class string e.g. "12AAA" → 12 */
  const ageNum=cls=>{const m=(cls||"").match(/^(\d+)/);return m?parseInt(m[1]):0};
  const ageLabel=n=>n>0?`${n}U`:"Other";
  /* build sorted list of unique age groups that have pool games */
  const allPoolGames=games.filter(g=>g.pool);
  const activeTeamIds=new Set(allPoolGames.flatMap(g=>[g.t1,g.t2]));
  const ageGroups=[...new Set(teams.filter(t=>activeTeamIds.has(t.id)).map(t=>ageNum(t.cls)))]
    .filter(a=>a>0).sort((a,b)=>a-b);
  const [activeAge,setActiveAge]=useState(ageGroups[0]||0);
  const [showRules,setShowRules]=useState(false);
  if(ageGroups.length===0)return <Alrt type="info">No pool play games scheduled yet. Add games with pool assignments to see standings.</Alrt>;
  /* teams + games for the selected age */
  const ageTeams=teams.filter(t=>ageNum(t.cls)===activeAge);
  const ageTeamIds=new Set(ageTeams.map(t=>t.id));
  const ageGames=games.filter(g=>ageTeamIds.has(g.t1)||ageTeamIds.has(g.t2));
  const pools=[...new Set(ageGames.map(g=>g.pool))].filter(Boolean).sort();
  /* unique classes within this age for subtitle */
  const ageClasses=[...new Set(ageTeams.map(t=>t.cls))].filter(Boolean).sort();
  /* compact two-line column header */
  const TH=({top,bot,w,tip})=>(
    <th title={tip||""} style={{background:NAVY,color:"#fff",padding:"6px 5px",
      fontSize:10,fontWeight:700,textAlign:"center",verticalAlign:"middle",
      whiteSpace:"nowrap",width:w||"auto",
      borderRight:"1px solid rgba(255,255,255,.15)",cursor:tip?"help":"default",
      lineHeight:1.2}}>
      <div>{top}</div>
      {bot&&<div style={{fontSize:8,fontWeight:400,opacity:.75,marginTop:1}}>{bot}</div>}
    </th>
  );
  const signFmt=v=>{
    const n=parseFloat(v);
    if(isNaN(n)||v==="—")return v;
    return n>0?"+"+v:v;
  };
  const rdColor=v=>{
    const n=parseFloat(v);
    if(isNaN(n))return"#64748b";
    return n>0?"#15803d":n<0?"#dc2626":"#64748b";
  };
  return(
    <div>
      {/* ── Age group tabs ── */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontSize:11,fontWeight:700,color:"#64748b",marginRight:4}}>Age Group:</span>
        {ageGroups.map(age=>{
          const isActive=age===activeAge;
          const ageTms=teams.filter(t=>ageNum(t.cls)===age);
          const ageCls=[...new Set(ageTms.map(t=>t.cls))].filter(Boolean).sort().join(", ");
          return(
            <button key={age} onClick={()=>setActiveAge(age)}
              style={{padding:"5px 14px",borderRadius:20,border:"2px solid "+(isActive?NAVY:"#cbd5e1"),
                background:isActive?NAVY:"#fff",color:isActive?"#fff":"#475569",
                fontWeight:700,fontSize:12,cursor:"pointer",lineHeight:1,
                display:"flex",flexDirection:"column",alignItems:"center",gap:1,
                boxShadow:isActive?"0 2px 8px rgba(30,58,95,.3)":"none",
                transition:"all .15s"}}>
              <span>{ageLabel(age)}</span>
              <span style={{fontSize:8,fontWeight:500,opacity:isActive?0.8:0.6}}>{ageCls}</span>
            </button>
          );
        })}
      </div>
      {/* ── Division title ── */}
      <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
        <div style={{fontSize:15,fontWeight:800,color:NAVY}}>{ageLabel(activeAge)} Pool Standings</div>
        <div style={{fontSize:11,color:"#64748b",background:"#f1f5f9",borderRadius:4,
          padding:"2px 8px",fontWeight:500}}>{ageClasses.join(" · ")} — Standard</div>
      </div>
      {/* ── Pool tables ── */}
      {pools.length===0&&<Alrt type="info">No pool games found for {ageLabel(activeAge)}. Assign pool letters to games in Game Manager.</Alrt>}
      {pools.map(pool=>{
        const pgTeamIds=[...new Set(ageGames.filter(g=>g.pool===pool).flatMap(g=>[g.t1,g.t2]))];
        const pgTeams=ageTeams.filter(t=>pgTeamIds.includes(t.id));
        const pgGames=ageGames.filter(g=>g.pool===pool&&g.status==="final");
        const st=calcUSSSAStandings(pgTeams,pgGames);
        return(
          <div key={pool} style={{marginBottom:28,borderRadius:8,overflow:"hidden",
            border:"1px solid #cbd5e1",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
            {/* Pool banner */}
            <div style={{background:"#1e293b",color:"#fff",padding:"8px 16px",
              display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>

/* ════════════════════ BRACKET GENERATOR ════════════════════ */
function genBracketGames(seeds){
  const N=seeds.length;
  if(N<2)return[];
  const R=Math.ceil(Math.log2(Math.max(N,2)));
  const P=Math.pow(2,R);
  function seedPos(sz){
    if(sz===2)return[0,1];
    // Standard bracket seeding: seed1 top, seed2 bottom, ensures 1v2 only in final
    // For 8 teams produces: 1v8, 4v5, 3v6, 2v7 (matches USSSA/NCAA standard)
    const prev=seedPos(sz/2);
    const half=sz/4;
    const top=prev.slice(0,half);
    const bot=prev.slice(half).reverse(); // reverse bottom half so seed2 stays at bottom
    const r=[];
    for(const x of top){r.push(x);r.push(sz-1-x)}
    for(const x of bot){r.push(x);r.push(sz-1-x)}
    return r;
  }
  const pos=seedPos(P);
  const gs=[];let gn=1;
  for(let p=0;p<P/2;p++){
    const si1=pos[p*2],si2=pos[p*2+1];
    const t1=si1<N?seeds[si1].id:null;
    const t2=si2<N?seeds[si2].id:null;
    const bye=!(t1&&t2);
    // Store which seed number each slot represents (used for badge display)
    const realSn1=t1?si1+1:si2+1; // the team that actually plays
    const realSn2=bye?null:si2+1;
    gs.push({id:`bg${gn}`,num:`G${gn}`,round:1,
      t1:t1||t2,t2:bye?null:(t1?t2:null),
      sn1:realSn1,sn2:realSn2,
      s1:null,s2:null,status:bye?"bye":"scheduled",date:"",time:"",field:""});
    gn++;
  }
  for(let r=2;r<=R;r++){
    const cnt=P/Math.pow(2,r);
    for(let p=0;p<cnt;p++){
      gs.push({id:`bg${gn}`,num:`G${gn}`,round:r,t1:null,t2:null,s1:null,s2:null,status:"scheduled",date:"",time:"",field:""});
      gn++;
    }
  }
  return gs;
}

function BracketBuilderView({teams,games=[],onBuild}){
  const NAVY="#1e3a5f";
  const TEAL="#0e7490";

  /* ── compute standings-ranked team list ── */
  const rankedTeams=React.useMemo(()=>{
    if(!games.length)return teams;
    const s=calcUSSSAStandings(teams,games);
    // s is already sorted by winPct, wins, etc.
    return s.map(row=>teams.find(t=>t.id===row.id)||row).filter(Boolean);
  },[teams,games]);

  const [count,setCount]=useState(8);
  const [names,setNames]=useState(()=>Array(32).fill("").map((_,i)=>rankedTeams[i]?rankedTeams[i].name:""));

  /* ── scheduling state ── */
  const [numFields,setNumFields]=useState(1);
  const [gameMins,setGameMins]=useState(120);   // game duration in minutes
  const [gapMins,setGapMins]=useState(15);      // gap between games (buffer)
  const [startDate,setStartDate]=useState(()=>{const d=new Date();return d.toISOString().slice(0,10)});
  const [startTime,setStartTime]=useState("08:00");

  /* reset seeds to standings order */
  function loadFromStandings(){
    setNames(Array(32).fill("").map((_,i)=>rankedTeams[i]?rankedTeams[i].name:""));
  }

  /* ── auto-schedule helper ────────────────────────────────────────
     Distributes games across fields, round by round.
     Byes are skipped (no field/time needed).
     Within a round, games are spread across fields simultaneously;
     each "wave" of F games occupies one timeslot.
     The next round starts after all current-round games finish + gap.
  ──────────────────────────────────────────────────────────────── */
  function applySchedule(gs){
    const slotMins=parseInt(gameMins)+parseInt(gapMins);
    const F=parseInt(numFields)||1;
    // parse startTime "HH:MM" → minutes since midnight
    const [sh,sm]=startTime.split(":").map(Number);
    let curMin=sh*60+(sm||0);

    const rounds=[...new Set(gs.map(g=>g.round))].sort((a,b)=>a-b);
    rounds.forEach(r=>{
      // include all non-bye games in this round — later rounds have t1/t2=null (TBD) but still need scheduled times
      const playable=gs.filter(g=>g.round===r&&g.status!=="bye");
      if(!playable.length)return;
      let wave=0;
      playable.forEach((g,i)=>{
        wave=Math.floor(i/F);
        const fieldNum=(i%F)+1;
        const tMin=curMin+wave*slotMins;
        const hh=Math.floor(tMin/60)%24;
        const mm=tMin%60;
        const ampm=hh<12?"AM":"PM";
        const h12=hh===0?12:hh>12?hh-12:hh;
        const timeStr=`${h12}:${mm.toString().padStart(2,"0")} ${ampm}`;
        g.date=startDate;
        g.time=timeStr;
        g.field=`F${fieldNum}`;
      });
      // advance clock past all waves in this round + one extra gap
      curMin+=((wave+1)*slotMins);
    });
    return gs;
  }

  function build(){
    const seeds=Array.from({length:count}).map((_,i)=>{
      const nm=names[i]||`Team ${i+1}`;
      const t=teams.find(t2=>t2.name.toLowerCase()===nm.toLowerCase());
      return{id:t?t.id:`seed_${i+1}`,name:nm,cls:t?t.cls:"",state:t?t.state:""};
    });
    const gs=genBracketGames(seeds);
    applySchedule(gs);
    onBuild(gs,seeds);
  }

  const P=Math.pow(2,Math.ceil(Math.log2(Math.max(count,2))));
  const byes=P-count;

  /* seed badge color */
  const seedBg=i=>i===0?"#b45309":i===1?"#1d4ed8":i===2?"#7c3aed":NAVY;

  /* preview: what matchups will the seeding produce? */
  function previewMatchups(){
    const sz=P;
    function seedPos(s){
      if(s===2)return[0,1];
      const prev=seedPos(s/2);
      const h=s/4;
      const top=prev.slice(0,h);
      const bot=prev.slice(h).reverse();
      const r=[];
      for(const x of top){r.push(x);r.push(s-1-x)}
      for(const x of bot){r.push(x);r.push(s-1-x)}
      return r;
    }
    const pos=seedPos(sz);
    const matchups=[];
    for(let p=0;p<sz/2;p++){
      const i1=pos[p*2],i2=pos[p*2+1];
      const n1=i1<count?(names[i1]||`Seed ${i1+1}`):"BYE";
      const n2=i2<count?(names[i2]||`Seed ${i2+1}`):"BYE";
      const bye=i1>=count||i2>=count;
      matchups.push({s1:i1+1,s2:i2+1,n1,n2,bye});
    }
    return matchups;
  }
  const matchups=previewMatchups();

  return(
    <div style={{maxWidth:680}}>
      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"18px",marginBottom:14}}>
        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:14,color:NAVY}}>⚙️ Bracket Setup</div>
          {rankedTeams.length>0&&(
            <button onClick={loadFromStandings}
              style={{padding:"5px 11px",background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:5,
                fontSize:11,fontWeight:700,color:TEAL,cursor:"pointer"}}>
              ↺ Load from Standings
            </button>
          )}
        </div>

        {/* Count + format row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"#475569",display:"block",marginBottom:4}}>Number of Teams</label>
            <select value={count} onChange={e=>setCount(parseInt(e.target.value))}
              style={{width:"100%",padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,fontWeight:600}}>
              {Array.from({length:29},(_,i)=>i+4).map(n=>{
                const p2=Math.pow(2,Math.ceil(Math.log2(Math.max(n,2))));
                const b=p2-n;
                return<option key={n} value={n}>{n} Teams{b>0?` — ${b} bye${b>1?"s":""}`:"  (no byes)"}</option>;
              })}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"#475569",display:"block",marginBottom:4}}>Format</label>
            <select style={{width:"100%",padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,fontWeight:600}}>
              <option>Single Elimination</option>
            </select>
          </div>
        </div>

        {/* ── Schedule Configuration ── */}
        <div style={{background:"#f1f5f9",border:"1px solid #cbd5e1",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:800,color:NAVY,marginBottom:10,textTransform:"uppercase",letterSpacing:.6}}>
            📅 Game Schedule
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
            {/* # Fields */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}># Fields</label>
              <select value={numFields} onChange={e=>setNumFields(parseInt(e.target.value))}
                style={{width:"100%",padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontWeight:600,background:"#fff"}}>

          {(()=>{

            const rounds=Math.ceil(Math.log2(Math.max(count,2)));

            // estimate total time: each round has ceil(gamesInRound/F) waves
            let estMin=sh*60+(sm||0);

/* ════════════════════ BRACKET ════════════════════ */
function BracketView({bGames,setBGames,teams,games=[],editable}){
  const NAVY="#1e3a5f";
  const [tab,setTab]=useState("build");  // open Builder first by default
  const [builtGames,setBuiltGames]=useState(null);
  const [builtSeeds,setBuiltSeeds]=useState(null);

  function onBuild(games,seeds){setBuiltGames(games);setBuiltSeeds(seeds);setTab("view")}

  const dGames=builtGames||bGames;
  const dTeams=builtSeeds?[...teams,...builtSeeds.filter(s=>!teams.find(t=>t.id===s.id))]:teams;
  const setDGames=builtGames?setBuiltGames:setBGames;

  /* ── Layout constants (compact USSSA style) ── */
  const GW=205,GH=62,TEAM_H=26,HDR_H=18,BASE_GAP=16,CONN=56;
  const rounds=[...new Set(dGames.map(g=>g.round))].sort((a,b)=>a-b);
  const maxRound=rounds.length?Math.max(...rounds):1;
  const N=rounds.length||1;
  const SH=ri=>(GH+BASE_GAP)*Math.pow(2,ri);
  const GT=(ri,p)=>(SH(ri)-GH)/2+p*SH(ri);
  const GC=(ri,p)=>GT(ri,p)+GH/2;
  const r1Count=dGames.filter(g=>g.round===rounds[0]).length||1;
  const totalH=Math.max(r1Count*SH(0),GH+BASE_GAP*2)+8;
  const RX=ri=>ri*(GW+CONN);
  const totalW=N*(GW+CONN)+100;

  const rndLabel=[];
  if(N===1){rndLabel[0]="Championship"}
  else if(N===2){rndLabel[0]="Semifinal";rndLabel[1]="Championship"}
  else if(N===3){rndLabel[0]="Quarterfinal";rndLabel[1]="Semifinal";rndLabel[2]="Championship"}
  else{rounds.forEach((_,i)=>{
    if(i===N-1)rndLabel[i]="Championship";
    else if(i===N-2)rndLabel[i]="Semifinal";
    else if(i===N-3)rndLabel[i]="Quarterfinal";
    else{const cnt=Math.round(r1Count/Math.pow(2,i)*2);rndLabel[i]="Round of "+cnt;}
  })}

  function upd(id,k,v){
    if(!editable)return;
    const n=v===""?null:parseInt(v);
    setDGames(prev=>prev.map(g=>g.id===id?{...g,[k]:isNaN(n)?null:n,status:n!==null?"final":"scheduled"}:g));
  }
  function getT(id){return tByIdFrom(id,dTeams)}
  const finalGame=dGames.find(g=>g.round===maxRound);
  const champ=finalGame?winOf(finalGame):null;

  return(
    <div>
      {/* ── Tab bar ── */}
      <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:"2px solid #e2e8f0"}}>
        {[["build","⚙️ Builder"],["view","🏆 Bracket"]].map(([t,label])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:"7px 16px",border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
              borderRadius:"6px 6px 0 0",marginBottom:-2,
              background:tab===t?NAVY:"#f8fafc",
              color:tab===t?"#fff":"#64748b",
              borderBottom:tab===t?`2px solid ${NAVY}`:"2px solid transparent"}}>
            {label}
          </button>
        ))}
        {builtGames&&<span style={{marginLeft:"auto",alignSelf:"center",fontSize:10,color:"#16a34a",fontWeight:600}}>✓ Custom bracket</span>}
      </div>

      {/* ── Builder tab ── */}
      {tab==="build"&&<BracketBuilderView teams={teams} games={games} onBuild={onBuild}/>}

      {/* ── Bracket view tab ── */}
      {tab==="view"&&(
        <div>
          {champ&&(
            <div style={{background:"linear-gradient(135deg,#b45309,#f59e0b)",color:"#fff",
              padding:"10px 18px",borderRadius:10,marginBottom:14,display:"flex",
              alignItems:"center",gap:12,boxShadow:"0 4px 14px rgba(0,0,0,.18)"}}>
              <span style={{fontSize:26}}>🏆</span>
              <div>
                <div style={{fontSize:9,fontWeight:700,opacity:.85,textTransform:"uppercase",letterSpacing:1.2}}>Division Champion</div>
                <div style={{fontSize:15,fontWeight:900,marginTop:1}}>{getT(champ)?.name}</div>
              </div>
            </div>
          )}
          {editable&&<Alrt type="info">✏️ Enter scores on each game to advance teams. Use the Builder tab to set up a new bracket.</Alrt>}
          {/* Round headers */}
          <div style={{display:"flex",marginBottom:6}}>
            {rounds.map((_,ri)=>(
              <div key={ri} style={{width:GW+CONN,flexShrink:0,paddingRight:CONN}}>
                <div style={{textAlign:"center",fontSize:10,fontWeight:800,color:"#fff",
                  background:NAVY,padding:"5px 0",borderRadius:4,textTransform:"uppercase",letterSpacing:.8}}>
                  {rndLabel[ri]||`Round ${ri+1}`}
                </div>
              </div>
            ))}
          </div>
          {/* Bracket canvas */}
          <div style={{overflowX:"auto",paddingBottom:20}}>
            <div style={{position:"relative",width:totalW,height:totalH}}>
              {/* Game slots */}
              {rounds.map((round,ri)=>
                dGames.filter(g=>g.round===round).map((g,pi)=>{
                  const t1=getT(g.t1),t2=g.t2?getT(g.t2):null;
                  const w=winOf(g);
                  const isBye=g.status==="bye"||(!g.t2&&!!g.t1);
                  const top=GT(ri,pi),left=RX(ri);
                  const teamRow=(side)=>{
                    const isT1=side===1;
                    const tId=isT1?g.t1:g.t2;
                    const t=isT1?t1:t2;
                    const s=isT1?g.s1:g.s2;
                    const sKey=isT1?"s1":"s2";
                    const win=w===tId,lose=!!w&&w!==tId;
                    return(
                      <div style={{display:"flex",alignItems:"center",height:TEAM_H,
                        padding:"0 7px",
                        background:win?"#f0fdf4":lose?"#fff8f8":"#fff",
                        borderTop:isT1?"none":"1px solid #e8ecf0"}}>
                        {/* Seed badge (round 1, when seed number stored) */}
                        {ri===0&&(isT1?g.sn1:g.sn2)&&(()=>{
                          const sn=isT1?g.sn1:g.sn2;
                          const bg=sn===1?"#b45309":sn===2?"#1d4ed8":sn===3?"#7c3aed":sn<=4?"#0e7490":sn<=8?"#1e3a5f":"#475569";
                          return(
                            <span style={{background:bg,color:"#fff",borderRadius:3,
                              fontSize:8,fontWeight:800,padding:"1px 4px",marginRight:4,
                              flexShrink:0,fontFamily:"monospace",lineHeight:"14px"}}>
                              #{sn}
                            </span>
                          );
                        })()}
                        <span style={{flex:1,fontSize:11,fontWeight:win?700:500,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                          color:lose?"#c0cad8":"#1e293b",
                          textDecoration:lose?"line-through":"none"}}>
                          {t?t.name:(<em style={{color:"#c0cad8",fontSize:10,fontWeight:400}}>TBD</em>)}
                        </span>
                        {editable&&tId&&!isBye?(
                          <input type="number" min="0" value={s??""} placeholder=""
                            style={{width:30,textAlign:"center",fontSize:11,fontWeight:700,
                              border:"1px solid "+(win?"#86efac":"#e2e8f0"),borderRadius:3,
                              padding:"1px 2px",background:win?"#dcfce7":"#f8fafc",
                              color:win?"#15803d":"#334155",outline:"none",flexShrink:0}}
                            onChange={e=>upd(g.id,sKey,e.target.value)}/>
                        ):s!=null?(
                          <span style={{minWidth:22,textAlign:"center",fontWeight:800,fontSize:11,flexShrink:0,
                            background:win?"#16a34a":"transparent",color:win?"#fff":lose?"#d1d5db":"#475569",
                            borderRadius:3,padding:"1px 4px"}}>{s}</span>
                        ):null}
                      </div>
                    );
                  };
                  return(
                    <div key={g.id} style={{position:"absolute",top,left,width:GW,zIndex:2}}>
                      {/* Compact header: game num + date/time/field */}
                      <div style={{height:HDR_H,display:"flex",alignItems:"center",justifyContent:"space-between",
                        padding:"0 7px",background:NAVY,borderRadius:"5px 5px 0 0"}}>
                        <span style={{background:"#0e7490",color:"#fff",borderRadius:3,
                          fontSize:8,fontWeight:800,padding:"1px 5px",fontFamily:"monospace"}}>
                          {g.num}
                        </span>
                        <span style={{fontSize:8,color:"rgba(255,255,255,.55)",fontWeight:400}}>
                          {[g.date,g.time,g.field].filter(Boolean).join(" · ")||""}
                        </span>
                      </div>
                      {/* Team rows */}
                      <div style={{border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 5px 5px",
                        overflow:"hidden",background:"#fff",boxShadow:"0 2px 6px rgba(0,0,0,.07)"}}>
                        {teamRow(1)}
                        {isBye?(
                          <div style={{height:TEAM_H,display:"flex",alignItems:"center",
                            padding:"0 7px",borderTop:"1px solid #e8ecf0",background:"#fafafa"}}>
                            <span style={{fontSize:9,color:"#b0bbd0",fontStyle:"italic",letterSpacing:.3}}>— BYE —</span>
                          </div>
                        ):teamRow(2)}
                      </div>
                    </div>
                  );
                })
              )}
              {/* SVG connector lines */}
              <svg style={{position:"absolute",top:0,left:0,pointerEvents:"none",overflow:"visible"}}
                width={totalW} height={totalH}>
                {rounds.slice(0,-1).map((_,ri)=>{
                  const rGames=dGames.filter(g=>g.round===rounds[ri]);
                  const pairs=Math.ceil(rGames.length/2);
                  return Array.from({length:pairs}).map((__,pi)=>{
                    const g1=rGames[pi*2],g2=rGames[pi*2+1];
                    const y1=GC(ri,pi*2);
                    const y2=g2?GC(ri,pi*2+1):y1;
                    const yMid=GC(ri+1,pi);
                    const x1=RX(ri)+GW;
                    const xC=x1+CONN/2;
                    const x2=RX(ri+1);
                    return(
                      <g key={`c${ri}-${pi}`}>
                        <line x1={x1} y1={y1} x2={xC} y2={y1} stroke="#94a3b8" strokeWidth={1.5}/>
                        {g2&&<line x1={x1} y1={y2} x2={xC} y2={y2} stroke="#94a3b8" strokeWidth={1.5}/>}
                        <line x1={xC} y1={y1} x2={xC} y2={g2?y2:y1} stroke="#94a3b8" strokeWidth={1.5}/>
                        <line x1={xC} y1={yMid} x2={x2} y2={yMid} stroke="#94a3b8" strokeWidth={1.5}/>
                        {/* winner name on connector */}
                        {g2&&winOf(g1||{})&&(
                          <text x={(xC+x2)/2} y={yMid-3} textAnchor="middle"
                            style={{fontSize:8,fill:"#475569",fontFamily:"sans-serif"}}>
                            {getT(winOf(g1))?.name?.split(" ").slice(-1)[0]||""}
                          </text>
                        )}
                      </g>
                    );
                  });
                })}
              </svg>
              {/* Champion trophy */}
              {champ&&(
                <div style={{position:"absolute",top:GC(N-1,0)-34,left:RX(N-1)+GW+CONN+6,
                  textAlign:"center",width:80}}>
                  <div style={{fontSize:24}}>🏆</div>
                  <div style={{fontSize:10,fontWeight:800,color:"#b45309",lineHeight:1.3,marginTop:2}}>
                    {getT(champ)?.name}
                  </div>
                  <div style={{fontSize:8,color:"#d97706",fontWeight:700,letterSpacing:.5}}>CHAMPION</div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          <div style={{fontWeight:800,fontSize:13,color:NAVY,marginBottom:8}}>🏆 Assign to Bracket Slots</div>
          {st.map((_,i)=>{
            const sKey=`s${i+1}`;
            return(
              <div key={sKey} style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                <SeedRank n={i+1}/>
                <select style={{flex:1,fontSize:12,padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:6}}
                  value={assigns[sKey]||""}
                  onChange={e=>setAssigns(p=>({...p,[sKey]:e.target.value}))}>

                  {st.map((t,j)=><option key={t.id} value={t.id}>#{j+1} {t.name} ({t.record})</option>)}

            );

            <button className="btn btn-secondary" style={{flex:1}} onClick={autoAssign}>⚡ Auto-Assign by Seed</button>

/* ════════════════════ PP MATRIX ════════════════════ */
function PPMatrixView(){
  const [np,setNp]=useState(4);
  const [nt,setNt]=useState(16);
  const pools=Array.from({length:np},(_,i)=>String.fromCharCode(65+i));
  const rows=Math.ceil(nt/np);
  function seed(r,c){const s=r%2===0?r*np+(c+1):r*np+(np-c);return s<=nt?s:null}
  return(
    <div>
      <Alrt type="info">🔢 Serpentine seeding: Seed 1→Pool A, 2→B, etc., then direction reverses each row to balance pool strength.</Alrt>
      <div className="flex gap-3 mb4" style={{alignItems:"flex-end"}}>
        <div><label>Number of Pools</label>
          <select value={np} onChange={e=>setNp(+e.target.value)}>
            {[2,3,4,5,6,8].map(n=><option key={n}>{n}</option>)}
          </select>

                {pools.map((_,c)=>{const s=seed(r,c);return(

                    {s!=null&&<div className={`pp-cell ${r===0?"pp-cell-top":c===0?"pp-cell-2":""}`}>{s}</div>}
                  </td>

            ))}</tbody>
          </table>
          <div className="t-xs t-gray mt3">
            Teams per pool: {pools.map((p,pi)=>{
              const cnt=Array.from({length:rows},(_,r)=>seed(r,pi)!=null?1:0).reduce((a,b)=>a+b,0);
              return `${p}: ${cnt}`;
            }).join(" · ")}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ PITCHING ════════════════════ */
function PitchingView({teams,games=[]}){
  const INN_OPTS=["","0/3 Inn","1/3 Inn","2/3 Inn","1 Inn","1-1/3 Inn","1-2/3 Inn","2 Inn","2-1/3 Inn","2-2/3 Inn","3 Inn","3-1/3 Inn","3-2/3 Inn","4 Inn","4-1/3 Inn","4-2/3 Inn","5 Inn","5-1/3 Inn","5-2/3 Inn","6 Inn","6-1/3 Inn","6-2/3 Inn","7 Inn","7-1/3 Inn","7-2/3 Inn","8 Inn","8-1/3 Inn","8-2/3 Inn","9 Inn","9-1/3 Inn","9-2/3 Inn","10 Inn"];
  const ROWS=10;
  const [entries,setEntries]=useState({});
  const [selId,setSelId]=useState(null);
  const [activeTab,setActiveTab]=useState("entry");
  const [activeTeam,setActiveTeam]=useState(0);
  const [savedMsg,setSavedMsg]=useState("");
  const glist=games.filter(g=>g.status!=="bye"&&g.t1&&g.t2);
  const selG=glist.find(g=>g.id===selId)||(glist[0]||null);
  function tm(id){return teams.find(t=>t.id===id)||{name:id||"TBD"}}
  function eKey(gId,tId,r){return `${gId}||${tId}||${r}`}
  function getE(gId,tId,r){return entries[eKey(gId,tId,r)]||{player:"",outs:"",pitches:""}}
  function setE(gId,tId,r,field,val){
    const k=eKey(gId,tId,r);
    setEntries(p=>({...p,[k]:{...(p[k]||{player:"",outs:"",pitches:""}),[field]:val}}));
  }
  function hasData(gId){return Object.entries(entries).some(([k,e])=>k.startsWith(`${gId}||`)&&(e.player||e.outs))}
  function saveChanges(){setSavedMsg("✓ Saved");setTimeout(()=>setSavedMsg(""),2000)}
  function outsCount(inns){
    if(!inns)return 0;
    if(inns==="1/3 Inn")return 1;
    if(inns==="2/3 Inn")return 2;
    const w=inns.match(/^(\d+) Inn$/);if(w)return parseInt(w[1])*3;
    const m=inns.match(/^(\d+)-(\d+)\/3 Inn$/);if(m)return parseInt(m[1])*3+parseInt(m[2]);
    return 0;
  }
  function buildSummary(){
    const map={};
    Object.entries(entries).forEach(([k,e])=>{
      if(!e.player)return;
      const parts=k.split("||");
      const gId=parts[0],tId=parts[1];
      const sk=`${tId}::${e.player.trim().toLowerCase()}`;
      if(!map[sk])map[sk]={tId,player:e.player,totalOuts:0,gamesSet:new Set()};
      map[sk].totalOuts+=outsCount(e.outs);
      if(gId)map[sk].gamesSet.add(gId);
    });
    return Object.values(map).map(r=>({...r,gamesCount:r.gamesSet.size})).sort((a,b)=>b.totalOuts-a.totalOuts);
  }
  const summary=buildSummary();

  const TH={padding:"10px 14px",fontSize:12,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5,borderBottom:"2px solid #e2e8f0",background:"#f8fafc",whiteSpace:"nowrap"};
  const TD={padding:"6px 10px",verticalAlign:"middle",borderBottom:"1px solid #f1f5f9"};
  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:12}}>
        {[["entry","⚾ Game Entry"],["summary","📊 Pitcher Summary"]].map(([t,lbl])=>(
          <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"5px 14px",border:"none",borderRadius:4,fontWeight:700,fontSize:12,cursor:"pointer",
            background:activeTab===t?"#1e3a5f":"#e2e8f0",color:activeTab===t?"white":"#475569"}}>{lbl}</button>
        ))}
      </div>
      {activeTab==="entry"&&(
        glist.length===0
          ?<Alrt type="info">No games scheduled yet. Add games in Game Manager first.</Alrt>
          :<div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            {/* Game list */}
            <div style={{width:192,flexShrink:0}}>
              <div style={{fontWeight:700,fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>Select Game</div>
              {glist.map(g=>{
                const active=g.id===selG?.id;
                const done=hasData(g.id);
                return(
                  <div key={g.id} onClick={()=>{setSelId(g.id);setActiveTeam(0);}}
                    style={{padding:"8px 10px",marginBottom:4,borderRadius:6,cursor:"pointer",border:`2px solid ${active?"#1e3a5f":"#e2e8f0"}`,
                      background:active?"#eff6ff":"white",position:"relative",transition:".1s"}}>
                    <div style={{fontWeight:700,fontSize:12,color:active?"#1e3a5f":"#1e293b",lineHeight:1.4}}>{tm(g.t1).name}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>vs.</div>
                    <div style={{fontWeight:700,fontSize:12,color:active?"#1e3a5f":"#1e293b",lineHeight:1.4}}>{tm(g.t2).name}</div>
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                      {g.pool?`Pool ${g.pool}`:""}
                      {g.status==="final"&&g.s1!=null?` · ${g.s1}-${g.s2}`:""}
                    </div>
                    {done&&<span style={{position:"absolute",top:7,right:8,fontSize:12,color:"#15803d",fontWeight:800}}>✓</span>}
                  </div>

            {selG?(

                {/* Game header + save */}

                {/* Team tabs */}
                <div style={{display:"flex",gap:0,marginBottom:0,border:"1px solid #e2e8f0",borderBottom:"none",borderRadius:"6px 6px 0 0",overflow:"hidden"}}>

                    const on=activeTeam===i;
                    const tHasData=Array.from({length:ROWS},(_,r)=>getE(selG.id,tId,r)).some(e=>e.player||e.outs);
                    return(
                      <div key={tId} onClick={()=>setActiveTeam(i)}

                          background:on?"white":"#f8fafc",color:on?"#1e3a5f":"#64748b",
                          borderBottom:on?"3px solid #1e3a5f":"3px solid transparent",
                          borderRight:i===0?"1px solid #e2e8f0":"none",transition:".1s"}}>
                        {tm(tId).name}
                        {tHasData&&<span style={{marginLeft:6,fontSize:11,color:"#15803d",fontWeight:800}}>✓</span>}
                      </div>
                    );
                  })}
                </div>
                {/* Pitcher table — full width, one team at a time */}
                {[selG.t1,selG.t2].map((tId,i)=>activeTeam!==i?null:(
                  <div key={tId} style={{border:"1px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 6px 6px",overflow:"hidden"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead>
                        <tr>
                          <th style={{...TH,width:36,textAlign:"center"}}>#</th>
                          <th style={{...TH,textAlign:"left"}}>Player Name</th>
                          <th style={{...TH,textAlign:"center",width:180}}>Innings Pitched</th>

                        </tr>
                      </thead>
                      <tbody>
                        {Array.from({length:ROWS},(_,r)=>{

                          return(

/* ════════════════════ PLACING ════════════════════ */
function PlacingView({bGames,teams}){
  const NAVY="#1e3a5f";
  function tm(id){return tByIdFrom(id,teams)}
  const ordSfx=n=>n===1?"st":n===2?"nd":n===3?"rd":"th";
  // Build all placings by traversing every round's losers (bottom-up)
  // Determine total rounds
  const rounds=[...new Set(bGames.filter(g=>g.status!=="bye").map(g=>g.round))].sort((a,b)=>b-a);
  if(!rounds.length)return <Alrt type="info">🏆 No bracket games recorded yet.</Alrt>;
  const lastRound=rounds[0];
  // Walk rounds from last → first to assign places
  // Championship winner = 1st, loser = 2nd
  // Semi-final losers = 3rd/4th, Quarter-final losers = 5th–8th, etc.
  const places=[];
  let nextPlace=1;
  const placed=new Set();
  rounds.forEach(r=>{
    const roundGames=bGames.filter(g=>g.round===r&&g.status!=="bye");
    if(r===lastRound){
      // Championship
      roundGames.forEach(g=>{
        const w=winOf(g),l=loseOf(g);
        if(w&&!placed.has(w)){places.push({pos:nextPlace,id:w,lbl:"Champion",ico:"🥇"});placed.add(w);nextPlace++;}
        if(l&&!placed.has(l)){places.push({pos:nextPlace,id:l,lbl:"Runner-Up",ico:"🥈"});placed.add(l);nextPlace++;}
      });
    } else {
      // All losers from this round tie for nextPlace
      const losers=roundGames.map(g=>loseOf(g)).filter(id=>id&&!placed.has(id));
      const numLosers=losers.length;
      if(numLosers===0)return;
      const startPos=nextPlace;
      const endPos=nextPlace+numLosers-1;
      const posLabel=startPos===endPos?`${startPos}${ordSfx(startPos)}`:
        `${startPos}${ordSfx(startPos)}–${endPos}${ordSfx(endPos)}`;
      const ico=startPos===3?"🥉":startPos<=4?"4️⃣":startPos<=8?"🎖":"📋";
      losers.forEach(id=>{
        if(!placed.has(id)){
          places.push({pos:startPos,id,lbl:posLabel+" Place",ico});
          placed.add(id);
          nextPlace++;
        }
      });
    }
  });
  // Any team in the bracket but not placed = TBD
  const allBracketTeams=new Set(bGames.filter(g=>g.status!=="bye").flatMap(g=>[g.t1,g.t2]).filter(Boolean));
  allBracketTeams.forEach(id=>{
    if(!placed.has(id)){
      places.push({pos:nextPlace,id,lbl:"TBD",ico:"⏳"});
      nextPlace++;
    }
  });
  const top3=places.filter(p=>p.pos<=3);
  return(
    <div>
      <Alrt type="success">🏆 Final division standings based on bracket results. Positions auto-calculated from game outcomes.</Alrt>
      {/* Podium cards */}
      {top3.length>0&&(
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:20}}>
          {[1,2,3].map(pos=>{
            const p=top3.find(x=>x.pos===pos);
            const medBg=pos===1?"linear-gradient(135deg,#fbbf24,#f59e0b)":pos===2?"linear-gradient(135deg,#94a3b8,#64748b)":"linear-gradient(135deg,#f97316,#ea580c)";
            return(
              <div key={pos} style={{flex:"1 1 150px",minWidth:140,textAlign:"center",
                borderRadius:12,overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>
                <div style={{background:medBg,padding:"16px 8px 12px"}}>
                  <div style={{fontSize:32}}>{p?.ico||"❓"}</div>
                  <div style={{color:"#fff",fontWeight:900,fontSize:11,marginTop:4,letterSpacing:1}}>{p?.lbl||`${pos}${ordSfx(pos)} Place`}</div>
                </div>
                <div style={{background:"#fff",padding:"12px 8px",borderTop:"3px solid rgba(0,0,0,.05)"}}>
                  <div style={{fontWeight:800,fontSize:13,color:NAVY,lineHeight:1.3}}>
                    {p?.id?tm(p.id)?.name:<span style={{color:"#94a3b8",fontStyle:"italic"}}>TBD</span>}
                  </div>
                  {p?.id&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{tm(p.id)?.cls}</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {/* Full placing table */}
      <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
        <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
          <thead>
            <tr style={{background:NAVY,color:"#fff"}}>
              <th style={{padding:"9px 12px",fontWeight:700,width:80}}>Place</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"left"}}>Team</th>
              <th style={{padding:"9px 12px",fontWeight:700,width:80,textAlign:"center"}}>Class</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"left",width:160}}>Notes</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"center",width:100}}>Set Place</th>
            </tr>
          </thead>
          <tbody>
            {places.sort((a,b)=>a.pos-b.pos).map((p,i)=>{
              const team=tm(p.id);
              const rowBg=i%2===0?"#fff":"#f8fafc";
              const plcColor=p.pos===1?"#b45309":p.pos===2?"#64748b":p.pos===3?"#c2410c":"#1e293b";
              return(
                <tr key={p.id||i} style={{background:rowBg,borderTop:"1px solid #f1f5f9"}}>
                  <td style={{padding:"8px 12px",textAlign:"center",fontWeight:900,fontSize:14,color:plcColor}}>
                    {p.ico} {p.pos}{ordSfx(p.pos)}
                  </td>
                  <td style={{padding:"8px 12px",fontWeight:700,color:NAVY}}>
                    {team?<>
                      {team.state&&<span style={{fontSize:10,color:"#94a3b8",marginRight:4}}>[{team.state}]</span>}
                      {team.name}
                    </>:<span style={{color:"#94a3b8",fontStyle:"italic"}}>TBD</span>}
                  </td>
                  <td style={{padding:"8px 12px",textAlign:"center"}}>
                    {team&&<span style={{background:"#f1f5f9",border:"1px solid #cbd5e1",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700,color:"#475569"}}>{team.cls}</span>}
                  </td>
                  <td style={{padding:"8px 12px",color:"#64748b",fontSize:12}}>{p.lbl}</td>
                  <td style={{padding:"8px 12px",textAlign:"center"}}>
                    <input type="number" min="0" placeholder="Override"
                      style={{width:64,padding:"4px 6px",border:"1px solid #cbd5e1",borderRadius:4,fontSize:11,textAlign:"center"}}/>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:10,fontSize:11,color:"#94a3b8"}}>
        * Set Place to 0 to hide a team from standings display. Overrides are used for tiebreak situations not resolvable by bracket position alone.
      </div>
    </div>
  );
}

/* ════════════════════ EVENT DETAIL ════════════════════ */
function EventDetailView({ev,onBack,onNav,evRosters,setEvRosters,onSchedule}){
  const divisions=(ev.divisions||[]).map(normDiv);
  const firstId=divisions.length>0?divisions[0].id:null;
  const [activeDivId,setActiveDivId]=useState(firstId);
  const [evTab,setEvTab]=useState("roster");
  const [dirDivId,setDirDivId]=useState(firstId);
  const [flightId,setFlightId]=useState(null);
  const [pubTab,setPubTab]=useState("standings");
  const [pubDivId,setPubDivId]=useState(firstId);
  const [pubBg,setPubBg]=useState(()=>bracketGamesDB(firstId||""));
  const [teamSearch,setTeamSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [actionTeamId,setActionTeamId]=useState(null);
  const [schedMsg,setSchedMsg]=useState("");

  const rosterKey=String(ev.id)+"_"+(activeDivId||"");
  const divRoster=evRosters[rosterKey]||[];
  const activeDivObj=divisions.find(d=>d.id===activeDivId)||divisions[0]||null;
  const dirDiv=divisions.find(d=>d.id===dirDivId)||divisions[0]||null;
  const dirFlights=dirDiv?dirDiv.flights:[];
  const dirFlight=(flightId?dirFlights.find(f=>f.id===flightId):null)||(dirFlights.length>0?dirFlights[0]:null);
  const pubDivNorm=divisions.find(d=>d.id===pubDivId)||divisions[0];
  const pubTeams=teamDB(pubDivNorm?pubDivNorm.id:"");
  const pubGames=poolGamesDB(pubDivNorm?pubDivNorm.id:"");
  const searchResults=teamSearch.length>1?ALL_TEAMS.filter(t=>t.name.toLowerCase().includes(teamSearch.toLowerCase())).slice(0,12):[];
  const totalTeams=divisions.reduce((a,d)=>a+d.numTeams,0);
  const paidCount=divRoster.filter(t=>t.payStatus==="Paid").length;
  const approvedCount=divRoster.filter(t=>t.entryStatus==="Approved").length;
  const totalEntryDue=divRoster.reduce((a,t)=>a+(parseFloat(t.entryFee)||0)+(parseFloat(t.gateFee)||0),0);
  const totalPaid=divRoster.filter(t=>t.payStatus==="Paid").reduce((a,t)=>a+(parseFloat(t.entryFee)||0)+(parseFloat(t.gateFee)||0),0);
  const totalOwed=totalEntryDue-totalPaid;
  const ENTRY_STATUSES=["Approved","Pending","Hold","Waitlist"];
  const PAY_STATUSES=["Paid","Partial Paid","Not Paid"];
  const inStyle={width:"100%",padding:"3px 6px",border:"1px solid #ddd",borderRadius:4,fontSize:12,boxSizing:"border-box"};

  function updateRoster(fn){setEvRosters(p=>({...p,[rosterKey]:fn(p[rosterKey]||[])}));}
  function addTeam(team){
    const already=(evRosters[rosterKey]||[]).some(t=>t.id===team.id);
    if(already)return;
    updateRoster(prev=>[...prev,{...team,entryStatus:"Approved",payStatus:"Not Paid",entryFee:"",gateFee:"",notes:""}]);
    setTeamSearch("");
  }
  function removeTeam(teamId){updateRoster(prev=>prev.filter(t=>t.id!==teamId));}
  function setField(teamId,field,val){updateRoster(prev=>prev.map(t=>t.id===teamId?{...t,[field]:val}:t));}
  function handleSchedule(){
    if(divRoster.length===0){setSchedMsg("Add teams to this division first before opening Schedule Builder.");return;}
    setSchedMsg("");
    if(onSchedule)onSchedule({evId:ev.id,evName:ev.name,divId:activeDivId,divLabel:activeDivObj?activeDivObj.label:"Division",teams:divRoster});
  }

  return(
    <div onClick={()=>setActionTeamId(null)}>
      <div className="flex-b mb4">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← Back to Events</button>
        <div className="flex-c gap-3">
          <button className="btn btn-primary btn-sm" onClick={e=>{e.stopPropagation();handleSchedule();}}>📅 Schedule in Builder →</button>
          <Ev_StatusBadge status={ev.status}/>
        </div>
      </div>
      <div className="card mb4">
        <div className="card-body" style={{padding:"14px 20px"}}>
          <div style={{fontSize:20,fontWeight:900,color:"var(--navy)",marginBottom:4}}>{ev.name}</div>
          <div className="t-sm t-gray">📍 {ev.loc} · 📅 {ev.date} · {ev.stature}{ev.director?` · Director: ${ev.director}`:""}</div>
          <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
            {ev.format?<span className="badge b-blue">{ev.format}</span>:null}
            <span className="badge b-gray">{divisions.length} Division{divisions.length!==1?"s":""}</span>
            <span className="badge b-gray">{totalTeams} Teams</span>
            {ev.lwc?<span className="badge b-gold">{ev.lwc==="open"?"Open for Entries":ev.lwc==="waitlist"?"Wait List":ev.lwc==="closed"?"Closed":"On Hold"}</span>:null}
          </div>
        </div>
      </div>
      <div className="tabs" style={{marginBottom:16}}>
        <div className={`tab ${evTab==="roster"?"active":""}`} onClick={()=>setEvTab("roster")}>👥 Team Roster</div>
        <div className={`tab ${evTab==="director"?"active":""}`} onClick={()=>setEvTab("director")}>🔧 Director Tools</div>
        <div className={`tab ${evTab==="public"?"active":""}`} onClick={()=>setEvTab("public")}>👁 Public View</div>
      </div>
      {evTab==="roster"?(
        <div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
            {divisions.map(d=>{
              const dk=String(ev.id)+"_"+d.id;
              const cnt=(evRosters[dk]||[]).length;
              return(
                <div key={d.id} className={`div-pill ${activeDivId===d.id?"dp-on":"dp-off"}`}
                  onClick={e=>{e.stopPropagation();setActiveDivId(d.id);setActionTeamId(null);setTeamSearch("");setSchedMsg("");}}>
                  {d.label}<span style={{fontSize:10,opacity:.65,marginLeft:4}}>{cnt>0?"("+cnt+" rostered)":"("+d.numTeams+"t)"}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
            <div className="stat-card"><div className="stat-ico" style={{background:"#dbeafe"}}>👥</div><div><div className="stat-val">{divRoster.length}</div><div className="stat-lbl">Rostered</div></div></div>
            <div className="stat-card"><div className="stat-ico" style={{background:"#dcfce7"}}>✓</div><div><div className="stat-val">{approvedCount}</div><div className="stat-lbl">Approved</div></div></div>

/* ════════════════════ DASHBOARD ════════════════════ */
function Dashboard({events,onSelect,onNav}){
  const [stateF,setStateF]=useState("all");
  const [seasonF,setSeasonF]=useState("all");
  const [directorF,setDirectorF]=useState("all");
  const [statureF,setStatureF]=useState("all");
  const getYear=d=>{const m=d.match(/\d{4}/);return m?m[0]:null;};
  const seasons=[...new Set(events.map(e=>getYear(e.date)).filter(Boolean))].sort((a,b)=>b-a);
  const directors=[...new Set(events.map(e=>e.director).filter(Boolean))].sort();
  const statures=[...new Set(events.map(e=>e.stature).filter(Boolean))].sort();
  const shown=events.filter(e=>
    (stateF==="all"||e.state===stateF)&&
    (seasonF==="all"||getYear(e.date)===seasonF)&&
    (directorF==="all"||e.director===directorF)&&
    (statureF==="all"||e.stature===statureF)
  );
  const totalTeams=shown.reduce((a,ev)=>a+ev.divisions.reduce((b,d)=>b+(d.numTeams||0),0),0);
  return(
    <div>
      <div className="g4 mb4">
        <div className="stat-card"><div className="stat-ico" style={{background:"#fde8e8"}}>📅</div><div><div className="stat-val">{shown.length}</div><div className="stat-lbl">Total Events</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d6eaf8"}}>⏳</div><div><div className="stat-val">{shown.filter(e=>e.status==="upcoming").length}</div><div className="stat-lbl">Upcoming</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d5f5e3"}}>✅</div><div><div className="stat-val">{shown.filter(e=>e.status==="complete").length}</div><div className="stat-lbl">Completed</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#fef5e7"}}>👥</div><div><div className="stat-val">{totalTeams}</div><div className="stat-lbl">Total Teams</div></div></div>
      </div>
      <div className="card">
        <div className="card-hd">
          <span className="card-title">Event Information — {shown.length} of {events.length} Results</span>
          <div className="flex-w gap-2">
            <select value={seasonF} onChange={e=>setSeasonF(e.target.value)}>
              <option value="all">All Seasons</option>
              {seasons.map(s=><option key={s} value={s}>Season: {s}</option>)}
            </select>
            <select value={stateF} onChange={e=>setStateF(e.target.value)}>
              <option value="all">All States</option>
              {[...new Set(events.map(e=>e.state))].sort().map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={directorF} onChange={e=>setDirectorF(e.target.value)}>
              <option value="all">All Directors</option>
              {directors.map(d=><option key={d}>{d}</option>)}
            </select>
            <select value={statureF} onChange={e=>setStatureF(e.target.value)}>
              <option value="all">All Statures</option>
              {statures.map(s=><option key={s}>{s}</option>)}
            </select>
            <button className="btn btn-primary btn-sm" onClick={()=>onNav("create")}>+ Create New Event</button>
          </div>
        </div>
        <div className="tbl-scroll">
          <table>
            <thead><tr>
              <th style={{width:14}}></th><th>Event ID</th><th>State</th><th>Start Date</th>
              <th>Event Name</th><th># Div</th><th>Teams</th><th>Stature</th><th>Director</th><th>Status</th><th style={{width:90}}>Actions</th>
            </tr></thead>
            <tbody>{shown.map(ev=>(
              <tr key={ev.id} onClick={()=>onSelect(ev)} style={{cursor:"pointer"}}>
                <td style={{paddingLeft:12}}><div style={{width:8,height:8,borderRadius:"50%",background:ev.status==="complete"?"var(--green)":ev.status==="live"?"var(--red)":"var(--blue)"}}/></td>
                <td className="fw7 t-sm">{ev.evid}</td>
                <td><span className="badge b-gray">{ev.state}</span></td>
                <td className="t-sm">{ev.date}</td>
                <td><span style={{color:"var(--blue)",fontWeight:700}}>{ev.name}</span></td>
                <td className="t-sm">{ev.divisions.length}</td>
                <td className="t-sm">{ev.divisions.reduce((a,d)=>a+(d.numTeams||0),0)}</td>
                <td className="t-sm">{ev.stature}</td>
                <td className="t-sm">{ev.director}</td>
                <td><Ev_StatusBadge status={ev.status}/></td>
                <td onClick={e=>e.stopPropagation()} style={{whiteSpace:"nowrap"}}>
                  <button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:"3px 8px",marginRight:4}} onClick={()=>onSelect(ev)}>Open</button>
                  <button className="btn btn-primary btn-sm" style={{fontSize:11,padding:"3px 8px"}} onClick={()=>onNav("s-layout")}>📋</button>
                </td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
