*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
:root{
  --red:#c0392b;--red-d:#922b21;--red-l:#fadbd8;
  --navy:#1a1a2e;--navy-m:#16213e;--navy-l:#0f3460;
  --gold:#e67e22;--gold-l:#fef5e7;
  --green:#27ae60;--green-l:#d5f5e3;
  --blue:#2980b9;--blue-l:#d6eaf8;
  --purple:#8e44ad;--purple-l:#f4ecf7;
  --gray:#95a5a6;--gray-l:#f8f9fa;--gray-m:#ecf0f1;--gray-d:#7f8c8d;
  --white:#fff;
  --sh:0 2px 8px rgba(0,0,0,.1);--sh-lg:0 8px 32px rgba(0,0,0,.15);
  --r:10px;--r-sm:6px

.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto;flex-shrink:0}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.content{padding:20px 24px;flex:1}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo .brand{font-size:20px;font-weight:900;color:var(--red);letter-spacing:-.5px}
.sb-logo .sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.sb-sec{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-lbl{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px;padding:6px 14px 3px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:.15s;border-left:3px solid transparent;white-space:nowrap}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:rgba(192,57,43,.22);color:#fff;border-left-color:var(--red);font-weight:600}
.sb-item .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.tb-title{font-size:17px;font-weight:800;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--gray);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:10px}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh)}
.card-hd{padding:14px 18px 10px;border-bottom:1px solid var(--gray-m);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13.5px;font-weight:700;color:var(--navy)}
.card-body{padding:18px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-d)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-m)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#1e8449}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1a6fa0}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#ca6f1e}
.btn-secondary{background:var(--gray-m);color:var(--navy)}.btn-secondary:hover{background:#dde}
.btn-outline{background:transparent;border:1.5px solid var(--gray);color:#555}.btn-outline:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn-danger{background:var(--red-l);color:var(--red-d)}.btn-danger:hover{background:var(--red-d);color:#fff}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700}
.b-red{background:var(--red-l);color:var(--red-d)}
.b-green{background:var(--green-l);color:#1e6b3d}
.b-blue{background:var(--blue-l);color:#1a5276}
.b-gold{background:var(--gold-l);color:#7a4f00}
.b-gray{background:var(--gray-m);color:#555}
.b-navy{background:var(--navy);color:#fff}
.status{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700}
.s-final{background:var(--green-l);color:var(--green)}
.s-live{background:#fef3cd;color:#b7770d}
.s-scheduled{background:var(--blue-l);color:var(--blue)}
.s-upcoming{background:var(--gray-m);color:var(--gray-d)}
.tabs{display:flex;border-bottom:2px solid var(--gray-m);margin-bottom:18px;overflow-x:auto;gap:0}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.flex{display:flex}.flex-c{display:flex;align-items:center}.flex-b{display:flex;align-items:center;justify-content:space-between}.flex-w{display:flex;flex-wrap:wrap}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.stat-card{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px}
.stat-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-val{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:11.5px;letter-spacing:.3px;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--gray-m);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.tbl-wrap{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tbl-scroll{overflow-x:auto}
.div-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.div-pill{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:.15s}
.dp-off{background:var(--gray-m);color:#555}.dp-off:hover{background:#dde}
.dp-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.fl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fl-tab{padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--gray-m);color:#666;background:#fff;transition:.15s}
.fl-tab:hover{border-color:var(--navy-l);color:var(--navy)}
.fl-tab.on{border-color:var(--red);color:var(--red);background:var(--red-l)}
.fl-tab.fl-live::after{content:" 🔴";font-size:9px}
.fl-add{border-style:dashed!important}
.score-in{width:54px;padding:5px 6px;border:2px solid var(--gray-m);border-radius:var(--r-sm);font-size:14px;font-weight:800;text-align:center;transition:.15s}
.score-in:focus{outline:none;border-color:var(--blue)}
.score-w{background:var(--green-l);border-color:var(--green);color:var(--green)}
.score-l{color:var(--gray)}
.seed-rank{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sr-1{background:#f39c12;color:#7a5000}
.sr-2{background:#adb5bd}
.sr-3{background:#cd7f32}
.brk-wrap{overflow-x:auto;padding:8px 0}
.brk{display:flex;align-items:flex-start;min-width:600px}
.brk-col{display:flex;flex-direction:column;min-width:195px}
.brk-rnd-lbl{text-align:center;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 10px}
.brk-game{border:2px solid var(--gray-m);border-radius:8px;margin:5px 8px;background:#fff;overflow:hidden;box-shadow:var(--sh)}
.brk-team{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;font-size:12px;border-bottom:1px solid var(--gray-m);gap:8px;min-height:34px}
.brk-team:last-child{border-bottom:none}
.brk-w{background:var(--green-l);font-weight:700}
.brk-l{color:#bbb}
.brk-tbd{color:#ccc;font-style:italic;font-size:11px}
.brk-sc{font-weight:900;font-size:14px;min-width:22px;text-align:right}
.brk-sc-w{color:var(--green)}
.brk-meta{font-size:10px;color:var(--gray);padding:0 8px 4px;text-align:center}
.ly-wrap{border:2px solid var(--gray-m);border-radius:var(--r);overflow:hidden;margin-top:12px}
.ly-hdr{display:flex;background:var(--navy)}

.ly-fld-hdr{flex:1;padding:8px;text-align:center;font-size:11px;font-weight:700;color:#fff;border-left:1px solid rgba(255,255,255,.1)}
.ly-row{display:flex;border-top:1px solid var(--gray-m)}
.ly-row:hover{background:#fafbff}
.ly-time{width:85px;padding:8px 6px;font-size:11px;font-weight:600;color:var(--gray-d);text-align:center;flex-shrink:0;border-right:2px solid var(--gray-m);display:flex;align-items:center;justify-content:center}
.ly-slot{flex:1;border-left:1px solid var(--gray-m);min-height:50px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center;padding:4px}
.ly-slot:hover{background:#eff6ff}
.ly-slot.has-game{background:#e8f4fd;cursor:default}
.ly-slot.blocked{background:var(--red-l);cursor:not-allowed}
.ly-chip{background:var(--blue);color:#fff;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;text-align:center;width:100%;line-height:1.3}
.ly-chip .t2{font-size:9px;opacity:.8;margin-top:2px}
.pool-hdr{font-size:12px;font-weight:800;padding:8px 12px;background:var(--navy);color:#fff;border-radius:var(--r-sm) var(--r-sm) 0 0;letter-spacing:.3px}
.pool-tbl{border:1px solid var(--gray-m);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);overflow:hidden;margin-bottom:18px}
.alert{padding:10px 14px;border-radius:var(--r-sm);font-size:12.5px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start}
.a-info{background:var(--blue-l);color:#1a5276;border-left:4px solid var(--blue)}
.a-warn{background:var(--gold-l);color:#7a4f00;border-left:4px solid var(--gold)}
.a-success{background:var(--green-l);color:#1e6b3d;border-left:4px solid var(--green)}
.a-purple{background:var(--purple-l);color:#5b2c6f;border-left:4px solid var(--purple)}

label{font-size:12px;font-weight:600;color:var(--gray-d);display:block;margin-bottom:3px}
.pp-cell{width:34px;height:34px;border-radius:6px;background:var(--gray-m);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin:auto}

.pp-cell-2{background:#e8f4fd;color:var(--blue)}
.pitch-bar{height:12px;border-radius:6px;background:var(--green-l);overflow:hidden;margin-top:4px}

.pitch-fill.warn{background:var(--gold)}
.pitch-fill.danger{background:var(--red)}

.place-team{font-size:14px;font-weight:800;color:var(--navy)}
.place-detail{font-size:11px;color:var(--gray);margin-top:3px}
.pub-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);color:#fff;padding:28px 32px 0}
.pub-ename{font-size:24px;font-weight:900;letter-spacing:-.5px}
.pub-meta{font-size:13px;opacity:.7;margin-top:3px}
.pub-divs{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.pub-div{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);border:2px solid rgba(255,255,255,.2);transition:.15s}
.pub-div:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.pub-div.on{color:#fff;background:var(--red);border-color:var(--red)}
.pub-tabs{display:flex;margin-top:16px}
.pub-tab{padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);border-bottom:3px solid transparent;transition:.15s}
.pub-tab:hover{color:#fff}
.pub-tab.on{color:#fff;border-bottom-color:var(--red)}
.pub-body{padding:22px 32px}
.v-toggle{display:flex;border:2px solid var(--gray-m);border-radius:8px;overflow:hidden}
.v-btn{padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#fff;color:#777;transition:.15s}
.v-btn.on{background:var(--navy);color:#fff}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.t-sm{font-size:12px}.t-xs{font-size:11px}.t-gray{color:var(--gray)}.t-navy{color:var(--navy)}.t-red{color:var(--red)}.t-green{color:var(--green)}
.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.w100{width:100%}
hr{border:none;border-top:1px solid var(--gray-m);margin:16px 0}
.chip{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.chip-a{background:#dbeafe;color:#1e40af}
.chip-b{background:#dcfce7;color:#15803d}
.chip-c{background:#fef3c7;color:#92400e}
.chip-d{background:#fce7f3;color:#9d174d}
.tgl{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-m)}
.tgl:last-child{border-bottom:none}
.tgl-sw{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.tgl-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
</style>

/* ════════════════════ HELPERS ════════════════════ */
function tByIdFrom(id,db){return db.find(t=>t.id===id)}
function winOf(g){if(g.status!=="final"||g.s1===null)return null;return g.s1>g.s2?g.t1:g.t2}
function loseOf(g){if(g.status!=="final"||g.s1===null)return null;return g.s1>g.s2?g.t2:g.t1}
function calcStandings(teams,games){
  const s={};
  teams.forEach(t=>{s[t.id]={...t,w:0,l:0,t_:0,pf:0,pa:0,pts:0}});
  games.forEach(g=>{
    if(g.status!=="final"||g.s1===null)return;
    if(!s[g.t1]||!s[g.t2])return;
    s[g.t1].pf+=g.s1;s[g.t1].pa+=g.s2;
    s[g.t2].pf+=g.s2;s[g.t2].pa+=g.s1;
    if(g.s1>g.s2){s[g.t1].w++;s[g.t2].l++;s[g.t1].pts+=2}
    else if(g.s2>g.s1){s[g.t2].w++;s[g.t1].l++;s[g.t2].pts+=2}
    else{s[g.t1].t_++;s[g.t2].t_++;s[g.t1].pts++;s[g.t2].pts++}
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||(b.pf-b.pa)-(a.pf-a.pa)||b.pf-a.pf);
}
function poolChipClass(pool){return{A:"chip-a",B:"chip-b",C:"chip-c",D:"chip-d"}[pool]||"chip-a"}
function teamDB(divId){
  const map={101:T9,102:T12,103:T9,104:T9,105:T9,106:T8,203:T12,501:T12};
  return map[divId]||T8;
}
function poolGamesDB(divId){
  const map={106:PG8,105:PG9,203:PG12};
  return map[divId]||[];
}
function bracketGamesDB(divId){
  const map={106:BG8,105:BG9};
  return map[divId]||[];
}

}

/* ════════════════════ SEEDS ════════════════════ */
function SeedsView({teams,divCode=""}){
  const ageNum=cls=>{const m=(cls||"").match(/^(\d+)/);return m?parseInt(m[1]):0};
  const clsSuffix=cls=>(cls||"").replace(/^\d+/,"");
  const CLASS_ORDER=["Maj","AAA","AA","A","B","C"];
  const isOpen=/Op$/i.test(divCode);
  // Open events: group by age only. Classed events: group by age + class.
  const groupMap={};
  teams.forEach(t=>{
    const age=ageNum(t.cls);
    const suf=isOpen?"Open":clsSuffix(t.cls)||t.cls||"Other";
    const key=isOpen?`${age}`:`${age}||${suf}`;
    if(!groupMap[key])groupMap[key]={age,suf,teams:[]};
    groupMap[key].teams.push(t);
  });
  // Sort groups: age ascending, then class by rank (Maj first)
  const groups=Object.values(groupMap).sort((a,b)=>{
    if(a.age!==b.age)return a.age-b.age;
    if(a.suf==="Open"&&b.suf==="Open")return 0;
    const ai=CLASS_ORDER.indexOf(a.suf),bi=CLASS_ORDER.indexOf(b.suf);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  // Sort teams within each group by pts+pr desc
  groups.forEach(g=>g.teams.sort((a,b)=>((b.pts||0)+(b.pr||0))-((a.pts||0)+(a.pr||0))));
  return(
    <div>
      <Alrt type="info">📊 Teams seeded by USSSA Points + Power Rating.{isOpen?" Open event — all teams seeded together by age.":" Classed event — each age + class division seeds independently."}</Alrt>
      {groups.map(g=>(
        <div key={`${g.age}${g.suf}`} style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"7px 14px",
            background:"#eff6ff",borderLeft:"4px solid #1e3a5f",borderRadius:"0 5px 5px 0"}}>
            <span style={{fontWeight:800,fontSize:15,color:"#1e3a5f"}}>{g.age>0?`${g.age}U`:""}{g.suf?" "+g.suf:""}</span>
            <span style={{fontSize:12,color:"#64748b",fontWeight:600}}>{g.teams.length} {g.teams.length===1?"team":"teams"}</span>
          </div>
          <div className="tbl-wrap">
            <table>
              <thead><tr>
                <th style={{width:40}}>#</th>
                <th>Team</th>
                <th>State · City</th>
                <th>USSSA Pts</th>
                <th>Power Rating</th>
                <th>Total Score</th>
                <th>In-Class</th>
                <th>Overall</th>
              </tr></thead>
              <tbody>{g.teams.map((t,i)=>(
                <tr key={t.id}>
                  <td><SeedRank n={i+1}/></td>
                  <td className="fw7" style={{color:"var(--blue)"}}>{t.name}</td>
                  <td className="t-sm">{t.state} · {t.city}</td>
                  <td className="fw7">{t.pts||"—"}</td>
                  <td>{t.pr||"—"}</td>
                  <td className="fw8" style={{color:"var(--navy)"}}>{(t.pts||0)+(t.pr||0)||"—"}</td>
                  <td>{t.icr||"—"}</td>
                  <td>{t.ovr||"—"}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

    border:`2px solid ${isWin?"#16a34a":isLos?"#e2e8f0":"#cbd5e1"}`,

    outline:"none",appearance:"textfield",MozAppearance:"textfield"

    {key:"no_score",lbl:"No Score",bg:"#2563eb",c:"#fff"},

    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 18px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>

      </div>
      {/* Matchup */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 0",borderTop:"1px solid #f1f5f9",borderBottom:"1px solid #f1f5f9"}}>

        <div style={{flex:1,textAlign:"right",paddingRight:4}}>

            ?<select autoFocus style={{fontSize:13,padding:"5px 8px",border:"2px solid #93c5fd",borderRadius:6,maxWidth:220}}
                onBlur={()=>setEditSide(null)} value={g.t1||""}

              <span onClick={()=>!readOnly&&setEditSide("t1")}

              style={{fontSize:11,padding:"5px 8px",border:"1px solid #e2e8f0",borderRadius:6,color:"#64748b",background:"#f8fafc"}}>
              <option value="">No Home Team</option>
              <option value="t1">{t1?.name?.split(" ")[0]||"Team 1"} (Home)</option>
              <option value="t2">{t2?.name?.split(" ")[0]||"Team 2"} (Home)</option>
            </select>
            <button onClick={()=>onSwapTeams(g.id)}
              style={{padding:"6px 12px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",
                border:"none",background:"#f1f5f9",color:"#475569"}}>⇄ Swap</button>

        </div>
      )}

  );
}

function GameMgrView({games,setGames,teams,readOnly}){
  const [fTeam,setFTeam]=useState("all");
  const [fPool,setFPool]=useState("all");
  const [showAddGame,setShowAddGame]=useState(false);
  const [newGame,setNewGame]=useState({pool:"A",date:"",time:"",field:"",t1:"",t2:""});
  const pools=[...new Set(games.map(g=>g.pool))].filter(Boolean).sort();
  const shown=games.filter(g=>(fPool==="all"||g.pool===fPool)&&(fTeam==="all"||g.t1===fTeam||g.t2===fTeam));
  const byPool={};
  shown.forEach(g=>{if(!byPool[g.pool])byPool[g.pool]=[];byPool[g.pool].push(g);});
  const poolPalette=[
    {bg:"#eff6ff",c:"#1d4ed8"},{bg:"#f0fdf4",c:"#15803d"},{bg:"#fdf4ff",c:"#7e22ce"},
    {bg:"#fff7ed",c:"#c2410c"},{bg:"#f0f9ff",c:"#0369a1"},{bg:"#fefce8",c:"#a16207"},
  ];

  function updField(id,k,v){
    if(readOnly)return;
    setGames(prev=>{const u=prev.map(g=>g.id===id?{...g,[k]:v}:g);const gm=u.find(g=>g.id===id);if(gm)dbSave('games',gm);return u;});
  }
  function updScore(id,k,v){
    if(readOnly)return;
    const n=v===""?null:parseInt(v);
    setGames(prev=>{
      const u=prev.map(g=>{if(g.id!==id)return g;const u2={...g,[k]:isNaN(n)?null:n};if(u2.s1!=null&&u2.s2!=null)u2.status="final";return u2;});
      const gm=u.find(g=>g.id===id);if(gm)dbSave('games',gm);return u;
    });
  }
  function setStatus(id,status){
    if(readOnly)return;
    setGames(prev=>{
      const u=prev.map(g=>{if(g.id!==id)return g;
        if(status==="clear")return{...g,s1:null,s2:null,status:"scheduled",home:null,gameType:"scored"};
        if(status==="scheduled")return{...g,s1:null,s2:null,status:"scheduled"};
        return{...g,status,gameType:status};});
      const gm=u.find(g=>g.id===id);if(gm)dbSave('games',gm);return u;
    });
  }
  function swapTeams(id){
    setGames(prev=>{const u=prev.map(g=>g.id===id?{...g,t1:g.t2,t2:g.t1,s1:g.s2,s2:g.s1}:g);const gm=u.find(g=>g.id===id);if(gm)dbSave('games',gm);return u;});
  }
  function renumber(){
    setGames(prev=>{const byP={};const u=prev.map(g=>{byP[g.pool]=(byP[g.pool]||0)+1;return{...g,num:`${g.pool||"G"}${byP[g.pool]}`};});u.forEach(g=>dbSave('games',g));return u;});
  }
  function addGame(){
    if(!newGame.t1||!newGame.t2){alert("Please select both teams.");return;}
    const pool=newGame.pool||"A";
    const pGames=games.filter(g=>g.pool===pool);
    const g={id:"g_"+Date.now(),num:`${pool}${pGames.length+1}`,pool,date:newGame.date,time:newGame.time,
      field:newGame.field,t1:newGame.t1,t2:newGame.t2,s1:null,s2:null,status:"scheduled",home:null,gameType:"scored"};
    setGames(prev=>[...prev,g]);dbSave('games',g);
    setNewGame({pool:"A",date:"",time:"",field:"",t1:"",t2:""});setShowAddGame(false);
  }

  return(
    <div>
      {/* Top bar */}
      <div className="card mb4">
        <div className="card-body flex-w gap-3" style={{alignItems:"flex-end"}}>
          <div><label>Pool</label>
            <select value={fPool} onChange={e=>setFPool(e.target.value)}>
              <option value="all">All Pools</option>
              {pools.map(p=><option key={p} value={p}>Pool {p}</option>)}
            </select>
          </div>
          <div><label>Team</label>
            <select value={fTeam} onChange={e=>setFTeam(e.target.value)} style={{width:200}}>
              <option value="all">All Teams</option>
              {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:13,color:"#94a3b8",fontWeight:500}}>{shown.length} game{shown.length!==1?"s":""}</span>
            {!readOnly&&<>
              <button className="btn btn-secondary btn-sm" onClick={renumber}>🔢 Renumber</button>
              <button className="btn btn-primary btn-sm" onClick={()=>setShowAddGame(v=>!v)}>+ Add Game</button>
            </>}
          </div>
        </div>
        {showAddGame&&!readOnly&&(
          <div className="card-body" style={{borderTop:"1px solid #e8edf2",background:"#f8fafc"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,alignItems:"end"}}>
              <div><label style={{fontSize:11,fontWeight:600}}>Pool</label>
                <input style={{width:"100%",padding:"5px 8px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13}} value={newGame.pool} onChange={e=>setNewGame(p=>({...p,pool:e.target.value.toUpperCase()}))} placeholder="A"/></div>
              <div><label style={{fontSize:11,fontWeight:600}}>Date</label>
                <input type="date" style={{width:"100%",padding:"5px 8px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13}} value={newGame.date} onChange={e=>setNewGame(p=>({...p,date:e.target.value}))}/></div>
              <div><label style={{fontSize:11,fontWeight:600}}>Time</label>
                <input type="time" style={{width:"100%",padding:"5px 8px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13}} value={newGame.time} onChange={e=>setNewGame(p=>({...p,time:e.target.value}))}/></div>
              <div><label style={{fontSize:11,fontWeight:600}}>Field</label>
                <input style={{width:"100%",padding:"5px 8px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13}} value={newGame.field} onChange={e=>setNewGame(p=>({...p,field:e.target.value}))} placeholder="Field 1"/></div>
              <div><label style={{fontSize:11,fontWeight:600}}>Team 1</label>
                <select style={{width:"100%",padding:"5px 8px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13}} value={newGame.t1} onChange={e=>setNewGame(p=>({...p,t1:e.target.value}))}>
                  <option value="">— Select —</option>
                  {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                </select></div>
              <div><label style={{fontSize:11,fontWeight:600}}>Team 2</label>
                <select style={{width:"100%",padding:"5px 8px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13}} value={newGame.t2} onChange={e=>setNewGame(p=>({...p,t2:e.target.value}))}>
                  <option value="">— Select —</option>
                  {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                </select></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="btn btn-primary btn-sm" onClick={addGame}>✓ Add Game</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowAddGame(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      {/* Games by Pool */}
      {Object.keys(byPool).sort().map((pool,pi)=>{
        const pal=poolPalette[pi%poolPalette.length];
        return(
          <div key={pool} style={{marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <span style={{background:pal.bg,color:pal.c,padding:"5px 16px",borderRadius:20,fontSize:13,fontWeight:700}}>Pool {pool}</span>
              <span style={{color:"#94a3b8",fontSize:12}}>{byPool[pool].length} game{byPool[pool].length!==1?"s":""}</span>
              <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
            </div>
            {byPool[pool].map(g=>(
              <GameCard key={g.id} g={g} teams={teams} readOnly={readOnly}
                onUpdField={updField} onUpdScore={updScore} onSetStatus={setStatus} onSwapTeams={swapTeams}/>
            ))}
          </div>
        );
      })}

      {shown.length===0&&(
        <div style={{textAlign:"center",padding:"56px 0",color:"#94a3b8"}}>
          <div style={{fontSize:44,marginBottom:10}}>⚾</div>
          <div style={{fontSize:16,fontWeight:600,color:"#475569",marginBottom:4}}>No games found</div>
          <div style={{fontSize:13}}>Adjust filters or add a game above</div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════ LAYOUT BUILDER ════════════════════ */
function LayoutView({games,setGames,teams}){
  const fmtISO=d=>{const y=d.getFullYear(),m=(d.getMonth()+1).toString().padStart(2,'0'),dd=d.getDate().toString().padStart(2,'0');return`${y}-${m}-${dd}`;};
  const toMins=t=>{const[h,mn]=t.split(":").map(Number);return h*60+mn;};
  const toLabel=m=>{const h=Math.floor(m/60),mn=m%60,ap=h>=12?"PM":"AM",h12=h>12?h-12:h===0?12:h;return`${h12}:${mn.toString().padStart(2,"0")} ${ap}`;};
  const TIME_OPTS=["6:00 AM","6:30 AM","7:00 AM","7:30 AM","8:00 AM","8:30 AM","9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM","5:30 PM","6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM","8:30 PM","9:00 PM"];
  const FIELD_OPTS=["LWR B1","LWR B2","LWR B3","LWR B4","LWR B5","LWR B6","LWR B7","LWR B8","Frank Brown F1","Frank Brown F2","Frank Brown F3","Frank Brown F4","Frank Brown F5","Field 1","Field 2","Field 3","Field 4","Field 5","Field 6","Field 7","Field 8","Diamond 1","Diamond 2","Diamond 3","Diamond 4","Turf 1","Turf 2","Turf 3","Main Field","Varsity","JV Field","East 1","East 2","West 1","West 2","North 1","North 2","South 1","South 2","Complex A","Complex B","Complex C","Showcase 1","Showcase 2","Championship","Stadium","Auxiliary","Practice 1","Practice 2","TBD"];
  function makeRows(){
    const base=new Date();let n=1;const r=[];
    [{t:"2:30 PM",off:0},{t:"4:30 PM",off:0},{t:"6:30 PM",off:0}].forEach(({t,off})=>{const d=new Date(base);d.setDate(d.getDate()+off);r.push({id:`r${n}`,num:n++,date:fmtISO(d),time:t,cells:{}});});
    for(let i=1;i<=5;i++){const d=new Date(base);d.setDate(d.getDate()+i);r.push({id:`r${n}`,num:n++,date:fmtISO(d),time:"7:00 AM",cells:{}});}
    return r;
  }
  const [nf,setNf]=useState(2);
  const [gl,setGl]=useState("60");
  const [d1Start,setD1Start]=useState("08:00");
  const [d1End,setD1End]=useState("19:00");
  const [remStart,setRemStart]=useState("07:00");
  const [remEnd,setRemEnd]=useState("19:00");
  const [startRow,setStartRow]=useState("1");
  const [timeVar,setTimeVar]=useState("5");
  const [timeAct,setTimeAct]=useState("increase");
  const [coverage,setCoverage]=useState("day_chosen");
  const [fieldNames,setFieldNames]=useState(Array.from({length:50},(_,i)=>FIELD_OPTS[i]||`Field ${i+1}`));
  const [rows,setRows]=useState(makeRows);
  const [picked,setPicked]=useState(null);
  const [showNames,setShowNames]=useState(false);
  const [teamPick,setTeamPick]=useState([]);
  const [gamePool,setGamePool]=useState("A");
  const [showTeamPanel,setShowTeamPanel]=useState(true);

  const fields=fieldNames.slice(0,nf);
  const assignedIds=new Set(rows.flatMap(r=>Object.values(r.cells)).filter(v=>v!=="blocked"));
  const unscheduled=games.filter(g=>!assignedIds.has(g.id));
  const pickedGame=picked?games.find(g=>g.id===picked):null;
  const dayGroups=[...new Set(rows.map(r=>r.date))].sort();

  function submitFieldData(){
    const len=parseInt(gl);const base=new Date();const r=[];let n=1;
    let cur=toMins(d1Start),end=toMins(d1End);
    while(cur<=end){r.push({id:`r_${Date.now()}_${n}`,num:n++,date:fmtISO(base),time:toLabel(cur),cells:{}});cur+=len;}
    setRows(r);
  }
  function setResetTimes(){
    const len=parseInt(gl);
    const byDate={};rows.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r.id);});
    const dates=Object.keys(byDate).sort();
    const nr=[...rows];
    dates.forEach((date,di)=>{
      let cur=toMins(di===0?d1Start:remStart),end=toMins(di===0?d1End:remEnd);
      byDate[date].forEach(id=>{const idx=nr.findIndex(r=>r.id===id);if(idx>=0){nr[idx]={...nr[idx],time:toLabel(cur)};cur+=len;}});
    });
    setRows(nr);
  }
  function blockDay(date){setRows(prev=>prev.map(r=>{if(r.date!==date)return r;const c={};for(let i=0;i<nf;i++)c[i]="blocked";return{...r,cells:c};}));}
  function clearAllBlocked(){setRows(prev=>prev.map(r=>{const c={...r.cells};Object.keys(c).forEach(k=>{if(c[k]==="blocked")delete c[k];});return{...r,cells:c};}));}
  function clearGameCells(){setRows(prev=>prev.map(r=>{const c={...r.cells};Object.keys(c).forEach(k=>{if(c[k]!=="blocked")delete c[k];});return{...r,cells:c};}));}
  function autoSchedule(){
    let i=0;const toPlace=[...unscheduled];
    setRows(prev=>{
      const nr=prev.map(r=>({...r,cells:{...r.cells}}));
      outer:for(let ri=0;ri<nr.length;ri++){for(let fi=0;fi<nf;fi++){if(!nr[ri].cells[fi]&&i<toPlace.length){nr[ri].cells[fi]=toPlace[i].id;i++;}if(i>=toPlace.length)break outer;}}
      return nr;
    });
  }
  function addRow(){
    const last=rows[rows.length-1];
    setRows(prev=>[...prev,{id:`r_${Date.now()}`,num:prev.length+1,date:last?.date||fmtISO(new Date()),time:"7:00 AM",cells:{}}]);
  }
  function delRow(id){setRows(prev=>prev.filter(r=>r.id!==id).map((r,i)=>({...r,num:i+1})));}
  function updRow(id,k,v){setRows(prev=>prev.map(r=>r.id===id?{...r,[k]:v}:r));}
  function clickCell(rowId,fi){
    const row=rows.find(r=>r.id===rowId);const cur=row?.cells[fi];
    if(picked){
      if(!cur||cur==="blocked"){
        setRows(prev=>prev.map(r=>r.id===rowId?{...r,cells:{...r.cells,[fi]:picked}}:r));
        setGames(prev=>prev.map(g=>g.id===picked?{...g,time:row?.time,field:fields[fi],date:row?.date}:g));
        setPicked(null);
      }else if(cur!=="blocked"){
        setRows(prev=>prev.map(r=>r.id===rowId?{...r,cells:{...r.cells,[fi]:picked}}:r));
        setGames(prev=>prev.map(g=>g.id===picked?{...g,time:row?.time,field:fields[fi],date:row?.date}:g));
        setPicked(cur);
      }
      return;
    }
    if(!cur){setRows(prev=>prev.map(r=>r.id===rowId?{...r,cells:{...r.cells,[fi]:"blocked"}}:r));}
    else if(cur==="blocked"){setRows(prev=>prev.map(r=>{if(r.id!==rowId)return r;const c={...r.cells};delete c[fi];return{...r,cells:c};}));}
    else{setRows(prev=>prev.map(r=>{if(r.id!==rowId)return r;const c={...r.cells};delete c[fi];return{...r,cells:c};}));}
  }

  // Style helpers
  const F={fontSize:12,padding:"4px 7px",border:"1px solid #d1d5db",borderRadius:4,background:"#fff"};
  const B=(bg,fg,x={})=>({padding:"6px 13px",background:bg,color:fg,border:"none",borderRadius:5,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",...x});
  const NAVY="#1e3a5f", NAVYD="#16305a";
  const SW=[44,120,120]; // sticky col widths: Row, Date, Time
  const SL=[0,SW[0],SW[0]+SW[1]]; // left offsets
  const STH=(left,w,extra={})=>({position:"sticky",left,zIndex:3,background:NAVY,color:"#fff",padding:"9px 8px",
    fontWeight:700,fontSize:11,textAlign:"center",whiteSpace:"nowrap",minWidth:w,width:w,
    borderRight:"1px solid #2d5a8e",boxShadow:left===SL[2]?"3px 0 6px rgba(0,0,0,.15)":"none",...extra});
  const STD=(left,w,bg="#fff",extra={})=>({position:"sticky",left,zIndex:1,background:bg,padding:"5px 6px",
    textAlign:"center",borderRight:"1px solid #e2e8f0",boxShadow:left===SL[2]?"2px 0 4px rgba(0,0,0,.06)":"none",
    minWidth:w,width:w,...extra});

  return(
    <div>
      {/* ══ Settings Panel ══ */}
      <div className="card mb4">
        <div className="card-hd" style={{background:"linear-gradient(135deg,#1e3a5f,#2563eb)"}}>
          <span className="card-title" style={{color:"#fff"}}>⚙️ Layout Settings</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,.6)",marginLeft:8}}>{rows.length} rows · {nf} field{nf!==1?"s":""} · {assignedIds.size} assigned</span>
        </div>
        <div className="card-body" style={{padding:"18px 20px"}}>
          <div style={{display:"grid",gridTemplateColumns:"auto auto 1fr",gap:28,alignItems:"start",flexWrap:"wrap"}}>

            {/* Field Settings */}
            <div>
              <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Field Settings</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[
                  ["# Fields",<select value={nf} onChange={e=>setNf(+e.target.value)} style={F}>{Array.from({length:50},(_,i)=><option key={i+1}>{i+1}</option>)}</select>],
                  ["Game Time Length",<select value={gl} onChange={e=>setGl(e.target.value)} style={F}><option value="60">1 hour</option><option value="75">1 hr 15 min</option><option value="90">1 hr 30 min</option><option value="105">1 hr 45 min</option><option value="120">2 hours</option></select>],
                  ["Time Range (Day 1)",<div style={{display:"flex",gap:5,alignItems:"center"}}><input type="time" value={d1Start} onChange={e=>setD1Start(e.target.value)} style={{...F,width:92}}/><span style={{color:"#94a3b8",fontSize:11}}>to</span><input type="time" value={d1End} onChange={e=>setD1End(e.target.value)} style={{...F,width:92}}/></div>],
                  ["Remaining Days",<div style={{display:"flex",gap:5,alignItems:"center"}}><input type="time" value={remStart} onChange={e=>setRemStart(e.target.value)} style={{...F,width:92}}/><span style={{color:"#94a3b8",fontSize:11}}>to</span><input type="time" value={remEnd} onChange={e=>setRemEnd(e.target.value)} style={{...F,width:92}}/></div>],
                ].map(([lbl,ctrl])=>(
                  <div key={lbl} style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:12,fontWeight:600,color:"#475569",minWidth:145,whiteSpace:"nowrap"}}>{lbl}</span>
                    {ctrl}
                  </div>
                ))}
                <div style={{marginTop:4}}><button onClick={submitFieldData} style={B(NAVY,"#fff")}>Submit Field Data</button></div>
              </div>
            </div>

            {/* Time Settings */}
            <div>
              <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Time Settings</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[
                  ["Start Row",<select value={startRow} onChange={e=>setStartRow(e.target.value)} style={F}>{Array.from({length:50},(_,i)=><option key={i+1}>{i+1}</option>)}</select>],
                  ["Time Variable",<select value={timeVar} onChange={e=>setTimeVar(e.target.value)} style={F}>{["5","10","15","20","30"].map(v=><option key={v} value={v}>{v} mins</option>)}</select>],
                  ["Action",<select value={timeAct} onChange={e=>setTimeAct(e.target.value)} style={F}><option value="increase">+ increase</option><option value="decrease">- decrease</option></select>],
                  ["Coverage",<select value={coverage} onChange={e=>setCoverage(e.target.value)} style={F}><option value="day_chosen">day chosen</option><option value="all_days">all days</option></select>],
                ].map(([lbl,ctrl])=>(
                  <div key={lbl} style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:12,fontWeight:600,color:"#475569",minWidth:110,whiteSpace:"nowrap"}}>{lbl}</span>
                    {ctrl}
                  </div>
                ))}
                <div style={{marginTop:4}}><button onClick={setResetTimes} style={B("#dc2626","#fff")}>Submit</button></div>
              </div>
            </div>

            {/* Actions */}
            <div>
              <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Actions</div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                <button onClick={setResetTimes} style={B("#dc2626","#fff",{fontSize:13,padding:"9px 18px",borderRadius:6,boxShadow:"0 2px 6px rgba(220,38,38,.3)"})}>
                  🔄 Set / Reset Game Times
                </button>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button style={B("#475569","#fff")}>Start Games — Next Day</button>
                  <button style={B("#475569","#fff")}>Start Games — Prev Day</button>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={()=>setShowNames(v=>!v)} style={B(showNames?NAVY:"#f1f5f9",showNames?"#fff":"#1e293b",{border:"1px solid #cbd5e1"})}>
                    {showNames?"✓ ":""}Show Team Names
                  </button>
                  <button style={B("#f1f5f9","#475569",{border:"1px solid #cbd5e1"})}>Show Pool Seed Values</button>

/* ════════════════════ POOL STANDINGS ════════════════════ */
function calcUSSSAStandings(teams,games){
  const s={};
  teams.forEach(t=>{s[t.id]={...t,w:0,l:0,t_:0,pf:0,pa:0,gp:0,rdMax8Sum:0}});
  games.forEach(g=>{
    if(g.status!=="final"||g.s1==null||g.s2==null)return;
    if(!s[g.t1]||!s[g.t2])return;
    s[g.t1].pf+=g.s1;s[g.t1].pa+=g.s2;s[g.t1].gp++;
    s[g.t2].pf+=g.s2;s[g.t2].pa+=g.s1;s[g.t2].gp++;
    const cap=Math.min(8,Math.abs(g.s1-g.s2));
    const rd1=g.s1>g.s2?cap:g.s1<g.s2?-cap:0;
    s[g.t1].rdMax8Sum+=rd1;s[g.t2].rdMax8Sum-=rd1;
    if(g.s1>g.s2){s[g.t1].w++;s[g.t2].l++}
    else if(g.s2>g.s1){s[g.t2].w++;s[g.t1].l++}
    else{s[g.t1].t_++;s[g.t2].t_++}
  });
  // Build base stats array
  const arr=Object.values(s).map(t=>({
    ...t,
    record:`${t.w}-${t.l}-${t.t_}`,
    winPct:t.gp>0?Math.round((t.w+t.t_*0.5)/t.gp*1000):0,
    avgRA:t.gp>0?(t.pa/t.gp).toFixed(1):"—",
    avgRS:t.gp>0?(t.pf/t.gp).toFixed(1):"—",
    avgRD:t.gp>0?((t.pf-t.pa)/t.gp).toFixed(1):"—",
    avgRDMax8:t.gp>0?(t.rdMax8Sum/t.gp).toFixed(1):"—",
    h2hW:0,h2hL:0,h2hT:0,h2hGP:0,h2hWinPct:0,h2hAllPlayed:false,h2hRecord:"—",
  }));
  // Step 4: Compute H2H among tied groups (same winPct)
  // Only valid if ALL tied teams have played each other
  const byWP={};
  arr.forEach(t=>{if(!byWP[t.winPct])byWP[t.winPct]=[];byWP[t.winPct].push(t);});
  Object.values(byWP).forEach(grp=>{
    if(grp.length<2)return;
    const ids=new Set(grp.map(t=>t.id));
    const h2h=games.filter(g=>g.status==="final"&&g.s1!=null&&g.s2!=null&&ids.has(g.t1)&&ids.has(g.t2));
    // Check all n*(n-1)/2 unique pairs played
    const pairs=new Set(h2h.map(g=>[g.t1,g.t2].sort().join("|")));
    const n=grp.length;
    const allPlayed=pairs.size>=n*(n-1)/2;
    h2h.forEach(g=>{
      const a=arr.find(t=>t.id===g.t1),b=arr.find(t=>t.id===g.t2);
      if(!a||!b)return;
      a.h2hGP++;b.h2hGP++;
      if(g.s1>g.s2){a.h2hW++;b.h2hL++;}
      else if(g.s2>g.s1){b.h2hW++;a.h2hL++;}
      else{a.h2hT++;b.h2hT++;}
    });
    grp.forEach(t=>{
      t.h2hAllPlayed=allPlayed;
      t.h2hWinPct=t.h2hGP>0?Math.round((t.h2hW+t.h2hT*0.5)/t.h2hGP*1000):0;
      t.h2hRecord=t.h2hGP>0?`${t.h2hW}-${t.h2hL}-${t.h2hT}`:"—";
    });
  });
  // Full 8-step USSSA sort
  return arr.sort((a,b)=>{
    if(b.winPct!==a.winPct)return b.winPct-a.winPct;           // 1. Win%
    if(b.w!==a.w)return b.w-a.w;                               // 2. Wins
    if(a.l!==b.l)return a.l-b.l;                               // 3. Losses
    // 4. H2H Win% — only if all tied teams played each other
    if(a.h2hAllPlayed&&b.h2hAllPlayed&&(a.h2hGP>0||b.h2hGP>0)){
      if(b.h2hWinPct!==a.h2hWinPct)return b.h2hWinPct-a.h2hWinPct;
    }
    const paA=a.gp>0?a.pa/a.gp:999,paB=b.gp>0?b.pa/b.gp:999;
    if(Math.abs(paA-paB)>0.001)return paA-paB;                 // 5. Avg PA asc
    const rdA=parseFloat(a.avgRDMax8||0),rdB=parseFloat(b.avgRDMax8||0);
    if(Math.abs(rdA-rdB)>0.001)return rdB-rdA;                 // 6. Avg RD Max8 desc
    return (b.pts||0)-(a.pts||0);                               // 7. USSSA Points desc
  });
}
function StandingsView({teams,games}){
  const NAVY="#1e3a5f";
  /* extract age number from class string e.g. "12AAA" → 12 */
  const ageNum=cls=>{const m=(cls||"").match(/^(\d+)/);return m?parseInt(m[1]):0};
  const ageLabel=n=>n>0?`${n}U`:"Other";
  /* build sorted list of unique age groups that have pool games */
  const allPoolGames=games.filter(g=>g.pool);
  const activeTeamIds=new Set(allPoolGames.flatMap(g=>[g.t1,g.t2]));
  const ageGroups=[...new Set(teams.filter(t=>activeTeamIds.has(t.id)).map(t=>ageNum(t.cls)))]
    .filter(a=>a>0).sort((a,b)=>a-b);
  const [activeAge,setActiveAge]=useState(ageGroups[0]||0);
  const [showRules,setShowRules]=useState(false);
  if(ageGroups.length===0)return <Alrt type="info">No pool play games scheduled yet. Add games with pool assignments to see standings.</Alrt>;
  /* teams + games for the selected age */
  const ageTeams=teams.filter(t=>ageNum(t.cls)===activeAge);
  const ageTeamIds=new Set(ageTeams.map(t=>t.id));
  const ageGames=games.filter(g=>ageTeamIds.has(g.t1)||ageTeamIds.has(g.t2));
  const pools=[...new Set(ageGames.map(g=>g.pool))].filter(Boolean).sort();
  /* unique classes within this age for subtitle */
  const ageClasses=[...new Set(ageTeams.map(t=>t.cls))].filter(Boolean).sort();
  /* compact two-line column header */
  const TH=({top,bot,w,tip})=>(
    <th title={tip||""} style={{background:NAVY,color:"#fff",padding:"6px 5px",
      fontSize:10,fontWeight:700,textAlign:"center",verticalAlign:"middle",
      whiteSpace:"nowrap",width:w||"auto",
      borderRight:"1px solid rgba(255,255,255,.15)",cursor:tip?"help":"default",

/* ════════════════════ BRACKET GENERATOR ════════════════════ */
function genBracketGames(seeds){
  const N=seeds.length;
  if(N<2)return[];
  const R=Math.ceil(Math.log2(Math.max(N,2)));
  const P=Math.pow(2,R);
  function seedPos(sz){
    if(sz===2)return[0,1];
    // Standard bracket seeding: seed1 top, seed2 bottom, ensures 1v2 only in final
    // For 8 teams produces: 1v8, 4v5, 3v6, 2v7 (matches USSSA/NCAA standard)
    const prev=seedPos(sz/2);
    const half=sz/4;
    const top=prev.slice(0,half);
    const bot=prev.slice(half).reverse(); // reverse bottom half so seed2 stays at bottom
    const r=[];
    for(const x of top){r.push(x);r.push(sz-1-x)}
    for(const x of bot){r.push(x);r.push(sz-1-x)}
    return r;
  }
  const pos=seedPos(P);
  const gs=[];let gn=1;
  for(let p=0;p<P/2;p++){
    const si1=pos[p*2],si2=pos[p*2+1];
    const t1=si1<N?seeds[si1].id:null;
    const t2=si2<N?seeds[si2].id:null;
    const bye=!(t1&&t2);
    // Store which seed number each slot represents (used for badge display)
    const realSn1=t1?si1+1:si2+1; // the team that actually plays
    const realSn2=bye?null:si2+1;
    gs.push({id:`bg${gn}`,num:`G${gn}`,round:1,
      t1:t1||t2,t2:bye?null:(t1?t2:null),
      sn1:realSn1,sn2:realSn2,
      s1:null,s2:null,status:bye?"bye":"scheduled",date:"",time:"",field:""});
    gn++;
  }
  for(let r=2;r<=R;r++){
    const cnt=P/Math.pow(2,r);
    for(let p=0;p<cnt;p++){
      gs.push({id:`bg${gn}`,num:`G${gn}`,round:r,t1:null,t2:null,s1:null,s2:null,status:"scheduled",date:"",time:"",field:""});
      gn++;
    }
  }
  return gs;
}

function BracketBuilderView({teams,games=[],onBuild}){
  const NAVY="#1e3a5f";
  const TEAL="#0e7490";

  /* ── compute standings-ranked team list ── */
  const rankedTeams=React.useMemo(()=>{
    if(!games.length)return teams;
    const s=calcUSSSAStandings(teams,games);
    // s is already sorted by winPct, wins, etc.
    return s.map(row=>teams.find(t=>t.id===row.id)||row).filter(Boolean);
  },[teams,games]);

  const [count,setCount]=useState(8);
  const [names,setNames]=useState(()=>Array(32).fill("").map((_,i)=>rankedTeams[i]?rankedTeams[i].name:""));

  /* ── scheduling state ── */
  const [numFields,setNumFields]=useState(1);
  const [gameMins,setGameMins]=useState(120);   // game duration in minutes
  const [gapMins,setGapMins]=useState(15);      // gap between games (buffer)
  const [startDate,setStartDate]=useState(()=>{const d=new Date();return d.toISOString().slice(0,10)});
  const [startTime,setStartTime]=useState("08:00");

  /* reset seeds to standings order */
  function loadFromStandings(){
    setNames(Array(32).fill("").map((_,i)=>rankedTeams[i]?rankedTeams[i].name:""));
  }

  /* ── auto-schedule helper ────────────────────────────────────────
     Distributes games across fields, round by round.
     Byes are skipped (no field/time needed).
     Within a round, games are spread across fields simultaneously;
     each "wave" of F games occupies one timeslot.
     The next round starts after all current-round games finish + gap.
  ──────────────────────────────────────────────────────────────── */
  function applySchedule(gs){
    const slotMins=parseInt(gameMins)+parseInt(gapMins);
    const F=parseInt(numFields)||1;
    // parse startTime "HH:MM" → minutes since midnight
    const [sh,sm]=startTime.split(":").map(Number);
    let curMin=sh*60+(sm||0);

    const rounds=[...new Set(gs.map(g=>g.round))].sort((a,b)=>a-b);
    rounds.forEach(r=>{
      // include all non-bye games in this round — later rounds have t1/t2=null (TBD) but still need scheduled times
      const playable=gs.filter(g=>g.round===r&&g.status!=="bye");
      if(!playable.length)return;
      let wave=0;
      playable.forEach((g,i)=>{
        wave=Math.floor(i/F);
        const fieldNum=(i%F)+1;
        const tMin=curMin+wave*slotMins;
        const hh=Math.floor(tMin/60)%24;
        const mm=tMin%60;
        const ampm=hh<12?"AM":"PM";
        const h12=hh===0?12:hh>12?hh-12:hh;
        const timeStr=`${h12}:${mm.toString().padStart(2,"0")} ${ampm}`;
        g.date=startDate;
        g.time=timeStr;
        g.field=`F${fieldNum}`;
      });
      // advance clock past all waves in this round + one extra gap
      curMin+=((wave+1)*slotMins);
    });
    return gs;
  }

  function build(){
    const seeds=Array.from({length:count}).map((_,i)=>{
      const nm=names[i]||`Team ${i+1}`;
      const t=teams.find(t2=>t2.name.toLowerCase()===nm.toLowerCase());
      return{id:t?t.id:`seed_${i+1}`,name:nm,cls:t?t.cls:"",state:t?t.state:""};
    });
    const gs=genBracketGames(seeds);
    applySchedule(gs);
    onBuild(gs,seeds);
  }

  const P=Math.pow(2,Math.ceil(Math.log2(Math.max(count,2))));
  const byes=P-count;

  /* seed badge color */
  const seedBg=i=>i===0?"#b45309":i===1?"#1d4ed8":i===2?"#7c3aed":NAVY;

  /* preview: what matchups will the seeding produce? */
  function previewMatchups(){
    const sz=P;
    function seedPos(s){
      if(s===2)return[0,1];
      const prev=seedPos(s/2);
      const h=s/4;
      const top=prev.slice(0,h);
      const bot=prev.slice(h).reverse();
      const r=[];
      for(const x of top){r.push(x);r.push(s-1-x)}
      for(const x of bot){r.push(x);r.push(s-1-x)}
      return r;
    }
    const pos=seedPos(sz);
    const matchups=[];
    for(let p=0;p<sz/2;p++){
      const i1=pos[p*2],i2=pos[p*2+1];
      const n1=i1<count?(names[i1]||`Seed ${i1+1}`):"BYE";
      const n2=i2<count?(names[i2]||`Seed ${i2+1}`):"BYE";
      const bye=i1>=count||i2>=count;
      matchups.push({s1:i1+1,s2:i2+1,n1,n2,bye});
    }
    return matchups;
  }
  const matchups=previewMatchups();

  return(
    <div style={{maxWidth:680}}>
      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"18px",marginBottom:14}}>
        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:14,color:NAVY}}>⚙️ Bracket Setup</div>
          {rankedTeams.length>0&&(
            <button onClick={loadFromStandings}
              style={{padding:"5px 11px",background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:5,
                fontSize:11,fontWeight:700,color:TEAL,cursor:"pointer"}}>
              ↺ Load from Standings
            </button>
          )}
        </div>

        {/* Count + format row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"#475569",display:"block",marginBottom:4}}>Number of Teams</label>
            <select value={count} onChange={e=>setCount(parseInt(e.target.value))}
              style={{width:"100%",padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,fontWeight:600}}>
              {Array.from({length:29},(_,i)=>i+4).map(n=>{
                const p2=Math.pow(2,Math.ceil(Math.log2(Math.max(n,2))));
                const b=p2-n;
                return<option key={n} value={n}>{n} Teams{b>0?` — ${b} bye${b>1?"s":""}`:"  (no byes)"}</option>;
              })}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"#475569",display:"block",marginBottom:4}}>Format</label>
            <select style={{width:"100%",padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,fontWeight:600}}>
              <option>Single Elimination</option>
            </select>
          </div>
        </div>

        {/* ── Schedule Configuration ── */}
        <div style={{background:"#f1f5f9",border:"1px solid #cbd5e1",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:800,color:NAVY,marginBottom:10,textTransform:"uppercase",letterSpacing:.6}}>
            📅 Game Schedule
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
            {/* # Fields */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}># Fields</label>
              <select value={numFields} onChange={e=>setNumFields(parseInt(e.target.value))}
                style={{width:"100%",padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontWeight:600,background:"#fff"}}>
                {[1,2,3,4,5,6,7,8].map(n=><option key={n} value={n}>{n} Field{n>1?"s":""}</option>)}

                {[[60,"1 hr"],[75,"1¼ hr"],[90,"1½ hr"],[105,"1¾ hr"],[120,"2 hr"],[135,"2¼ hr"],[150,"2½ hr"],[180,"3 hr"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}

                {[[0,"0 min"],[5,"5 min"],[10,"10 min"],[15,"15 min"],[20,"20 min"],[30,"30 min"],[45,"45 min"],[60,"1 hr"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {/* Start Date */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}>Start Date</label>

                {Array.from({length:28},(_,i)=>{
                  const totalMins=i*30+360; // 6:00 AM to 9:30 PM
                  const hh=Math.floor(totalMins/60);const mm=totalMins%60;
                  const ampm=hh<12?"AM":"PM";const h12=hh===0?12:hh>12?hh-12:hh;
                  const val=`${hh.toString().padStart(2,"0")}:${mm.toString().padStart(2,"0")}`;
                  const lbl=`${h12}:${mm.toString().padStart(2,"0")} ${ampm}`;
                  return<option key={val} value={val}>{lbl}</option>;
                })}
              </select>
            </div>
          </div>
          {/* Schedule preview */}
          {(()=>{
            const slotMins=parseInt(gameMins)+parseInt(gapMins);
            const F=parseInt(numFields)||1;
            const [sh,sm]=startTime.split(":").map(Number);
            const rounds=Math.ceil(Math.log2(Math.max(count,2)));
            const r1Games=Math.floor((Math.pow(2,rounds)-count)); // bye-adjusted R1 games actually played
            const actualR1=Math.max(1,count-Math.pow(2,rounds-1)); // real games in R1
            // estimate total time: each round has ceil(gamesInRound/F) waves
            let estMin=sh*60+(sm||0);
            let gamesLeft=count;
            const roundTimes=[];
            for(let r=1;r<=rounds;r++){
              const rGames=Math.max(1,Math.pow(2,rounds-r));
              const waves=Math.ceil(rGames/F);
              const [rh,rm]=[Math.floor(estMin/60)%24,estMin%60];
              const ampm=rh<12?"AM":"PM";const h12=rh===0?12:rh>12?rh-12:rh;
              roundTimes.push(`R${r}: ${h12}:${rm.toString().padStart(2,"0")} ${ampm}`);
              estMin+=waves*slotMins;
            }
            const endH=Math.floor(estMin/60)%24,endM=estMin%60;
            const endAmpm=endH<12?"AM":"PM";const endH12=endH===0?12:endH>12?endH-12:endH;
            return(
              <div style={{marginTop:10,padding:"6px 10px",background:"#e0f2fe",borderRadius:5,fontSize:10,color:"#0369a1"}}>
                <span style={{fontWeight:700}}>Est. Schedule: </span>
                {roundTimes.join("  →  ")}
                <span style={{marginLeft:6,color:"#7c3aed",fontWeight:700}}>
                  Done ≈ {endH12}:{endM.toString().padStart(2,"0")} {endAmpm}
                </span>
              </div>
            );
          })()}
        </div>

        {/* Two-column layout: seed entry + matchup preview */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          {/* Left: seed entry */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>
              Seeds (standings order):
            </div>
            {/* Bye banner — shown only when there are byes */}
            {byes>0&&(
              <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:5,
                padding:"5px 8px",marginBottom:7,fontSize:10,color:"#15803d",fontWeight:600}}>
                ⏭️ Seeds <strong>#1–#{byes}</strong> receive a 1st round bye
                <span style={{color:"#94a3b8",fontWeight:400,marginLeft:6}}>
                  (seeds #{byes+1}–#{count} play Round 1)
                </span>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:count>12?"1fr 1fr":"1fr",gap:4,
              maxHeight:count>16?300:count>8?260:220,overflowY:"auto",paddingRight:2}}>
              {Array.from({length:count}).map((_,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{background:seedBg(i),color:"#fff",borderRadius:3,
                    minWidth:22,height:18,display:"inline-flex",alignItems:"center",
                    justifyContent:"center",fontSize:9,fontWeight:800,flexShrink:0,padding:"0 3px"}}>
                    #{i+1}

                  <input value={names[i]||""} onChange={e=>{const a=[...names];a[i]=e.target.value;setNames(a)}}
                    placeholder={`Seed ${i+1}…`}
                    style={{flex:1,minWidth:0,padding:"3px 6px",border:"1px solid",fontSize:10,
                      borderColor:i<byes?"#86efac":"#cbd5e1",

                      background:i<byes?"#f0fdf4":"#fff"}}/>
                </div>
              ))}
            </div>
          </div>

          {/* Right: matchup preview */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>
              Round 1 Matchups:
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4,
              maxHeight:count>16?320:count>8?280:240,overflowY:"auto"}}>
              {matchups.map((m,i)=>(
                <div key={i} style={{background:m.bye?"#f0fdf4":"#fff",border:"1px solid",
                  borderColor:m.bye?"#bbf7d0":"#e2e8f0",borderRadius:5,padding:"4px 8px",
                  fontSize:10}}>
                  {m.bye?(
                    <span style={{color:"#15803d",fontWeight:600}}>
                      <span style={{background:"#dcfce7",color:"#15803d",borderRadius:3,padding:"1px 4px",marginRight:4,fontWeight:800}}>#{m.s1<m.s2?m.s1:m.s2}</span>
                      {m.s1<m.s2?m.n1:m.n2}
                      <span style={{color:"#86efac",marginLeft:5}}>⏭ BYE</span>
                    </span>
                  ):(
                    <span style={{color:"#1e293b"}}>

                      <span style={{background:"#e0f2fe",borderRadius:3,padding:"1px 4px",marginRight:3,color:NAVY,fontWeight:700}}>#{m.s2}</span>

        {byes>0&&<span>⏭️ <strong>{byes}</strong> Bye{byes>1?"s":""} → top seed{byes>1?"s":""}</span>}
        <span>📋 Single Elimination</span>
        <span>🏆 R1: {matchups.filter(m=>!m.bye).map(m=>`#${m.s1}v#${m.s2}`).join(' · ')}</span>

/* ════════════════════ BRACKET ════════════════════ */
function BracketView({bGames,setBGames,teams,games=[],editable}){
  const NAVY="#1e3a5f";
  const [tab,setTab]=useState("build");  // open Builder first by default
  const [builtGames,setBuiltGames]=useState(null);
  const [builtSeeds,setBuiltSeeds]=useState(null);

  function onBuild(games,seeds){setBuiltGames(games);setBuiltSeeds(seeds);setTab("view")}

  const dGames=builtGames||bGames;
  const dTeams=builtSeeds?[...teams,...builtSeeds.filter(s=>!teams.find(t=>t.id===s.id))]:teams;
  const setDGames=builtGames?setBuiltGames:setBGames;

  /* ── Layout constants (compact USSSA style) ── */
  const GW=205,GH=62,TEAM_H=26,HDR_H=18,BASE_GAP=16,CONN=56;
  const rounds=[...new Set(dGames.map(g=>g.round))].sort((a,b)=>a-b);
  const maxRound=rounds.length?Math.max(...rounds):1;
  const N=rounds.length||1;
  const SH=ri=>(GH+BASE_GAP)*Math.pow(2,ri);
  const GT=(ri,p)=>(SH(ri)-GH)/2+p*SH(ri);
  const GC=(ri,p)=>GT(ri,p)+GH/2;
  const r1Count=dGames.filter(g=>g.round===rounds[0]).length||1;
  const totalH=Math.max(r1Count*SH(0),GH+BASE_GAP*2)+8;
  const RX=ri=>ri*(GW+CONN);
  const totalW=N*(GW+CONN)+100;

  const rndLabel=[];
  if(N===1){rndLabel[0]="Championship"}
  else if(N===2){rndLabel[0]="Semifinal";rndLabel[1]="Championship"}
  else if(N===3){rndLabel[0]="Quarterfinal";rndLabel[1]="Semifinal";rndLabel[2]="Championship"}
  else{rounds.forEach((_,i)=>{
    if(i===N-1)rndLabel[i]="Championship";
    else if(i===N-2)rndLabel[i]="Semifinal";
    else if(i===N-3)rndLabel[i]="Quarterfinal";
    else{const cnt=Math.round(r1Count/Math.pow(2,i)*2);rndLabel[i]="Round of "+cnt;}
  })}

  function upd(id,k,v){
    if(!editable)return;
    const n=v===""?null:parseInt(v);
    setDGames(prev=>prev.map(g=>g.id===id?{...g,[k]:isNaN(n)?null:n,status:n!==null?"final":"scheduled"}:g));
  }
  function getT(id){return tByIdFrom(id,dTeams)}
  const finalGame=dGames.find(g=>g.round===maxRound);
  const champ=finalGame?winOf(finalGame):null;

  return(
    <div>
      {/* ── Tab bar ── */}
      <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:"2px solid #e2e8f0"}}>
        {[["build","⚙️ Builder"],["view","🏆 Bracket"]].map(([t,label])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:"7px 16px",border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
              borderRadius:"6px 6px 0 0",marginBottom:-2,
              background:tab===t?NAVY:"#f8fafc",
              color:tab===t?"#fff":"#64748b",
              borderBottom:tab===t?`2px solid ${NAVY}`:"2px solid transparent"}}>
            {label}
          </button>
        ))}
        {builtGames&&<span style={{marginLeft:"auto",alignSelf:"center",fontSize:10,color:"#16a34a",fontWeight:600}}>✓ Custom bracket</span>}
      </div>

      {/* ── Builder tab ── */}
      {tab==="build"&&<BracketBuilderView teams={teams} games={games} onBuild={onBuild}/>}

      {/* ── Bracket view tab ── */}
      {tab==="view"&&(
        <div>
          {champ&&(
            <div style={{background:"linear-gradient(135deg,#b45309,#f59e0b)",color:"#fff",
              padding:"10px 18px",borderRadius:10,marginBottom:14,display:"flex",
              alignItems:"center",gap:12,boxShadow:"0 4px 14px rgba(0,0,0,.18)"}}>
              <span style={{fontSize:26}}>🏆</span>
              <div>
                <div style={{fontSize:9,fontWeight:700,opacity:.85,textTransform:"uppercase",letterSpacing:1.2}}>Division Champion</div>
                <div style={{fontSize:15,fontWeight:900,marginTop:1}}>{getT(champ)?.name}</div>
              </div>
            </div>
          )}
          {editable&&<Alrt type="info">✏️ Enter scores on each game to advance teams. Use the Builder tab to set up a new bracket.</Alrt>}
          {/* Round headers */}
          <div style={{display:"flex",marginBottom:6}}>
            {rounds.map((_,ri)=>(
              <div key={ri} style={{width:GW+CONN,flexShrink:0,paddingRight:CONN}}>
                <div style={{textAlign:"center",fontSize:10,fontWeight:800,color:"#fff",
                  background:NAVY,padding:"5px 0",borderRadius:4,textTransform:"uppercase",letterSpacing:.8}}>
                  {rndLabel[ri]||`Round ${ri+1}`}
                </div>
              </div>
            ))}
          </div>
          {/* Bracket canvas */}
          <div style={{overflowX:"auto",paddingBottom:20}}>
            <div style={{position:"relative",width:totalW,height:totalH}}>
              {/* Game slots */}
              {rounds.map((round,ri)=>
                dGames.filter(g=>g.round===round).map((g,pi)=>{
                  const t1=getT(g.t1),t2=g.t2?getT(g.t2):null;
                  const w=winOf(g);
                  const isBye=g.status==="bye"||(!g.t2&&!!g.t1);
                  const top=GT(ri,pi),left=RX(ri);
                  const teamRow=(side)=>{
                    const isT1=side===1;
                    const tId=isT1?g.t1:g.t2;
                    const t=isT1?t1:t2;
                    const s=isT1?g.s1:g.s2;
                    const sKey=isT1?"s1":"s2";
                    const win=w===tId,lose=!!w&&w!==tId;
                    return(
                      <div style={{display:"flex",alignItems:"center",height:TEAM_H,
                        padding:"0 7px",
                        background:win?"#f0fdf4":lose?"#fff8f8":"#fff",
                        borderTop:isT1?"none":"1px solid #e8ecf0"}}>
                        {/* Seed badge (round 1, when seed number stored) */}
                        {ri===0&&(isT1?g.sn1:g.sn2)&&(()=>{
                          const sn=isT1?g.sn1:g.sn2;
                          const bg=sn===1?"#b45309":sn===2?"#1d4ed8":sn===3?"#7c3aed":sn<=4?"#0e7490":sn<=8?"#1e3a5f":"#475569";
                          return(
                            <span style={{background:bg,color:"#fff",borderRadius:3,
                              fontSize:8,fontWeight:800,padding:"1px 4px",marginRight:4,
                              flexShrink:0,fontFamily:"monospace",lineHeight:"14px"}}>
                              #{sn}
                            </span>
                          );
                        })()}
                        <span style={{flex:1,fontSize:11,fontWeight:win?700:500,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                          color:lose?"#c0cad8":"#1e293b",
                          textDecoration:lose?"line-through":"none"}}>
                          {t?t.name:(<em style={{color:"#c0cad8",fontSize:10,fontWeight:400}}>TBD</em>)}
                        </span>
                        {editable&&tId&&!isBye?(
                          <input type="number" min="0" value={s??""} placeholder=""
                            style={{width:30,textAlign:"center",fontSize:11,fontWeight:700,
                              border:"1px solid "+(win?"#86efac":"#e2e8f0"),borderRadius:3,
                              padding:"1px 2px",background:win?"#dcfce7":"#f8fafc",
                              color:win?"#15803d":"#334155",outline:"none",flexShrink:0}}
                            onChange={e=>upd(g.id,sKey,e.target.value)}/>
                        ):s!=null?(
                          <span style={{minWidth:22,textAlign:"center",fontWeight:800,fontSize:11,flexShrink:0,
                            background:win?"#16a34a":"transparent",color:win?"#fff":lose?"#d1d5db":"#475569",
                            borderRadius:3,padding:"1px 4px"}}>{s}</span>
                        ):null}
                      </div>
                    );
                  };
                  return(
                    <div key={g.id} style={{position:"absolute",top,left,width:GW,zIndex:2}}>
                      {/* Compact header: game num + date/time/field */}
                      <div style={{height:HDR_H,display:"flex",alignItems:"center",justifyContent:"space-between",
                        padding:"0 7px",background:NAVY,borderRadius:"5px 5px 0 0"}}>
                        <span style={{background:"#0e7490",color:"#fff",borderRadius:3,
                          fontSize:8,fontWeight:800,padding:"1px 5px",fontFamily:"monospace"}}>
                          {g.num}
                        </span>
                        <span style={{fontSize:8,color:"rgba(255,255,255,.55)",fontWeight:400}}>
                          {[g.date,g.time,g.field].filter(Boolean).join(" · ")||""}
                        </span>
                      </div>
                      {/* Team rows */}
                      <div style={{border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 5px 5px",
                        overflow:"hidden",background:"#fff",boxShadow:"0 2px 6px rgba(0,0,0,.07)"}}>
                        {teamRow(1)}
                        {isBye?(
                          <div style={{height:TEAM_H,display:"flex",alignItems:"center",
                            padding:"0 7px",borderTop:"1px solid #e8ecf0",background:"#fafafa"}}>
                            <span style={{fontSize:9,color:"#b0bbd0",fontStyle:"italic",letterSpacing:.3}}>— BYE —</span>
                          </div>
                        ):teamRow(2)}
                      </div>
                    </div>
                  );
                })
              )}
              {/* SVG connector lines */}
              <svg style={{position:"absolute",top:0,left:0,pointerEvents:"none",overflow:"visible"}}
                width={totalW} height={totalH}>
                {rounds.slice(0,-1).map((_,ri)=>{
                  const rGames=dGames.filter(g=>g.round===rounds[ri]);
                  const pairs=Math.ceil(rGames.length/2);
                  return Array.from({length:pairs}).map((__,pi)=>{
                    const g1=rGames[pi*2],g2=rGames[pi*2+1];
                    const y1=GC(ri,pi*2);
                    const y2=g2?GC(ri,pi*2+1):y1;
                    const yMid=GC(ri+1,pi);
                    const x1=RX(ri)+GW;
                    const xC=x1+CONN/2;
                    const x2=RX(ri+1);
                    return(
                      <g key={`c${ri}-${pi}`}>
                        <line x1={x1} y1={y1} x2={xC} y2={y1} stroke="#94a3b8" strokeWidth={1.5}/>
                        {g2&&<line x1={x1} y1={y2} x2={xC} y2={y2} stroke="#94a3b8" strokeWidth={1.5}/>}
                        <line x1={xC} y1={y1} x2={xC} y2={g2?y2:y1} stroke="#94a3b8" strokeWidth={1.5}/>
                        <line x1={xC} y1={yMid} x2={x2} y2={yMid} stroke="#94a3b8" strokeWidth={1.5}/>
                        {/* winner name on connector */}
                        {g2&&winOf(g1||{})&&(
                          <text x={(xC+x2)/2} y={yMid-3} textAnchor="middle"
                            style={{fontSize:8,fill:"#475569",fontFamily:"sans-serif"}}>
                            {getT(winOf(g1))?.name?.split(" ").slice(-1)[0]||""}
                          </text>
                        )}
                      </g>
                    );
                  });
                })}
              </svg>
              {/* Champion trophy */}
              {champ&&(
                <div style={{position:"absolute",top:GC(N-1,0)-34,left:RX(N-1)+GW+CONN+6,
                  textAlign:"center",width:80}}>
                  <div style={{fontSize:24}}>🏆</div>
                  <div style={{fontSize:10,fontWeight:800,color:"#b45309",lineHeight:1.3,marginTop:2}}>
                    {getT(champ)?.name}
                  </div>
                  <div style={{fontSize:8,color:"#d97706",fontWeight:700,letterSpacing:.5}}>CHAMPION</div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════ POOL2BRACKET ════════════════════ */
function Pool2BracketView({poolGames,teams}){
  const finalGames=poolGames.filter(g=>g.status==="final");
  const st=calcUSSSAStandings(teams,finalGames);
  const maxSeeds=st.length;
  const [assigns,setAssigns]=useState(()=>Object.fromEntries(st.map((t,i)=>[`s${i+1}`,t.id])));

  const NAVY="#1e3a5f";

    <div>
      <Alrt type="info">📋 Pool standings → bracket seeding. Seed 1 (best record) plays Seed {maxSeeds} in Round 1. Uses full USSSA tiebreaker order.</Alrt>

        <div style={{flex:"1 1 340px"}}>
          <div style={{fontWeight:800,fontSize:13,color:NAVY,marginBottom:8}}>📊 Pool Final Standings</div>

            <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
              <thead>
                <tr style={{background:NAVY,color:"#fff"}}>
                  <th style={{padding:"7px 8px",fontWeight:700,width:40}}>Seed</th>
                  <th style={{padding:"7px 10px",fontWeight:700,textAlign:"left"}}>Team</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>Record</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>Win%</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>RD</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>PA</th>
                </tr>
              </thead>
              <tbody>{st.map((t,i)=>(
                <tr key={t.id} style={{background:i%2===0?"#fff":"#f8fafc",borderTop:"1px solid #f1f5f9"}}>
                  <td style={{textAlign:"center",padding:"6px 4px"}}><SeedRank n={i+1}/></td>
                  <td style={{padding:"6px 10px",fontWeight:600,color:NAVY}}>{t.name}</td>
                  <td style={{textAlign:"center",fontFamily:"monospace",fontWeight:700}}>{t.record}</td>
                  <td style={{textAlign:"center",fontWeight:800,
                    color:t.winPct===1000?"#15803d":t.winPct===0?"#dc2626":"#1e293b"}}>{t.winPct}</td>
                  <td style={{textAlign:"center",fontWeight:600,
                    color:parseFloat(t.avgRDMax8)>0?"#15803d":parseFloat(t.avgRDMax8)<0?"#dc2626":"#64748b"}}>
                    {parseFloat(t.avgRDMax8)>0?"+":""}{t.avgRDMax8}
                  </td>
                  <td style={{textAlign:"center",color:"#dc2626",fontWeight:600}}>{t.avgRA}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
        <div style={{flex:"1 1 260px"}}>
          <div style={{fontWeight:800,fontSize:13,color:NAVY,marginBottom:8}}>🏆 Assign to Bracket Slots</div>
          {st.map((_,i)=>{
            const sKey=`s${i+1}`;
            return(
              <div key={sKey} style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                <SeedRank n={i+1}/>
                <select style={{flex:1,fontSize:12,padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:6}}
                  value={assigns[sKey]||""}
                  onChange={e=>setAssigns(p=>({...p,[sKey]:e.target.value}))}>
                  <option value="">— Select Team —</option>
                  {st.map((t,j)=><option key={t.id} value={t.id}>#{j+1} {t.name} ({t.record})</option>)}
                </select>
              </div>
            );
          })}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button className="btn btn-secondary" style={{flex:1}} onClick={autoAssign}>⚡ Auto-Assign by Seed</button>
          </div>
          <button className="btn btn-green mt2 w100">✓ Lock Bracket Seeding</button>
        </div>
      </div>
    </div>
  );
}

  return(
