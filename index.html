<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
:root{
  --red:#c0392b;--red-d:#922b21;--red-l:#fadbd8;
  --navy:#1a1a2e;--navy-m:#16213e;--navy-l:#0f3460;
  --gold:#e67e22;--gold-l:#fef5e7;
  --green:#27ae60;--green-l:#d5f5e3;
  --blue:#2980b9;--blue-l:#d6eaf8;
  --purple:#8e44ad;--purple-l:#f4ecf7;
  --gray:#95a5a6;--gray-l:#f8f9fa;--gray-m:#ecf0f1;--gray-d:#7f8c8d;
  --white:#fff;
  --sh:0 2px 8px rgba(0,0,0,.1);--sh-lg:0 8px 32px rgba(0,0,0,.15);
  --r:10px;--r-sm:6px
}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto;flex-shrink:0}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.content{padding:20px 24px;flex:1}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo .brand{font-size:20px;font-weight:900;color:var(--red);letter-spacing:-.5px}
.sb-logo .sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.sb-sec{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-lbl{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px;padding:6px 14px 3px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:.15s;border-left:3px solid transparent;white-space:nowrap}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:rgba(192,57,43,.22);color:#fff;border-left-color:var(--red);font-weight:600}
.sb-item .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.tb-title{font-size:17px;font-weight:800;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--gray);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:10px}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh)}
.card-hd{padding:14px 18px 10px;border-bottom:1px solid var(--gray-m);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13.5px;font-weight:700;color:var(--navy)}
.card-body{padding:18px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-d)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-m)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#1e8449}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1a6fa0}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#ca6f1e}
.btn-secondary{background:var(--gray-m);color:var(--navy)}.btn-secondary:hover{background:#dde}
.btn-outline{background:transparent;border:1.5px solid var(--gray);color:#555}.btn-outline:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn-danger{background:var(--red-l);color:var(--red-d)}.btn-danger:hover{background:var(--red-d);color:#fff}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700}
.b-red{background:var(--red-l);color:var(--red-d)}
.b-green{background:var(--green-l);color:#1e6b3d}
.b-blue{background:var(--blue-l);color:#1a5276}
.b-gold{background:var(--gold-l);color:#7a4f00}
.b-gray{background:var(--gray-m);color:#555}
.b-navy{background:var(--navy);color:#fff}
.status{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700}
.s-final{background:var(--green-l);color:var(--green)}
.s-live{background:#fef3cd;color:#b7770d}
.s-scheduled{background:var(--blue-l);color:var(--blue)}
.s-upcoming{background:var(--gray-m);color:var(--gray-d)}
.tabs{display:flex;border-bottom:2px solid var(--gray-m);margin-bottom:18px;overflow-x:auto;gap:0}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.flex{display:flex}.flex-c{display:flex;align-items:center}.flex-b{display:flex;align-items:center;justify-content:space-between}.flex-w{display:flex;flex-wrap:wrap}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.stat-card{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px}
.stat-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-val{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:11.5px;letter-spacing:.3px;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--gray-m);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.tbl-wrap{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tbl-scroll{overflow-x:auto}
.div-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.div-pill{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:.15s}
.dp-off{background:var(--gray-m);color:#555}.dp-off:hover{background:#dde}
.dp-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.fl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fl-tab{padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--gray-m);color:#666;background:#fff;transition:.15s}
.fl-tab:hover{border-color:var(--navy-l);color:var(--navy)}
.fl-tab.on{border-color:var(--red);color:var(--red);background:var(--red-l)}
.fl-tab.fl-live::after{content:" 🔴";font-size:9px}
.fl-add{border-style:dashed!important}
.score-in{width:54px;padding:5px 6px;border:2px solid var(--gray-m);border-radius:var(--r-sm);font-size:14px;font-weight:800;text-align:center;transition:.15s}
.score-in:focus{outline:none;border-color:var(--blue)}
.score-w{background:var(--green-l);border-color:var(--green);color:var(--green)}
.score-l{color:var(--gray)}
.seed-rank{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sr-1{background:#f39c12;color:#7a5000}
.sr-2{background:#adb5bd}
.sr-3{background:#cd7f32}
.brk-wrap{overflow-x:auto;padding:8px 0}
.brk{display:flex;align-items:flex-start;min-width:600px}
.brk-col{display:flex;flex-direction:column;min-width:195px}
.brk-rnd-lbl{text-align:center;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 10px}
.brk-game{border:2px solid var(--gray-m);border-radius:8px;margin:5px 8px;background:#fff;overflow:hidden;box-shadow:var(--sh)}
.brk-team{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;font-size:12px;border-bottom:1px solid var(--gray-m);gap:8px;min-height:34px}
.brk-team:last-child{border-bottom:none}
.brk-w{background:var(--green-l);font-weight:700}
.brk-l{color:#bbb}
.brk-tbd{color:#ccc;font-style:italic;font-size:11px}
.brk-sc{font-weight:900;font-size:14px;min-width:22px;text-align:right}
.brk-sc-w{color:var(--green)}
.brk-meta{font-size:10px;color:var(--gray);padding:0 8px 4px;text-align:center}
.ly-wrap{border:2px solid var(--gray-m);border-radius:var(--r);overflow:hidden;margin-top:12px}
.ly-hdr{display:flex;background:var(--navy)}
.ly-time-hdr{width:85px;padding:8px;font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-align:center;flex-shrink:0;border-right:1px solid rgba(255,255,255,.1)}
.ly-fld-hdr{flex:1;padding:8px;text-align:center;font-size:11px;font-weight:700;color:#fff;border-left:1px solid rgba(255,255,255,.1)}
.ly-row{display:flex;border-top:1px solid var(--gray-m)}
.ly-row:hover{background:#fafbff}
.ly-time{width:85px;padding:8px 6px;font-size:11px;font-weight:600;color:var(--gray-d);text-align:center;flex-shrink:0;border-right:2px solid var(--gray-m);display:flex;align-items:center;justify-content:center}
.ly-slot{flex:1;border-left:1px solid var(--gray-m);min-height:50px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center;padding:4px}
.ly-slot:hover{background:#eff6ff}
.ly-slot.has-game{background:#e8f4fd;cursor:default}
.ly-slot.blocked{background:var(--red-l);cursor:not-allowed}
.ly-chip{background:var(--blue);color:#fff;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;text-align:center;width:100%;line-height:1.3}
.ly-chip .t2{font-size:9px;opacity:.8;margin-top:2px}
.pool-hdr{font-size:12px;font-weight:800;padding:8px 12px;background:var(--navy);color:#fff;border-radius:var(--r-sm) var(--r-sm) 0 0;letter-spacing:.3px}
.pool-tbl{border:1px solid var(--gray-m);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);overflow:hidden;margin-bottom:18px}
.alert{padding:10px 14px;border-radius:var(--r-sm);font-size:12.5px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start}
.a-info{background:var(--blue-l);color:#1a5276;border-left:4px solid var(--blue)}
.a-warn{background:var(--gold-l);color:#7a4f00;border-left:4px solid var(--gold)}
.a-success{background:var(--green-l);color:#1e6b3d;border-left:4px solid var(--green)}
.a-purple{background:var(--purple-l);color:#5b2c6f;border-left:4px solid var(--purple)}
input[type=text],input[type=number],select,textarea{padding:7px 10px;border:1.5px solid var(--gray-m);border-radius:var(--r-sm);font-size:13px;color:var(--navy);background:#fff;transition:.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
label{font-size:12px;font-weight:600;color:var(--gray-d);display:block;margin-bottom:3px}
.pp-cell{width:34px;height:34px;border-radius:6px;background:var(--gray-m);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin:auto}
.pp-cell-top{background:var(--gold-l);color:#7a4f00}
.pp-cell-2{background:#e8f4fd;color:var(--blue)}
.pitch-bar{height:12px;border-radius:6px;background:var(--green-l);overflow:hidden;margin-top:4px}
.pitch-fill{height:100%;background:var(--green);border-radius:6px;transition:width .3s}
.pitch-fill.warn{background:var(--gold)}
.pitch-fill.danger{background:var(--red)}

.place-medal{font-size:36px;margin-bottom:8px}
.place-team{font-size:14px;font-weight:800;color:var(--navy)}
.place-detail{font-size:11px;color:var(--gray);margin-top:3px}
.pub-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);color:#fff;padding:28px 32px 0}
.pub-ename{font-size:24px;font-weight:900;letter-spacing:-.5px}
.pub-meta{font-size:13px;opacity:.7;margin-top:3px}
.pub-divs{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.pub-div{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);border:2px solid rgba(255,255,255,.2);transition:.15s}
.pub-div:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.pub-div.on{color:#fff;background:var(--red);border-color:var(--red)}
.pub-tabs{display:flex;margin-top:16px}
.pub-tab{padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);border-bottom:3px solid transparent;transition:.15s}
.pub-tab:hover{color:#fff}
.pub-tab.on{color:#fff;border-bottom-color:var(--red)}
.pub-body{padding:22px 32px}
.v-toggle{display:flex;border:2px solid var(--gray-m);border-radius:8px;overflow:hidden}
.v-btn{padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#fff;color:#777;transition:.15s}
.v-btn.on{background:var(--navy);color:#fff}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.t-sm{font-size:12px}.t-xs{font-size:11px}.t-gray{color:var(--gray)}.t-navy{color:var(--navy)}.t-red{color:var(--red)}.t-green{color:var(--green)}
.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.w100{width:100%}
hr{border:none;border-top:1px solid var(--gray-m);margin:16px 0}
.chip{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.chip-a{background:#dbeafe;color:#1e40af}
.chip-b{background:#dcfce7;color:#15803d}
.chip-c{background:#fef3c7;color:#92400e}
.chip-d{background:#fce7f3;color:#9d174d}
.tgl{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-m)}
.tgl:last-child{border-bottom:none}
.tgl-sw{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.tgl-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
</style>

/* ════════════════════ HELPERS ════════════════════ */
function tByIdFrom(id,db){return db.find(t=>t.id===id)}
function winOf(g){if(g.status!=="final"||g.s1===null)return null;return g.s1>g.s2?g.t1:g.t2}
function loseOf(g){if(g.status!=="final"||g.s1===null)return null;return g.s1>g.s2?g.t2:g.t1}
function calcStandings(teams,games){
  const s={};
  teams.forEach(t=>{s[t.id]={...t,w:0,l:0,t_:0,pf:0,pa:0,pts:0}});
  games.forEach(g=>{
    if(g.status!=="final"||g.s1===null)return;
    if(!s[g.t1]||!s[g.t2])return;
    s[g.t1].pf+=g.s1;s[g.t1].pa+=g.s2;
    s[g.t2].pf+=g.s2;s[g.t2].pa+=g.s1;
    if(g.s1>g.s2){s[g.t1].w++;s[g.t2].l++;s[g.t1].pts+=2}
    else if(g.s2>g.s1){s[g.t2].w++;s[g.t1].l++;s[g.t2].pts+=2}
    else{s[g.t1].t_++;s[g.t2].t_++;s[g.t1].pts++;s[g.t2].pts++}
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||(b.pf-b.pa)-(a.pf-a.pa)||b.pf-a.pf);
}
function poolChipClass(pool){return{A:"chip-a",B:"chip-b",C:"chip-c",D:"chip-d"}[pool]||"chip-a"}
function teamDB(divId){
  const map={101:T9,102:T12,103:T9,104:T9,105:T9,106:T8,203:T12,501:T12};
  return map[divId]||T8;
}
function poolGamesDB(divId){

  return map[divId]||[];
}
function bracketGamesDB(divId){

  return map[divId]||[];
}

    if(readOnly)return;
    const n=v===""?null:parseInt(v);
    setGames(prev=>{
      const updated=prev.map(g=>g.id===id?{...g,[k]:isNaN(n)?null:n,status:n!==null?"final":g.status}:g);

        <div className="card-hd">
          <span className="card-title">Schedule — {shown.length} game{shown.length!==1?"s":""}</span>

/* ════════════════════ LAYOUT BUILDER ════════════════════ */
function LayoutView({games,teams}){
  const [nf,setNf]=useState(1);
  const [gl,setGl]=useState("90");
  const TIMES=["8:00 AM","9:30 AM","11:00 AM","12:30 PM","2:00 PM","3:30 PM","5:00 PM","6:30 PM"];
  const init={};
  games.slice(0,TIMES.length).forEach((g,i)=>{init[`${TIMES[i]}-0`]={...g,chip:true}});
  const [slots,setSlots]=useState(init);
  const fields=Array.from({length:nf},(_,i)=>`Field ${i+1}`);
  function clickSlot(t,fi){
    const k=`${t}-${fi}`;
    setSlots(p=>{
      const n={...p};
      if(n[k]?.chip)return n;
      if(n[k]?.blocked)delete n[k];
      else n[k]={blocked:true};
      return n;
    });
  }
  return(
    <div>
      <div className="card mb4">
        <div className="card-hd"><span className="card-title">Layout Settings</span></div>
        <div className="card-body flex-w gap-3" style={{alignItems:"flex-end"}}>
          <div><label># of Fields</label>
            <select value={nf} onChange={e=>setNf(+e.target.value)}>
              {[1,2,3,4,5,6].map(n=><option key={n}>{n}</option>)}
            </select>
          </div>
          <div><label>Game Time Length</label>
            <select value={gl} onChange={e=>setGl(e.target.value)}>
              <option value="60">1 hour</option>
              <option value="75">1h 15m</option>
              <option value="90">1h 30m</option>
              <option value="120">2 hours</option>
            </select>
          </div>
          <div><label>Time Range — Day 1</label>
            <div className="flex gap-2">
              <select><option>8:00 AM</option><option>9:00 AM</option></select>
              <span style={{alignSelf:"center",padding:"0 4px"}}>to</span>
              <select><option>7:00 PM</option><option>8:00 PM</option></select>
            </div>
          </div>
          <button className="btn btn-primary btn-sm">⏱ Set/Reset Times</button>
          <button className="btn btn-secondary btn-sm">📅 Next Day →</button>
          <button className="btn btn-secondary btn-sm">Show Team Names</button>
        </div>
      </div>
      <Alrt type="info">💡 <strong>Blue cells</strong> = assigned games · Click empty cell to <strong>block</strong> it (red) · Click blocked to unblock</Alrt>
      <div className="ly-wrap">
        <div className="ly-hdr">
          <div className="ly-time-hdr">Time</div>
          {fields.map((f,fi)=>(
            <div key={fi} className="ly-fld-hdr">{f} — {["Olym F4","Olym F5","Olym F6","Frank Brown F1","Frank Brown F2","Frank Brown F3"][fi]||f}</div>
          ))}
        </div>
        {TIMES.map(t=>(
          <div key={t} className="ly-row">
            <div className="ly-time">{t}</div>
            {fields.map((_,fi)=>{
              const k=`${t}-${fi}`;const slot=slots[k];
              const st1=slot?.chip?tByIdFrom(slot.t1,teams):null;
              const st2=slot?.chip?tByIdFrom(slot.t2,teams):null;
              return(
                <div key={fi} className={`ly-slot ${slot?.chip?"has-game":slot?.blocked?"blocked":""}`}
                  onClick={()=>clickSlot(t,fi)}>
                  {slot?.chip?(
                    <div className="ly-chip">
                      {slot.num}
                      <div className="t2">{st1?.name?.split(" ").slice(-1)[0]||"?"} vs {st2?.name?.split(" ").slice(-1)[0]||"?"}</div>
                    </div>
                  ):slot?.blocked?(
                    <span style={{fontSize:10,color:"var(--red)",fontWeight:700}}>BLOCKED</span>

/* ════════════════════ BRACKET ════════════════════ */
function BracketView({bGames,setBGames,teams,editable}){
  const rounds=[...new Set(bGames.map(g=>g.round))].sort((a,b)=>a-b);
  const maxRound=Math.max(...rounds);
  const totalRounds=rounds.length;
  const rndLabel={};
  if(totalRounds===1){rndLabel[1]="Championship"}
  else if(totalRounds===2){rndLabel[1]="Semifinal";rndLabel[2]="Championship"}
  else if(totalRounds===3){rndLabel[1]="Quarterfinal";rndLabel[2]="Semifinal";rndLabel[3]="Championship"}
  else{rounds.forEach((r,i)=>{rndLabel[r]=i===totalRounds-1?"Championship":i===totalRounds-2?"Semifinal":`Round ${r}`})}
  function upd(id,k,v){
    if(!editable)return;
    const n=v===""?null:parseInt(v);
    setBGames(prev=>prev.map(g=>g.id===id?{...g,[k]:isNaN(n)?null:n,status:n!==null?"final":"scheduled"}:g));
  }
  function getT(id){return tByIdFrom(id,teams)}
  const finalGame=bGames.find(g=>g.round===maxRound);
  const champ=finalGame?winOf(finalGame):null;
  return(
    <div>
      {champ&&(
        <div style={{background:"linear-gradient(135deg,#f39c12,#e67e22)",color:"#fff",padding:"14px 20px",borderRadius:10,marginBottom:16,display:"flex",alignItems:"center",gap:16,boxShadow:"var(--sh-lg)"}}>
          <span style={{fontSize:36}}>🏆</span>
          <div>
            <div style={{fontSize:11,fontWeight:700,opacity:.8,textTransform:"uppercase",letterSpacing:1}}>Division Champion</div>
            <div style={{fontSize:20,fontWeight:900}}>{getT(champ)?.name}</div>
          </div>
        </div>
      )}
      {editable&&<Alrt type="info">✏️ Click any score field to update bracket results.</Alrt>}
      <div className="brk-wrap">
        <div className="brk">
          {rounds.map((round,ri)=>{
            const rGames=bGames.filter(g=>g.round===round);
            const spacer=Math.pow(2,ri)*14;
            return(
              <div key={round} className="brk-col">
                <div className="brk-rnd-lbl">{rndLabel[round]||`Round ${round}`}</div>
                {rGames.map(g=>{
                  const t1=getT(g.t1),t2=g.t2?getT(g.t2):null;
                  const w=winOf(g);
                  return(
                    <div key={g.id} style={{marginBottom:spacer}}>
                      <div className="brk-game">
                        <div className={`brk-team ${w===g.t1?"brk-w":w&&w!==g.t1?"brk-l":""}${!g.t1?" brk-tbd":""}`}>
                          <span style={{flex:1,fontSize:12}}>{t1?t1.name:"TBD"}</span>
                          {editable&&g.t1?(
                            <input className={`score-in ${w===g.t1?"score-w":""}`}
                              type="number" min="0" value={g.s1??""} placeholder="—"
                              style={{width:44,fontSize:12,padding:"3px 4px"}}
                              onChange={e=>upd(g.id,"s1",e.target.value)}/>
                          ):<span className={`brk-sc ${w===g.t1?"brk-sc-w":""}`}>{g.s1??""}</span>}
                        </div>
                        <div className={`brk-team ${w===g.t2?"brk-w":w&&w!==g.t2?"brk-l":""}${!g.t2?" brk-tbd":""}`}>
                          <span style={{flex:1,fontSize:12}}>{t2?t2.name:"TBD"}</span>
                          {editable&&g.t2?(
                            <input className={`score-in ${w===g.t2?"score-w":""}`}
                              type="number" min="0" value={g.s2??""} placeholder="—"
                              style={{width:44,fontSize:12,padding:"3px 4px"}}
                              onChange={e=>upd(g.id,"s2",e.target.value)}/>
                          ):<span className={`brk-sc ${w===g.t2?"brk-sc-w":""}`}>{g.s2??""}</span>}
                        </div>
                      </div>
                      <div className="brk-meta">{g.date} · {g.time} · {g.field}</div>
                    </div>
                  );
                })}
              </div>
            );
          })}
          {champ&&(
            <div className="brk-col" style={{paddingTop:28}}>
              <div className="brk-rnd-lbl">Winner</div>
              <div style={{background:"linear-gradient(135deg,#fef3c7,#fde68a)",border:"2px solid #f59e0b",borderRadius:10,padding:"14px 16px",textAlign:"center",margin:"5px 8px",boxShadow:"var(--sh)"}}>
                <div style={{fontSize:28,marginBottom:4}}>🏆</div>
                <div style={{fontSize:12,fontWeight:800,color:"#92400e"}}>{getT(champ)?.name}</div>
                <div style={{fontSize:10,color:"#b45309",marginTop:3}}>Champion</div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ PP MATRIX ════════════════════ */
function PPMatrixView(){
  const [np,setNp]=useState(4);
  const [nt,setNt]=useState(16);
  const pools=Array.from({length:np},(_,i)=>String.fromCharCode(65+i));
  const rows=Math.ceil(nt/np);
  function seed(r,c){const s=r%2===0?r*np+(c+1):r*np+(np-c);return s<=nt?s:null}
  return(
    <div>
      <Alrt type="info">🔢 Serpentine seeding: Seed 1→Pool A, 2→B, etc., then direction reverses each row to balance pool strength.</Alrt>
      <div className="flex gap-3 mb4" style={{alignItems:"flex-end"}}>
        <div><label>Number of Pools</label>
          <select value={np} onChange={e=>setNp(+e.target.value)}>
            {[2,3,4,5,6,8].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
        <div><label>Number of Teams</label>
          <select value={nt} onChange={e=>setNt(+e.target.value)}>
            {[8,12,16,20,24,28,32,33,40,48,54,64].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
      </div>
      <div className="card">
        <div className="card-hd"><span className="card-title">Pool Seeding Matrix — {nt} teams ÷ {np} pools</span></div>
        <div className="card-body">
          <table style={{width:"auto"}}>
            <thead><tr>
              <th style={{width:70}}></th>
              {pools.map(p=><th key={p} style={{textAlign:"center",width:52}}>Pool {p}</th>)}
            </tr></thead>
            <tbody>{Array.from({length:rows},(_,r)=>(
              <tr key={r}>
                <td className="t-sm fw7 t-gray">Row {r+1}</td>
                {pools.map((_,c)=>{const s=seed(r,c);return(
                  <td key={c} style={{textAlign:"center",padding:"4px 6px"}}>
                    {s!=null&&<div className={`pp-cell ${r===0?"pp-cell-top":c===0?"pp-cell-2":""}`}>{s}</div>}
                  </td>
                )})}
              </tr>
            ))}</tbody>
          </table>
          <div className="t-xs t-gray mt3">
            Teams per pool: {pools.map((p,pi)=>{
              const cnt=Array.from({length:rows},(_,r)=>seed(r,pi)!=null?1:0).reduce((a,b)=>a+b,0);
              return `${p}: ${cnt}`;
            }).join(" · ")}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ PLACING ════════════════════ */
function PlacingView({bGames,teams}){
  const lastRound=Math.max(...bGames.map(g=>g.round));
  const finalG=bGames.find(g=>g.round===lastRound);
  const champ=finalG?winOf(finalG):null;
  const runner=finalG?loseOf(finalG):null;
  const sfs=bGames.filter(g=>g.round===lastRound-1&&lastRound>1);
  const third=sfs.map(g=>loseOf(g)).find(t=>t&&t!==champ&&t!==runner);
  function t(id){return tByIdFrom(id,teams)}
  const places=[
    {pos:1,ico:"🥇",id:champ,lbl:"Champion"},
    {pos:2,ico:"🥈",id:runner,lbl:"Runner-Up"},
    {pos:3,ico:"🥉",id:third,lbl:"3rd Place"},
  ];
  return(
    <div>
      <Alrt type="success">🏆 Final division standings based on bracket results.</Alrt>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:20}}>
        {places.map(p=>(
          <div key={p.pos} className="place-card" style={{flex:"1 1 160px",minWidth:140}}>
            <div className="place-medal">{p.ico}</div>
            <div className="place-team">{p.id?t(p.id)?.name:"TBD"}</div>
            <div className="place-detail">{p.lbl}</div>
          </div>
        ))}
      </div>
      <div className="tbl-wrap">
        <table>
          <thead><tr><th>Place</th><th>Team</th><th>Class</th><th>Notes</th></tr></thead>
          <tbody>{places.map(p=>(
            <tr key={p.pos}>
              <td>{p.ico} {p.pos}{p.pos===1?"st":p.pos===2?"nd":"rd"}</td>
              <td className="fw7">{p.id?t(p.id)?.name:"TBD"}</td>
              <td>{p.id?<span className="badge b-gray">{t(p.id)?.cls}</span>:"—"}</td>
              <td className="t-sm t-gray">{p.lbl}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

          <div className="card-hd"><span className="card-title">Director Notes (DevNotes)</span></div>
          <div className="card-body">
            <textarea value={note} onChange={e=>setNote(e.target.value)}
              style={{width:"100%",height:140,resize:"vertical",fontSize:13,lineHeight:1.5}}/>
            <button className="btn btn-green btn-sm mt2">💾 Save Notes</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ FLIGHT VIEW ════════════════════ */
function FlightView({flight,divId,eventParks}){
  const teams=teamDB(divId);
  const [pg,setPg]=useState(poolGamesDB(divId));
  const [bg,setBg]=useState(bracketGamesDB(divId));
  const isPool=flight.type==="pool";
  const poolTabs=["standings","seeds","game-manager","layout","pitching","parks","umpires","live-lock","contact","pp-matrix"];
  const brkTabs=["bracket","game-manager","pool2bracket","placing","seeds","contact"];
  const activeTabs=isPool?poolTabs:brkTabs;
  const [tab,setTab]=useState(isPool?"standings":"bracket");
  const TL={standings:"📊 Standings",seeds:"🎯 Seeds","game-manager":"🗂 Game Manager",layout:"📐 Layout",pitching:"⚾ Pitching",parks:"🏟 Parks",umpires:"🟡 Umpires","live-lock":"🔒 Live & Lock",contact:"📞 Contact","pp-matrix":"🔢 PP Matrix",bracket:"🏆 Bracket","pool2bracket":"↗ Pool → Bracket",placing:"🥇 Placing"};
  return(
    <div>
      <div className="tabs">
        {activeTabs.map(t=>(
          <div key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>{TL[t]}</div>
        ))}
      </div>
      {tab==="standings"&&<StandingsView teams={teams} games={pg}/>}
      {tab==="seeds"&&<SeedsView teams={teams}/>}
      {tab==="game-manager"&&<GameMgrView games={isPool?pg:bg} setGames={isPool?setPg:setBg} teams={teams} readOnly={false}/>}
      {tab==="layout"&&<LayoutView games={isPool?pg:bg} teams={teams}/>}
      {tab==="pitching"&&<PitchingView teams={teams}/>}
      {tab==="parks"&&<ParksView eventParks={eventParks}/>}
      {tab==="umpires"&&<UmpiresView/>}
      {tab==="live-lock"&&<LiveLockView/>}
      {tab==="contact"&&<ContactView/>}
      {tab==="pp-matrix"&&<PPMatrixView/>}
      {tab==="bracket"&&<BracketView bGames={bg} setBGames={setBg} teams={teams} editable={true}/>}
      {tab==="pool2bracket"&&<Pool2BracketView poolGames={pg} teams={teams}/>}
      {tab==="placing"&&<PlacingView bGames={bg} teams={teams}/>}
    </div>
  );
}

            <div className="pub-meta">📍 {ev.loc} · 📅 {ev.date} · {ev.stature}</div>
            <div className="pub-divs">

                <div key={d.id} className={`pub-div ${pubDivId===d.id?"on":""}`}

/* ════════════════════ DASHBOARD ════════════════════ */
function Dashboard({events,onSelect}){
  const [stateF,setStateF]=useState("all");
  const [seasonF,setSeasonF]=useState("all");
  const [directorF,setDirectorF]=useState("all");
  const [statureF,setStatureF]=useState("all");
  const getYear=d=>{const m=d.match(/\d{4}/);return m?m[0]:null;};
  const seasons=[...new Set(events.map(e=>getYear(e.date)).filter(Boolean))].sort((a,b)=>b-a);
  const directors=[...new Set(events.map(e=>e.director).filter(Boolean))].sort();
  const statures=[...new Set(events.map(e=>e.stature).filter(Boolean))].sort();
  const shown=events.filter(e=>
    (stateF==="all"||e.state===stateF)&&
    (seasonF==="all"||getYear(e.date)===seasonF)&&
    (directorF==="all"||e.director===directorF)&&
    (statureF==="all"||e.stature===statureF)
  );
  const totalTeams=shown.reduce((a,ev)=>a+ev.divisions.reduce((b,d)=>b+d.teams,0),0);
  return(
    <div>
      <div className="g4 mb4">
        <div className="stat-card"><div className="stat-ico" style={{background:"#fde8e8"}}>📅</div><div><div className="stat-val">{shown.length}</div><div className="stat-lbl">Total Events</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d6eaf8"}}>⏳</div><div><div className="stat-val">{shown.filter(e=>e.status==="upcoming").length}</div><div className="stat-lbl">Upcoming</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d5f5e3"}}>✅</div><div><div className="stat-val">{shown.filter(e=>e.status==="complete").length}</div><div className="stat-lbl">Completed</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#fef5e7"}}>👥</div><div><div className="stat-val">{totalTeams}</div><div className="stat-lbl">Total Teams</div></div></div>
      </div>
      <div className="card">
        <div className="card-hd">
          <span className="card-title">Event Information — {shown.length} of {events.length} Results</span>
          <div className="flex-w gap-2">
            <select value={seasonF} onChange={e=>setSeasonF(e.target.value)}>
              <option value="all">All Seasons</option>
              {seasons.map(s=><option key={s} value={s}>Season: {s}</option>)}
            </select>
            <select value={stateF} onChange={e=>setStateF(e.target.value)}>
              <option value="all">All States</option>
              {[...new Set(events.map(e=>e.state))].sort().map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={directorF} onChange={e=>setDirectorF(e.target.value)}>
              <option value="all">All Directors</option>
              {directors.map(d=><option key={d}>{d}</option>)}
            </select>
            <select value={statureF} onChange={e=>setStatureF(e.target.value)}>
              <option value="all">All Statures</option>
              {statures.map(s=><option key={s}>{s}</option>)}
            </select>
            <button className="btn btn-primary btn-sm">+ Create New Event</button>
          </div>
        </div>
        <div className="tbl-scroll">
          <table>
            <thead><tr>
              <th style={{width:14}}></th><th>Event ID</th><th>State</th><th>Start Date</th>
              <th>Event Name</th><th># Div</th><th>Teams</th><th>Stature</th><th>Director</th><th>Status</th>
            </tr></thead>
            <tbody>{shown.map(ev=>(
              <tr key={ev.id}>
                <td style={{paddingLeft:12}}><div style={{width:8,height:8,borderRadius:"50%",background:ev.status==="complete"?"var(--green)":ev.status==="live"?"var(--red)":"var(--blue)"}}/></td>
                <td className="fw7 t-sm">{ev.evid}</td>
                <td><span className="badge b-gray">{ev.state}</span></td>
                <td className="t-sm">{ev.date}</td>
                <td><span style={{color:"var(--blue)",cursor:"pointer",fontWeight:600}} onClick={()=>onSelect(ev)}>{ev.name}</span></td>
                <td className="t-sm">{ev.divisions.length}</td>
                <td className="t-sm">{ev.divisions.reduce((a,d)=>a+d.teams,0)}</td>
                <td className="t-sm">{ev.stature}</td>
                <td className="t-sm">{ev.director}</td>
                <td><Ev_StatusBadge status={ev.status}/></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ CREATE EVENT ════════════════════ */
const ALL_STATES=["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];
const ALL_DIVS=["7U CP","8U CP","9U Open","10U Open","11U Open","12U Open","13U Open","14U Open 60/90","15U Open","16U Open","17U Open","18U Open"];
const STATURES=["All American Games - Baseball","Baseball World Series","Double State Qualifier","Elite World Series","Fall/Winter Nationals","Global State","Global World Series","Global WS Qualifier","Individual Event","League","League 2","Major Championship","NABC National Championship","One Day Event","Select - Baseball","Select Super NIT","Select Super Regional NIT","State Qualifier","Super NIT","Super Regional NIT","UACS Double Qualifier","UACS NIT","USSSA Fall State","USSSA NIT","USSSA State"];
const LWC_OPTIONS=[{v:"open",l:"Open — Accepting Entries"},{v:"waitlist",l:"Wait List"},{v:"closed",l:"Closed"},{v:"hold",l:"On Hold"}];
const EVENT_FORMATS=["Double Elimination","Single Elimination","Pool Play into Double Elimination","Pool Play into Single Elimination","Pool Play into 3GG","3GG - 3 Game Guarantee Bracket","Pool Play into Split Bracket Single Elim","Pool Play into Split Bracket Double Elim","Pool Play into Multiple Bracket","Round Robin","World Fastpitch Championship","Global World Series","Elite World Series","All American Games","League","TBA"];

function SectionHead({title}){
  return <div style={{fontWeight:700,fontSize:14,color:"#1a3a5c",textTransform:"uppercase",letterSpacing:1,margin:"24px 0 12px",paddingBottom:6,borderBottom:"2px solid #e8edf2"}}>{title}</div>;
}

function CreateEventView(){
  const [f,setF]=useState({
    name:"",sport:"Baseball",state:"FL",sanctionState:"FL",city:"",
    startDate:"",endDate:"",entryDeadline:"",stature:"Double State Qualifier",
    format:"Double Elimination",director:"",
    lodgingDirector:"",lwc:"open",divisions:[],
    quickDetails:"",advancedDesc:"",hotelInfo:"",
    alertEnabled:false,alertMsg:"",
    streamEnabled:false,streamURL:"",rainoutEmbed:""
  });
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleDiv=d=>setF(p=>({...p,divisions:p.divisions.includes(d)?p.divisions.filter(x=>x!==d):[...p.divisions,d]}));

  function handleCreate(){
    if(!f.name.trim()){alert("Event Name is required.");return;}
    if(!f.startDate){alert("Start Date is required.");return;}
    if(!f.director.trim()){alert("Event Director is required.");return;}
    const newEvent={
      id:Date.now(),
      evid:String(Math.floor(410000+Math.random()*20000)),
      name:f.name.trim(),
      loc:`${f.city}, ${f.state}`,
      state:f.state, city:f.city,
      date:new Date(f.startDate).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),
      endDate:f.endDate, entryDeadline:f.entryDeadline, sport:f.sport, sanctionState:f.sanctionState,
      status:"upcoming", stature:f.stature, format:f.format, director:f.director.trim(),
      lodgingDirector:f.lodgingDirector, lwc:f.lwc,
      quickDetails:f.quickDetails, advancedDesc:f.advancedDesc, hotelInfo:f.hotelInfo,
      alertEnabled:f.alertEnabled, alertMsg:f.alertMsg,
      streamEnabled:f.streamEnabled, streamURL:f.streamURL, rainoutEmbed:f.rainoutEmbed,
      parks:[],
      divisions:f.divisions.map((d,i)=>({id:Date.now()+i,code:d.replace(/\s+/g,""),label:d,wl:"0-0-0",teams:0,flights:[]}))
    };
    dbSave('events',newEvent);
    alert(`Event "${newEvent.name}" created! Event ID: ${newEvent.evid}`);
    setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false}));
  }

  const inputStyle={width:"100%",padding:"7px 10px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13};
  const labelStyle={display:"block",fontWeight:600,fontSize:12,color:"#4a5568",marginBottom:4,textTransform:"uppercase",letterSpacing:.5};
  const fieldWrap={display:"flex",flexDirection:"column"};
  const grid2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:16};
  const grid3={display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16};
  const toggleRow={display:"flex",alignItems:"center",gap:10,padding:"6px 0"};

  return(
    <div style={{maxWidth:900}}>
      <div className="card">
        <div className="card-hd"><span className="card-title">➕ Create New Event</span></div>
        <div className="card-body">

          <SectionHead title="Event Information"/>
          <div style={grid2}>
            <div style={{...fieldWrap,gridColumn:"1/-1"}}><label style={labelStyle}>Event Name *</label><input style={inputStyle} value={f.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Spring State Qualifier"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Sport</label>
              <select style={inputStyle} value={f.sport} onChange={e=>set("sport",e.target.value)}>
                <option>Baseball</option><option>Softball</option><option>Soccer</option>
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Stature</label>
              <select style={inputStyle} value={f.stature} onChange={e=>set("stature",e.target.value)}>
                {STATURES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Event Format</label>
              <select style={inputStyle} value={f.format} onChange={e=>set("format",e.target.value)}>
                {EVENT_FORMATS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Start Date *</label><input style={inputStyle} type="date" value={f.startDate} onChange={e=>set("startDate",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>End Date</label><input style={inputStyle} type="date" value={f.endDate} onChange={e=>set("endDate",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>Entry Deadline</label><input style={inputStyle} type="date" value={f.entryDeadline} onChange={e=>set("entryDeadline",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>City / Location *</label><input style={inputStyle} value={f.city} onChange={e=>set("city",e.target.value)} placeholder="City"/></div>
            <div style={fieldWrap}><label style={labelStyle}>State *</label>
              <select style={inputStyle} value={f.state} onChange={e=>set("state",e.target.value)}>
                {ALL_STATES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Entry Policy</label>
              <select style={inputStyle} value={f.lwc} onChange={e=>set("lwc",e.target.value)}>
                {LWC_OPTIONS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
              </select>
            </div>
          </div>

          <SectionHead title="Directors"/>
          <div style={grid2}>
            <div style={fieldWrap}><label style={labelStyle}>Event Director *</label><input style={inputStyle} value={f.director} onChange={e=>set("director",e.target.value)} placeholder="Director full name"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Lodging Director</label><input style={inputStyle} value={f.lodgingDirector} onChange={e=>set("lodgingDirector",e.target.value)} placeholder="Lodging contact (optional)"/></div>
          </div>

          <SectionHead title="Age Divisions"/>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
            {ALL_DIVS.map(d=>{
              const sel=f.divisions.includes(d);
              return(
                <label key={d} onClick={()=>toggleDiv(d)} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer",padding:"5px 12px",background:sel?"#1a3a5c":"#f4f6f8",color:sel?"#fff":"#4a5568",borderRadius:20,border:`1px solid ${sel?"#1a3a5c":"#cdd5df"}`,userSelect:"none",transition:"all .15s"}}>
                  <input type="checkbox" checked={sel} onChange={()=>toggleDiv(d)} style={{display:"none"}}/>{d}
                </label>
              );
            })}
          </div>
          {f.divisions.length>0&&<div style={{fontSize:12,color:"#666",marginBottom:4}}>{f.divisions.length} division{f.divisions.length!==1?"s":""} selected</div>}

          <SectionHead title="Event Details"/>
          <div style={{display:"grid",gap:14}}>
            <div style={fieldWrap}><label style={labelStyle}>Quick Details</label><input style={inputStyle} value={f.quickDetails} onChange={e=>set("quickDetails",e.target.value)} placeholder="Short summary shown on public event listing"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Advanced Description</label><textarea style={{...inputStyle,resize:"vertical"}} rows={4} value={f.advancedDesc} onChange={e=>set("advancedDesc",e.target.value)} placeholder="Full event description, rules, special notes..."/></div>
            <div style={fieldWrap}><label style={labelStyle}>Hotel Information</label><textarea style={{...inputStyle,resize:"vertical"}} rows={3} value={f.hotelInfo} onChange={e=>set("hotelInfo",e.target.value)} placeholder="Hotel partner info, discount codes, booking links..."/></div>
          </div>

          <SectionHead title="Alerts & Features"/>
          <div style={{display:"grid",gap:12}}>
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.alertEnabled} onChange={e=>set("alertEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Alert Message</span>
            </label>
            {f.alertEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.alertMsg} onChange={e=>set("alertMsg",e.target.value)} placeholder="Alert message shown to teams on this event..."/></div>}
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.streamEnabled} onChange={e=>set("streamEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Live Streaming</span>
            </label>
            {f.streamEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.streamURL} onChange={e=>set("streamURL",e.target.value)} placeholder="Live stream URL..."/></div>}
            <div style={fieldWrap}><label style={labelStyle}>Rainout Line Embed</label><input style={inputStyle} value={f.rainoutEmbed} onChange={e=>set("rainoutEmbed",e.target.value)} placeholder="Rainout line embed code or URL"/></div>
          </div>

          <div style={{marginTop:28,display:"flex",gap:12}}>
            <button className="btn btn-primary" onClick={handleCreate}>✓ Create Event</button>
            <button className="btn btn-secondary" onClick={()=>setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false}))}>✕ Clear Form</button>
          </div>

        </div>
      </div>
    </div>
  );
}

/* ════════════════════ SIDEBAR NAV ════════════════════ */
const NAV=[
  {sec:"Management",items:[
    {id:"events",ico:"📅",label:"Event Management"},
    {id:"create",ico:"➕",label:"Create Event"},
  ]},
  {sec:"Scheduling Tools",items:[
    {id:"s-game-mgr",ico:"🗂",label:"Game Manager"},
    {id:"s-layout",ico:"📐",label:"Layout Builder"},
    {id:"s-bracket",ico:"🏆",label:"Brackets"},
    {id:"s-standings",ico:"📊",label:"Pool Standings"},
  ]},
  {sec:"Setup",items:[
    {id:"s-seeds",ico:"🎯",label:"Seeding"},
    {id:"s-parks",ico:"🏟",label:"Parks & Fields"},
    {id:"s-umpires",ico:"🟡",label:"Umpires"},
    {id:"s-pitching",ico:"⚾",label:"Pitching"},
    {id:"s-ppmatrix",ico:"🔢",label:"Pool Matrix"},
  ]},
  {sec:"Reports & Tools",items:[
    {id:"s-placing",ico:"🥇",label:"Final Placing"},
    {id:"s-rosters",ico:"👥",label:"Rosters"},
    {id:"s-livelock",ico:"🔒",label:"Live & Lock"},
  ]},
  {sec:"Public",items:[
    {id:"s-public",ico:"👁",label:"Public Fan View"},
  ]},
];
const SHORTCUT_IDS=new Set(NAV.flatMap(s=>s.items).map(i=>i.id).filter(i=>i.startsWith("s-")));

function ShortcutHint({id}){
  const labels={"s-game-mgr":["🗂","Game Manager","View/edit game assignments, swap teams, enter scores. Access via: Events → Event → Division → Pool Flight → Game Manager tab."],"s-layout":["📐","Layout Builder","Visual time-slot grid. Set fields, game durations, block times. Access via: Events → Event → Division → Pool Flight → Layout tab."],"s-bracket":["🏆","Brackets","Single/double elimination bracket management. Access via: Events → Event → Division → Bracket Flight → Bracket tab."],"s-standings":["📊","Pool Standings","Real-time W/L/T, PF/PA, run differential. Access via: Events → Event → Division → Pool Flight → Standings tab."],"s-seeds":["🎯","Seeding","USSSA Points + Power Rating seeding table. Access via: Events → Event → Division → Flight → Seeds tab."],"s-parks":["🏟","Parks & Fields","Select and assign tournament parks. Access via: Events → Event → Division → Flight → Parks tab."],"s-umpires":["🟡","Umpires","Assign certified umpires to games. Access via: Events → Event → Division → Flight → Umpires tab."],"s-pitching":["⚾","Pitching Tracker","Pitch counts and rest requirements by age group. Access via: Events → Event → Division → Pool Flight → Pitching tab."],"s-ppmatrix":["🔢","Pool Matrix","Serpentine seeding matrix calculator. Access via: Events → Event → Division → Flight → PP Matrix tab."],"s-placing":["🥇","Final Placing","Division champion and runner-up display. Access via: Events → Event → Division → Bracket Flight → Placing tab."],"s-rosters":["👥","Rosters","Team rosters for any division. Access via: Events → Event → Division → Flight → Contact tab."],"s-livelock":["🔒","Live & Lock Settings","Control public visibility and lock events. Access via: Events → Event → Division → Flight → Live & Lock tab."],"s-public":["👁","Public Fan View","Toggle any event to Public Fan View mode using the view toggle in the event detail page."]};
  const info=labels[id];
  if(!info)return null;
  const [ico,title,desc]=info;
  return(
    <div className="card">
      <div className="card-body" style={{textAlign:"center",padding:"50px 28px"}}>
        <div style={{fontSize:48,marginBottom:10}}>{ico}</div>
        <div style={{fontSize:17,fontWeight:800,color:"var(--navy)",marginBottom:6}}>{title}</div>
        <div style={{fontSize:13,color:"var(--gray)",maxWidth:420,margin:"0 auto",lineHeight:1.6}}>{desc}</div>
        <div style={{marginTop:20,padding:"12px 16px",background:"var(--blue-l)",borderRadius:8,fontSize:12,color:"var(--blue)",fontWeight:600}}>
          💡 Tip: All scheduling tools are available inline when you open an event and navigate to a specific division and flight.
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ APP ROOT ════════════════════ */
function App(){
  const [view,setView]=useState("events");
  const [selEv,setSelEv]=useState(null);
  const [events,setEvents]=useState(EVENTS_DB);
  const [dbStatus,setDbStatus]=useState('connecting');
  useEffect(()=>{
    (async()=>{
      const rows=await dbLoad('events');
      if(rows&&rows.length>0){
        const merged=[...EVENTS_DB];
        rows.forEach(r=>{
          if(!merged.find(e=>String(e.id)===String(r.id)))
            merged.push({...r,divisions:r.divisions||[]});
        });
        setEvents(merged);
        setDbStatus('connected');
      }else{
        setDbStatus(rows!==null?'connected':'offline');
      }
    })();
  },[]);
  function nav(id){setView(id);if(id==="events")setSelEv(null)}
  function selectEvent(ev){setSelEv(ev);setView("event-detail")}
  const title=()=>{
    if(view==="event-detail"&&selEv)return selEv.name;
    if(view==="create")return "Create New Event";
    return NAV.flatMap(s=>s.items).find(i=>i.id===view)?.label||"USSSA Tournament Manager";
  };
  const sub=()=>view==="event-detail"&&selEv?`${selEv.loc} · ${selEv.date}`:null;
  return(
    <div className="app">
      <nav className="sidebar">
        <div className="sb-logo">
          <div className="brand">USSSA</div>
          <div className="sub">Tournament Manager</div>
        </div>
        {NAV.map(s=>(
          <div key={s.sec} className="sb-sec">
            <div className="sb-lbl">{s.sec}</div>
            {s.items.map(item=>(
              <div key={item.id}
                className={`sb-item ${view===item.id||(item.id==="events"&&view==="event-detail")?"active":""}`}
                onClick={()=>nav(item.id)}>
                <span className="ico">{item.ico}</span>{item.label}
              </div>
            ))}
          </div>
        ))}
        <div className="sb-user">
          <div style={{fontSize:10,color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:.8}}>Signed in as</div>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",marginTop:2}}>Steve Hassett</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>steve@utproducts.com</div>
        </div>
      </nav>
      <main className="main">
        <div className="topbar">
          <div>
            <div className="tb-title">{title()}</div>
            {sub()&&<div className="tb-sub">{sub()}</div>}
          </div>
          <div className="tb-right">
            <span className={`badge ${dbStatus==='connected'?'b-green':dbStatus==='connecting'?'b-gold':'b-red'}`} style={{fontSize:10}}>{dbStatus==='connected'?'● DB Connected':dbStatus==='connecting'?'◌ Connecting...':'○ Offline (Demo)'}</span>
            <span className="badge b-gray" style={{fontSize:10}}>2026 Season</span>
            {view!=="create"&&<button className="btn btn-primary btn-sm" onClick={()=>nav("create")}>+ New Event</button>}
          </div>
        </div>
        <div className="content">
          {view==="events"&&<Dashboard events={events} onSelect={selectEvent}/>}
          {view==="event-detail"&&selEv&&<EventDetailView ev={selEv} onBack={()=>nav("events")}/>}
          {view==="create"&&<CreateEventView/>}
          {SHORTCUT_IDS.has(view)&&<ShortcutHint id={view}/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
