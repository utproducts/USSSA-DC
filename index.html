/* ════════════════════ PP MATRIX ════════════════════ */
function PPMatrixView(){
  const [np,setNp]=useState(4);
  const [nt,setNt]=useState(16);
  const pools=Array.from({length:np},(_,i)=>String.fromCharCode(65+i));
  const rows=Math.ceil(nt/np);
  function seed(r,c){const s=r%2===0?r*np+(c+1):r*np+(np-c);return s<=nt?s:null}
  return(
    <div>
      <Alrt type="info">🔢 Serpentine seeding: Seed 1→Pool A, 2→B, etc., then direction reverses each row to balance pool strength.</Alrt>
      <div className="flex gap-3 mb4" style={{alignItems:"flex-end"}}>
        <div><label>Number of Pools</label>
          <select value={np} onChange={e=>setNp(+e.target.value)}>
            {[2,3,4,5,6,8].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
        <div><label>Number of Teams</label>
          <select value={nt} onChange={e=>setNt(+e.target.value)}>
            {[8,12,16,20,24,28,32,33,40,48,54,64].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
      </div>
      <div className="card">
        <div className="card-hd"><span className="card-title">Pool Seeding Matrix — {nt} teams ÷ {np} pools</span></div>
        <div className="card-body">
          <table style={{width:"auto"}}>
            <thead><tr>
              <th style={{width:70}}></th>
              {pools.map(p=><th key={p} style={{textAlign:"center",width:52}}>Pool {p}</th>)}
            </tr></thead>
            <tbody>{Array.from({length:rows},(_,r)=>(
              <tr key={r}>
                <td className="t-sm fw7 t-gray">Row {r+1}</td>
                {pools.map((_,c)=>{const s=seed(r,c);return(
                  <td key={c} style={{textAlign:"center",padding:"4px 6px"}}>
                    {s!=null&&<div className={`pp-cell ${r===0?"pp-cell-top":c===0?"pp-cell-2":""}`}>{s}</div>}
                  </td>
                )})}
              </tr>
            ))}</tbody>
          </table>
          <div className="t-xs t-gray mt3">
            Teams per pool: {pools.map((p,pi)=>{
              const cnt=Array.from({length:rows},(_,r)=>seed(r,pi)!=null?1:0).reduce((a,b)=>a+b,0);
              return `${p}: ${cnt}`;
            }).join(" · ")}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ PITCHING ════════════════════ */
function PitchingView({teams,games=[]}){
  const INN_OPTS=["","0/3 Inn","1/3 Inn","2/3 Inn","1 Inn","1-1/3 Inn","1-2/3 Inn","2 Inn","2-1/3 Inn","2-2/3 Inn","3 Inn","3-1/3 Inn","3-2/3 Inn","4 Inn","4-1/3 Inn","4-2/3 Inn","5 Inn","5-1/3 Inn","5-2/3 Inn","6 Inn","6-1/3 Inn","6-2/3 Inn","7 Inn","7-1/3 Inn","7-2/3 Inn","8 Inn","8-1/3 Inn","8-2/3 Inn","9 Inn","9-1/3 Inn","9-2/3 Inn","10 Inn"];
  const ROWS=10;
  const [entries,setEntries]=useState({});
  const [selId,setSelId]=useState(null);
  const [activeTab,setActiveTab]=useState("entry");
  const [activeTeam,setActiveTeam]=useState(0);
  const [savedMsg,setSavedMsg]=useState("");
  const glist=games.filter(g=>g.status!=="bye"&&g.t1&&g.t2);
  const selG=glist.find(g=>g.id===selId)||(glist[0]||null);
  function tm(id){return teams.find(t=>t.id===id)||{name:id||"TBD"}}
  function eKey(gId,tId,r){return `${gId}||${tId}||${r}`}
  function getE(gId,tId,r){return entries[eKey(gId,tId,r)]||{player:"",outs:"",pitches:""}}
  function setE(gId,tId,r,field,val){
    const k=eKey(gId,tId,r);
    setEntries(p=>({...p,[k]:{...(p[k]||{player:"",outs:"",pitches:""}),[field]:val}}));
  }
  function hasData(gId){return Object.entries(entries).some(([k,e])=>k.startsWith(`${gId}||`)&&(e.player||e.outs))}
  function saveChanges(){setSavedMsg("✓ Saved");setTimeout(()=>setSavedMsg(""),2000)}
  function outsCount(inns){
    if(!inns)return 0;
    if(inns==="1/3 Inn")return 1;
    if(inns==="2/3 Inn")return 2;
    const w=inns.match(/^(\d+) Inn$/);if(w)return parseInt(w[1])*3;
    const m=inns.match(/^(\d+)-(\d+)\/3 Inn$/);if(m)return parseInt(m[1])*3+parseInt(m[2]);
    return 0;
  }
  function buildSummary(){
    const map={};
    Object.entries(entries).forEach(([k,e])=>{
      if(!e.player)return;
      const parts=k.split("||");
      const gId=parts[0],tId=parts[1];
      const sk=`${tId}::${e.player.trim().toLowerCase()}`;
      if(!map[sk])map[sk]={tId,player:e.player,totalOuts:0,gamesSet:new Set()};
      map[sk].totalOuts+=outsCount(e.outs);
      if(gId)map[sk].gamesSet.add(gId);
    });
    return Object.values(map).map(r=>({...r,gamesCount:r.gamesSet.size})).sort((a,b)=>b.totalOuts-a.totalOuts);
  }
  const summary=buildSummary();
  const INP={width:"100%",border:"1.5px solid #cbd5e1",borderRadius:5,padding:"8px 10px",fontSize:14,boxSizing:"border-box",background:"white",outline:"none"};
  const SEL={width:"100%",border:"1.5px solid #cbd5e1",borderRadius:5,padding:"8px 8px",fontSize:14,background:"white",outline:"none"};
  const TH={padding:"10px 14px",fontSize:12,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5,borderBottom:"2px solid #e2e8f0",background:"#f8fafc",whiteSpace:"nowrap"};
  const TD={padding:"6px 10px",verticalAlign:"middle",borderBottom:"1px solid #f1f5f9"};
  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:12}}>
        {[["entry","⚾ Game Entry"],["summary","📊 Pitcher Summary"]].map(([t,lbl])=>(
          <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"5px 14px",border:"none",borderRadius:4,fontWeight:700,fontSize:12,cursor:"pointer",
            background:activeTab===t?"#1e3a5f":"#e2e8f0",color:activeTab===t?"white":"#475569"}}>{lbl}</button>
        ))}
      </div>
      {activeTab==="entry"&&(
        glist.length===0
          ?<Alrt type="info">No games scheduled yet. Add games in Game Manager first.</Alrt>
          :<div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            {/* Game list */}
            <div style={{width:192,flexShrink:0}}>
              <div style={{fontWeight:700,fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>Select Game</div>
              {glist.map(g=>{
                const active=g.id===selG?.id;
                const done=hasData(g.id);
                return(
                  <div key={g.id} onClick={()=>{setSelId(g.id);setActiveTeam(0);}}
                    style={{padding:"8px 10px",marginBottom:4,borderRadius:6,cursor:"pointer",border:`2px solid ${active?"#1e3a5f":"#e2e8f0"}`,
                      background:active?"#eff6ff":"white",position:"relative",transition:".1s"}}>
                    <div style={{fontWeight:700,fontSize:12,color:active?"#1e3a5f":"#1e293b",lineHeight:1.4}}>{tm(g.t1).name}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>vs.</div>
                    <div style={{fontWeight:700,fontSize:12,color:active?"#1e3a5f":"#1e293b",lineHeight:1.4}}>{tm(g.t2).name}</div>
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                      {g.pool?`Pool ${g.pool}`:""}
                      {g.status==="final"&&g.s1!=null?` · ${g.s1}-${g.s2}`:""}
                    </div>
                    {done&&<span style={{position:"absolute",top:7,right:8,fontSize:12,color:"#15803d",fontWeight:800}}>✓</span>}
                  </div>
                );
              })}
            </div>
            {/* Entry panel */}
            {selG?(
              <div style={{flex:1,minWidth:0}}>
                {/* Game header + save */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:15,color:"#1e3a5f"}}>{tm(selG.t1).name} vs. {tm(selG.t2).name}</span>
                    {selG.pool&&<span style={{fontSize:12,color:"#64748b",marginLeft:8}}>Pool {selG.pool}</span>}
                    {selG.status==="final"&&selG.s1!=null&&<span style={{fontSize:12,color:"#64748b",marginLeft:6}}>Final: {selG.s1}–{selG.s2}</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {savedMsg&&<span style={{color:"#15803d",fontWeight:700,fontSize:13}}>{savedMsg}</span>}
                    <button onClick={saveChanges}
                      style={{padding:"7px 16px",background:"#1e3a5f",color:"white",border:"none",borderRadius:5,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      💾 Save Changes
                    </button>
                  </div>
                </div>
                {/* Team tabs */}
                <div style={{display:"flex",gap:0,marginBottom:0,border:"1px solid #e2e8f0",borderBottom:"none",borderRadius:"6px 6px 0 0",overflow:"hidden"}}>
                  {[selG.t1,selG.t2].map((tId,i)=>{
                    const on=activeTeam===i;
                    const tHasData=Array.from({length:ROWS},(_,r)=>getE(selG.id,tId,r)).some(e=>e.player||e.outs);
                    return(
                      <div key={tId} onClick={()=>setActiveTeam(i)}
                        style={{flex:1,padding:"10px 16px",cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"center",
                          background:on?"white":"#f8fafc",color:on?"#1e3a5f":"#64748b",
                          borderBottom:on?"3px solid #1e3a5f":"3px solid transparent",
                          borderRight:i===0?"1px solid #e2e8f0":"none",transition:".1s"}}>
                        {tm(tId).name}
                        {tHasData&&<span style={{marginLeft:6,fontSize:11,color:"#15803d",fontWeight:800}}>✓</span>}
                      </div>
                    );
                  })}
                </div>
                {/* Pitcher table — full width, one team at a time */}
                {[selG.t1,selG.t2].map((tId,i)=>activeTeam!==i?null:(
                  <div key={tId} style={{border:"1px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 6px 6px",overflow:"hidden"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead>
                        <tr>
                          <th style={{...TH,width:36,textAlign:"center"}}>#</th>
                          <th style={{...TH,textAlign:"left"}}>Player Name</th>
                          <th style={{...TH,textAlign:"center",width:180}}>Innings Pitched</th>
                          <th style={{...TH,textAlign:"center",width:100}}>Pitches</th>
                        </tr>
                      </thead>
                      <tbody>
                        {Array.from({length:ROWS},(_,r)=>{
                          const e=getE(selG.id,tId,r);
                          const filled=!!(e.player||e.outs);
                          return(
                            <tr key={r} style={{background:filled?"#f0fdf4":r%2===0?"white":"#fafbfc"}}>
                              <td style={{...TD,textAlign:"center",color:"#94a3b8",fontWeight:700,fontSize:13,width:36}}>{r+1}</td>
                              <td style={TD}>
                                <input type="text" value={e.player}
                                  onChange={ev=>setE(selG.id,tId,r,"player",ev.target.value)}

                              <td style={{...TD,width:180}}>
                                <select value={e.outs} onChange={ev=>setE(selG.id,tId,r,"outs",ev.target.value)} style={SEL}>
                                  {INN_OPTS.map(o=><option key={o} value={o}>{o||"— Select Inn —"}</option>)}
                                </select>
                              </td>
                              <td style={{...TD,width:100}}>
                                <input type="number" min="0" value={e.pitches}

                ))}
                {!hasData(selG.id)&&(
                  <div style={{color:"#94a3b8",fontSize:12,fontStyle:"italic",marginTop:8}}>
                    *** Innings pitched not entered for game
                  </div>
                )}
                <div style={{marginTop:8,padding:"7px 12px",background:"#f8fafc",borderRadius:5,fontSize:12,color:"#64748b"}}>

        <div>

/* ════════════════════ PLACING ════════════════════ */
function PlacingView({bGames,teams}){
  const NAVY="#1e3a5f";
  function tm(id){return tByIdFrom(id,teams)}
  const ordSfx=n=>n===1?"st":n===2?"nd":n===3?"rd":"th";
  // Build all placings by traversing every round's losers (bottom-up)
  // Determine total rounds
  const rounds=[...new Set(bGames.filter(g=>g.status!=="bye").map(g=>g.round))].sort((a,b)=>b-a);
  if(!rounds.length)return <Alrt type="info">🏆 No bracket games recorded yet.</Alrt>;
  const lastRound=rounds[0];
  // Walk rounds from last → first to assign places
  // Championship winner = 1st, loser = 2nd
  // Semi-final losers = 3rd/4th, Quarter-final losers = 5th–8th, etc.
  const places=[];
  let nextPlace=1;
  const placed=new Set();
  rounds.forEach(r=>{
    const roundGames=bGames.filter(g=>g.round===r&&g.status!=="bye");
    if(r===lastRound){
      // Championship
      roundGames.forEach(g=>{
        const w=winOf(g),l=loseOf(g);
        if(w&&!placed.has(w)){places.push({pos:nextPlace,id:w,lbl:"Champion",ico:"🥇"});placed.add(w);nextPlace++;}
        if(l&&!placed.has(l)){places.push({pos:nextPlace,id:l,lbl:"Runner-Up",ico:"🥈"});placed.add(l);nextPlace++;}
      });
    } else {
      // All losers from this round tie for nextPlace
      const losers=roundGames.map(g=>loseOf(g)).filter(id=>id&&!placed.has(id));
      const numLosers=losers.length;
      if(numLosers===0)return;
      const startPos=nextPlace;
      const endPos=nextPlace+numLosers-1;
      const posLabel=startPos===endPos?`${startPos}${ordSfx(startPos)}`:
        `${startPos}${ordSfx(startPos)}–${endPos}${ordSfx(endPos)}`;
      const ico=startPos===3?"🥉":startPos<=4?"4️⃣":startPos<=8?"🎖":"📋";
      losers.forEach(id=>{
        if(!placed.has(id)){
          places.push({pos:startPos,id,lbl:posLabel+" Place",ico});
          placed.add(id);
          nextPlace++;
        }
      });
    }
  });
  // Any team in the bracket but not placed = TBD
  const allBracketTeams=new Set(bGames.filter(g=>g.status!=="bye").flatMap(g=>[g.t1,g.t2]).filter(Boolean));
  allBracketTeams.forEach(id=>{
    if(!placed.has(id)){
      places.push({pos:nextPlace,id,lbl:"TBD",ico:"⏳"});
      nextPlace++;
    }
  });
  const top3=places.filter(p=>p.pos<=3);
  return(
    <div>
      <Alrt type="success">🏆 Final division standings based on bracket results. Positions auto-calculated from game outcomes.</Alrt>
      {/* Podium cards */}
      {top3.length>0&&(
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:20}}>
          {[1,2,3].map(pos=>{
            const p=top3.find(x=>x.pos===pos);
            const medBg=pos===1?"linear-gradient(135deg,#fbbf24,#f59e0b)":pos===2?"linear-gradient(135deg,#94a3b8,#64748b)":"linear-gradient(135deg,#f97316,#ea580c)";
            return(
              <div key={pos} style={{flex:"1 1 150px",minWidth:140,textAlign:"center",
                borderRadius:12,overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>
                <div style={{background:medBg,padding:"16px 8px 12px"}}>
                  <div style={{fontSize:32}}>{p?.ico||"❓"}</div>
                  <div style={{color:"#fff",fontWeight:900,fontSize:11,marginTop:4,letterSpacing:1}}>{p?.lbl||`${pos}${ordSfx(pos)} Place`}</div>
                </div>
                <div style={{background:"#fff",padding:"12px 8px",borderTop:"3px solid rgba(0,0,0,.05)"}}>
                  <div style={{fontWeight:800,fontSize:13,color:NAVY,lineHeight:1.3}}>
                    {p?.id?tm(p.id)?.name:<span style={{color:"#94a3b8",fontStyle:"italic"}}>TBD</span>}
                  </div>
                  {p?.id&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{tm(p.id)?.cls}</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {/* Full placing table */}
      <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
        <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
          <thead>
            <tr style={{background:NAVY,color:"#fff"}}>
              <th style={{padding:"9px 12px",fontWeight:700,width:80}}>Place</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"left"}}>Team</th>
              <th style={{padding:"9px 12px",fontWeight:700,width:80,textAlign:"center"}}>Class</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"left",width:160}}>Notes</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"center",width:100}}>Set Place</th>
            </tr>
          </thead>
          <tbody>
            {places.sort((a,b)=>a.pos-b.pos).map((p,i)=>{
              const team=tm(p.id);
              const rowBg=i%2===0?"#fff":"#f8fafc";
              const plcColor=p.pos===1?"#b45309":p.pos===2?"#64748b":p.pos===3?"#c2410c":"#1e293b";
              return(
                <tr key={p.id||i} style={{background:rowBg,borderTop:"1px solid #f1f5f9"}}>
                  <td style={{padding:"8px 12px",textAlign:"center",fontWeight:900,fontSize:14,color:plcColor}}>
                    {p.ico} {p.pos}{ordSfx(p.pos)}
                  </td>
                  <td style={{padding:"8px 12px",fontWeight:700,color:NAVY}}>
                    {team?<>
                      {team.state&&<span style={{fontSize:10,color:"#94a3b8",marginRight:4}}>[{team.state}]</span>}
                      {team.name}
                    </>:<span style={{color:"#94a3b8",fontStyle:"italic"}}>TBD</span>}
                  </td>
                  <td style={{padding:"8px 12px",textAlign:"center"}}>
                    {team&&<span style={{background:"#f1f5f9",border:"1px solid #cbd5e1",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700,color:"#475569"}}>{team.cls}</span>}
                  </td>
                  <td style={{padding:"8px 12px",color:"#64748b",fontSize:12}}>{p.lbl}</td>
                  <td style={{padding:"8px 12px",textAlign:"center"}}>
                    <input type="number" min="0" placeholder="Override"
                      style={{width:64,padding:"4px 6px",border:"1px solid #cbd5e1",borderRadius:4,fontSize:11,textAlign:"center"}}/>
                  </td>

              );
            })}
          </tbody>
        </table>

        * Set Place to 0 to hide a team from standings display. Overrides are used for tiebreak situations not resolvable by bracket position alone.
      </div>
    </div>
  );
}

function ContactView({ev}){
  const NAVY="#1e3a5f";
  const [note,setNote]=useState("Pool assignments finalized. Fields confirmed with park. Bracket seeded by pool finish. All games 1h 30min.\n\n3/15: Updated field assignments for Sunday.\n3/18: Bracket locked.");
  const [msgSubject,setMsgSubject]=useState("");
  const [msgBody,setMsgBody]=useState("");
  const [selDivs,setSelDivs]=useState(new Set());
  const [msgSent,setMsgSent]=useState(false);
  const divOptions=(ev?.divisions||[]).map(d=>d.name||d.id);
  const charCount=(msgSubject+msgBody).length;
  const smsOver=charCount>80;
  function toggleDiv(d){setSelDivs(p=>{const n=new Set(p);n.has(d)?n.delete(d):n.add(d);return n;});}
  function selectAll(){setSelDivs(new Set(divOptions));}
  function clearAll(){setSelDivs(new Set());}

    if(!msgSubject.trim()||!msgBody.trim()||selDivs.size===0)return;
    setMsgSent(true);
    setTimeout(()=>setMsgSent(false),3000);
  }
  const [logTab,setLogTab]=useState("msg");
  const sampleLog=[
    {ts:"3/18/2026 2:15 PM",dir:"Steve Hassett",action:"Scores - scores entered",flight:"Pool"},
    {ts:"3/18/2026 10:32 AM",dir:"Steve Hassett",action:"Placing2 - red button clicked",flight:"Bracket"},
    {ts:"3/17/2026 6:44 PM",dir:"Steve Hassett",action:"ResultsUpdate",flight:"Pool"},
    {ts:"3/17/2026 3:20 PM",dir:"Steve Hassett",action:"LayoutSubmit - field data saved",flight:"Pool"},
  ];
  return(
    <div>
      {/* Tab bar */}
      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:"2px solid #e2e8f0",paddingBottom:0}}>
        {[["msg","📨 Message Teams"],["info","📋 Event Info"],["notes","📝 Director Notes"],["logs","📄 Audit Log"]].map(([k,lbl])=>(
          <div key={k} onClick={()=>setLogTab(k)}
            style={{padding:"8px 16px",fontWeight:700,fontSize:12,cursor:"pointer",borderBottom:"3px solid "+
              (logTab===k?NAVY:"transparent"),color:logTab===k?NAVY:"#64748b",marginBottom:"-2px",transition:"all .15s"}}>
            {lbl}
          </div>
        ))}
      </div>

      {/* MESSAGE TEAMS */}
      {logTab==="msg"&&(
        <div>
          <div style={{background:"#fffbeb",border:"1px solid #fde047",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#713f12",marginBottom:14,lineHeight:1.6}}>
            ⚠️ <strong>Texting is active 6 days prior to tournament through end of event.</strong><br/>
            Text messages (Subject + Body) are limited to <strong style={{color:smsOver?"#dc2626":"inherit"}}>80 characters max</strong> to work with all carriers.
            This page automatically includes team managers when sending messages.
          </div>
          <div className="g2" style={{gap:20,alignItems:"start"}}>

                  <div style={{display:"flex",gap:8}}>
                    <span onClick={selectAll} style={{color:"#93c5fd",fontSize:11,cursor:"pointer",fontWeight:600}}>All</span>
                    <span onClick={clearAll} style={{color:"#fca5a5",fontSize:11,cursor:"pointer",fontWeight:600}}>None</span>
                  </div>
                </div>
                <div style={{maxHeight:220,overflowY:"auto"}}>
                  {divOptions.length===0
                    ?<div style={{padding:"10px 12px",fontSize:12,color:"#94a3b8"}}>No divisions available</div>
                    :divOptions.map(d=>(
                      <div key={d} onClick={()=>toggleDiv(d)}
                        style={{padding:"8px 12px",fontSize:12,cursor:"pointer",
                          background:selDivs.has(d)?"#eff6ff":"#fff",

                        <span style={{width:14,height:14,borderRadius:3,border:"2px solid "+(selDivs.has(d)?"#2563eb":"#cbd5e1"),
                          background:selDivs.has(d)?"#2563eb":"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {selDivs.has(d)&&<span style={{color:"#fff",fontSize:9,fontWeight:900}}>✓</span>}
                        </span>
                        <span style={{fontWeight:selDivs.has(d)?700:400,color:selDivs.has(d)?"#1d4ed8":"#374151"}}>{d}</span>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
            {/* Message compose */}
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:13,color:NAVY,marginBottom:8}}>Compose Message</div>
              <div style={{marginBottom:10}}>

                  placeholder="Your message to team managers..."
                  style={{width:"100%",padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,resize:"vertical"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:12,fontWeight:700,color:smsOver?"#dc2626":"#64748b"}}>
                  {charCount}/80 SMS chars {smsOver&&"⚠️ Over limit — SMS may be split"}
                </span>
                <span style={{fontSize:11,color:"#94a3b8"}}>{selDivs.size} division(s) selected</span>
              </div>
              {msgSent&&<Alrt type="success">✅ Message sent to {selDivs.size} division(s) team managers!</Alrt>}
              <button onClick={sendMsg} disabled={!msgSubject.trim()||!msgBody.trim()||selDivs.size===0}
                style={{padding:"10px 24px",background:(!msgSubject.trim()||!msgBody.trim()||selDivs.size===0)?"#cbd5e1":"#16a34a",
                  color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:(!msgSubject.trim()||!msgBody.trim()||selDivs.size===0)?"not-allowed":"pointer"}}>
                📤 Send to Team Managers
              </button>
            </div>
          </div>
        </div>
      )}

      {/* EVENT INFO */}
      {logTab==="info"&&(
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card" style={{flex:1}}>
            <div className="card-hd"><span className="card-title">Event Contact</span></div>
            <div className="card-body">
              {[["Director",ev?.director||"Steve Hassett"],["Phone","(561) 555-0100"],["Email","director@usssa.com"],
                ["Location",ev?.loc||"Wellington, FL"],["State USSSA","Florida State Office"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",gap:12,padding:"7px 0",borderBottom:"1px solid var(--gray-m)"}}>

                  <div style={{fontSize:13}}>{v}</div>

      {/* DIRECTOR NOTES */}
      {logTab==="notes"&&(
        <div className="card">
          <div className="card-hd"><span className="card-title">📝 Director Notes</span></div>
          <div className="card-body">
            <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>
              Internal notes for event coordination. Not visible to teams.
            </div>
            <textarea value={note} onChange={e=>setNote(e.target.value)}
              style={{width:"100%",height:200,resize:"vertical",fontSize:13,lineHeight:1.6,
                padding:"10px",border:"1px solid #e2e8f0",borderRadius:6}}/>
            <button className="btn btn-green btn-sm mt2">💾 Save Notes</button>
          </div>
        </div>
      )}

      {/* AUDIT LOG */}
      {logTab==="logs"&&(
        <div>
          <div style={{fontWeight:800,fontSize:13,color:NAVY,marginBottom:12}}>📄 Logs Per Division</div>
          <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
              <thead>
                <tr style={{background:NAVY,color:"#fff"}}>
                  <th style={{padding:"8px 10px",fontWeight:700,textAlign:"left"}}>Timestamp</th>
                  <th style={{padding:"8px 10px",fontWeight:700,textAlign:"left"}}>Director</th>
                  <th style={{padding:"8px 10px",fontWeight:700}}>Flight</th>
                  <th style={{padding:"8px 10px",fontWeight:700,textAlign:"left"}}>Action</th>
                </tr>
              </thead>
              <tbody>
                {sampleLog.map((row,i)=>(
                  <tr key={i} style={{background:i%2===0?"#fff":"#f8fafc",borderTop:"1px solid #f1f5f9"}}>
                    <td style={{padding:"7px 10px",color:"#64748b",whiteSpace:"nowrap"}}>{row.ts}</td>
                    <td style={{padding:"7px 10px",fontWeight:600}}>{row.dir}</td>

                      <span style={{background:row.flight==="Bracket"?"#eff6ff":"#f0fdf4",
                        color:row.flight==="Bracket"?"#1d4ed8":"#15803d",

                    <td style={{padding:"7px 10px",color:"#374151"}}>{row.action}</td>

function FlightView({flight,divId,divCode,eventParks}){
  const teams=teamDB(divId);

  const [bg,setBg]=useState(bracketGamesDB(divId));
  const isPool=flight.type==="pool";
  const poolTabs=["standings","seeds","game-manager","layout","pitching","parks","umpires","live-lock","contact","pp-matrix"];
  const brkTabs=["bracket","game-manager","pool2bracket","placing","seeds","contact"];
  const activeTabs=isPool?poolTabs:brkTabs;
  const [tab,setTab]=useState(isPool?"standings":"bracket");
  const TL={standings:"📊 Standings",seeds:"🎯 Seeds","game-manager":"🗂 Game Manager",layout:"📐 Layout",pitching:"⚾ Pitching",parks:"🏟 Parks",umpires:"🟡 Umpires","live-lock":"🔒 Live & Lock",contact:"📞 Contact","pp-matrix":"🔢 PP Matrix",bracket:"🏆 Bracket","pool2bracket":"↗ Pool → Bracket",placing:"🥇 Placing"};
  return(
    <div>
      <div className="tabs">
        {activeTabs.map(t=>(
          <div key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>{TL[t]}</div>
        ))}
      </div>
      {tab==="standings"&&<StandingsView teams={teams} games={pg}/>}
      {tab==="seeds"&&<SeedsView teams={teams} divCode={divCode}/>}
      {tab==="game-manager"&&<GameMgrView games={isPool?pg:bg} setGames={isPool?setPg:setBg} teams={teams} readOnly={false}/>}
      {tab==="layout"&&<LayoutView games={isPool?pg:bg} setGames={isPool?setPg:setBg} teams={teams}/>}
      {tab==="pitching"&&<PitchingView teams={teams} games={pg}/>}
      {tab==="parks"&&<ParksView eventParks={eventParks}/>}
      {tab==="umpires"&&<UmpiresView/>}
      {tab==="live-lock"&&<LiveLockView/>}
      {tab==="contact"&&<ContactView/>}
      {tab==="pp-matrix"&&<PPMatrixView/>}
      {tab==="bracket"&&<BracketView bGames={bg} setBGames={setBg} teams={teams} editable={true}/>}
      {tab==="pool2bracket"&&<Pool2BracketView poolGames={pg} teams={teams}/>}
      {tab==="placing"&&<PlacingView bGames={bg} teams={teams}/>}
    </div>
  );
}

                    return<tr key={g.id}>
                      <td className="fw7">{g.num}</td>
                      <td>{g.pool&&<span className={`chip ${poolChipClass(g.pool)}`}>Pool {g.pool}</span>}</td>
                      <td className="t-sm">{g.date}</td><td className="t-sm">{g.time}</td>
                      <td className="t-sm t-gray">{g.field}</td>
                      <td style={{fontWeight:w===g.t1?700:400}}>{t1?.name||"—"}</td>
                      <td className="fw8" style={{textAlign:"center"}}>{g.s1!=null?`${g.s1} — ${g.s2}`:""}</td>
                      <td style={{fontWeight:w===g.t2?700:400}}>{t2?.name||"—"}</td>
                      <td><span className={`status ${g.status==="final"?"s-final":"s-scheduled"}`}>
                        {g.status==="final"?"✓ Final":"Scheduled"}
                      </span></td>
                    </tr>;
                  })}</tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      ):(
        <>
          <div className="card mb4">
            <div className="card-body" style={{padding:"14px 18px"}}>
              <div className="flex-b">
                <div>
                  <div style={{fontSize:19,fontWeight:900,color:"var(--navy)"}}>{ev.name}</div>
                  <div className="t-sm t-gray mt1">📍 {ev.loc} · 📅 {ev.date} · {ev.stature} · Director: {ev.director}</div>
                </div>
                <Ev_StatusBadge status={ev.status}/>
              </div>
            </div>
          </div>
          <div className="div-pills">
            {ev.divisions.map(d=>(
              <div key={d.id} className={`div-pill ${divId===d.id?"dp-on":"dp-off"}`}
                onClick={()=>{setDivId(d.id);setFlightId(null)}}>
                {d.label} <span style={{fontSize:10,opacity:.65,marginLeft:3}}>({d.teams}t)</span>
              </div>
            ))}
          </div>
          {div&&(
            <div>
              <div className="fl-tabs">
                {div.flights.map(f=>(
                  <div key={f.id}
                    className={`fl-tab ${(!flightId&&f===div.flights[0])||flightId===f.id?"on":""} ${f.live?"fl-live":""}`}
                    onClick={()=>setFlightId(f.id)}>
                    {f.type==="pool"?"🔵":"🏆"} {f.name}
                    <span style={{marginLeft:6,fontSize:10,opacity:.6}}>{f.status}</span>
                  </div>
                ))}
                <div className="fl-tab fl-add" style={{color:"var(--green)",borderColor:"var(--green)"}}>+ Add Pool Flight</div>
                <div className="fl-tab fl-add" style={{color:"var(--gold)",borderColor:"var(--gold)"}}>+ Add Bracket Flight</div>
              </div>
              {flight&&<FlightView flight={flight} divId={divId} divCode={div.code} eventParks={ev.parks}/>}
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ════════════════════ DASHBOARD ════════════════════ */
function Dashboard({events,onSelect,onNav}){
  const [stateF,setStateF]=useState("all");
  const [seasonF,setSeasonF]=useState("all");
  const [directorF,setDirectorF]=useState("all");
  const [statureF,setStatureF]=useState("all");
  const getYear=d=>{const m=d.match(/\d{4}/);return m?m[0]:null;};
  const seasons=[...new Set(events.map(e=>getYear(e.date)).filter(Boolean))].sort((a,b)=>b-a);
  const directors=[...new Set(events.map(e=>e.director).filter(Boolean))].sort();
  const statures=[...new Set(events.map(e=>e.stature).filter(Boolean))].sort();
  const shown=events.filter(e=>
    (stateF==="all"||e.state===stateF)&&
    (seasonF==="all"||getYear(e.date)===seasonF)&&
    (directorF==="all"||e.director===directorF)&&
    (statureF==="all"||e.stature===statureF)
  );
  const totalTeams=shown.reduce((a,ev)=>a+ev.divisions.reduce((b,d)=>b+d.teams,0),0);
  return(
    <div>
      <div className="g4 mb4">
        <div className="stat-card"><div className="stat-ico" style={{background:"#fde8e8"}}>📅</div><div><div className="stat-val">{shown.length}</div><div className="stat-lbl">Total Events</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d6eaf8"}}>⏳</div><div><div className="stat-val">{shown.filter(e=>e.status==="upcoming").length}</div><div className="stat-lbl">Upcoming</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d5f5e3"}}>✅</div><div><div className="stat-val">{shown.filter(e=>e.status==="complete").length}</div><div className="stat-lbl">Completed</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#fef5e7"}}>👥</div><div><div className="stat-val">{totalTeams}</div><div className="stat-lbl">Total Teams</div></div></div>
      </div>
      <div className="card">
        <div className="card-hd">
          <span className="card-title">Event Information — {shown.length} of {events.length} Results</span>
          <div className="flex-w gap-2">
            <select value={seasonF} onChange={e=>setSeasonF(e.target.value)}>
              <option value="all">All Seasons</option>
              {seasons.map(s=><option key={s} value={s}>Season: {s}</option>)}
            </select>
            <select value={stateF} onChange={e=>setStateF(e.target.value)}>
              <option value="all">All States</option>
              {[...new Set(events.map(e=>e.state))].sort().map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={directorF} onChange={e=>setDirectorF(e.target.value)}>
              <option value="all">All Directors</option>
              {directors.map(d=><option key={d}>{d}</option>)}
            </select>
            <select value={statureF} onChange={e=>setStatureF(e.target.value)}>
              <option value="all">All Statures</option>
              {statures.map(s=><option key={s}>{s}</option>)}
            </select>
            <button className="btn btn-primary btn-sm" onClick={()=>onNav("create")}>+ Create New Event</button>
          </div>
        </div>
        <div className="tbl-scroll">
          <table>
            <thead><tr>
              <th style={{width:14}}></th><th>Event ID</th><th>State</th><th>Start Date</th>
              <th>Event Name</th><th># Div</th><th>Teams</th><th>Stature</th><th>Director</th><th>Status</th>
            </tr></thead>
            <tbody>{shown.map(ev=>(
              <tr key={ev.id}>
                <td style={{paddingLeft:12}}><div style={{width:8,height:8,borderRadius:"50%",background:ev.status==="complete"?"var(--green)":ev.status==="live"?"var(--red)":"var(--blue)"}}/></td>
                <td className="fw7 t-sm">{ev.evid}</td>
                <td><span className="badge b-gray">{ev.state}</span></td>
                <td className="t-sm">{ev.date}</td>
                <td><span style={{color:"var(--blue)",cursor:"pointer",fontWeight:600}} onClick={()=>onSelect(ev)}>{ev.name}</span></td>
                <td className="t-sm">{ev.divisions.length}</td>
                <td className="t-sm">{ev.divisions.reduce((a,d)=>a+d.teams,0)}</td>
                <td className="t-sm">{ev.stature}</td>
                <td className="t-sm">{ev.director}</td>
                <td><Ev_StatusBadge status={ev.status}/></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ CREATE EVENT ════════════════════ */
const ALL_STATES=["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];
const AGES_WITH_CLASS=["5U","6U","7U","8U","9U","10U","11U","12U","13U","14U"];
const AGES_NO_CLASS=["15U","16U","17U","18U"];
const DIV_CLASSES=["A","AA","AAA","Major","Open"];
const STATURES=["All American Games - Baseball","Baseball World Series","Double State Qualifier","Elite World Series","Fall/Winter Nationals","Global State","Global World Series","Global WS Qualifier","Individual Event","League","League 2","Major Championship","NABC National Championship","One Day Event","Select - Baseball","Select Super NIT","Select Super Regional NIT","State Qualifier","Super NIT","Super Regional NIT","UACS Double Qualifier","UACS NIT","USSSA Fall State","USSSA NIT","USSSA State"];
const LWC_OPTIONS=[{v:"open",l:"Open — Accepting Entries"},{v:"waitlist",l:"Wait List"},{v:"closed",l:"Closed"},{v:"hold",l:"On Hold"}];
const EVENT_FORMATS=["Double Elimination","Single Elimination","Pool Play into Double Elimination","Pool Play into Single Elimination","Pool Play into 3GG","3GG - 3 Game Guarantee Bracket","Pool Play into Split Bracket Single Elim","Pool Play into Split Bracket Double Elim","Pool Play into Multiple Bracket","Round Robin","World Fastpitch Championship","Global World Series","Elite World Series","All American Games","League","TBA"];

function SectionHead({title}){
  return <div style={{fontWeight:700,fontSize:14,color:"#1a3a5c",textTransform:"uppercase",letterSpacing:1,margin:"24px 0 12px",paddingBottom:6,borderBottom:"2px solid #e8edf2"}}>{title}</div>;
}

function CreateEventView(){
  const [f,setF]=useState({
    name:"",sport:"Baseball",state:"FL",city:"",
    startDate:"",endDate:"",entryDeadline:"",stature:"Double State Qualifier",
    format:"Double Elimination",minGames:3,maxEntries:16,director:"",
    lodgingDirector:"",lwc:"open",divisions:[],
    quickDetails:"",advancedDesc:"",hotelInfo:"",
    alertEnabled:false,alertMsg:"",
    streamEnabled:false,streamURL:"",rainoutEmbed:"",
    entryFeeAmt:"",entryFeePublic:"",teamEntryOption:"online_only",
    gateFeeAmt:"",gateFeePublic:"",
    otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",
    refundPolicy:""
  });
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleDiv=d=>setF(p=>({...p,divisions:p.divisions.includes(d)?p.divisions.filter(x=>x!==d):[...p.divisions,d]}));

  function handleCreate(){
    if(!f.name.trim()){alert("Event Name is required.");return;}
    if(!f.startDate){alert("Start Date is required.");return;}
    if(!f.director.trim()){alert("Event Director is required.");return;}
    const newEvent={
      id:Date.now(),
      evid:String(Math.floor(410000+Math.random()*20000)),
      name:f.name.trim(),
      loc:`${f.city}, ${f.state}`,
      state:f.state, city:f.city,
      date:new Date(f.startDate).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),
      endDate:f.endDate, entryDeadline:f.entryDeadline, sport:f.sport, sanctionState:f.sanctionState,
      status:"upcoming", stature:f.stature, format:f.format, minGames:f.minGames, maxEntries:f.maxEntries, director:f.director.trim(),
      lodgingDirector:f.lodgingDirector, lwc:f.lwc,
      quickDetails:f.quickDetails, advancedDesc:f.advancedDesc, hotelInfo:f.hotelInfo,
      alertEnabled:f.alertEnabled, alertMsg:f.alertMsg,
      streamEnabled:f.streamEnabled, streamURL:f.streamURL, rainoutEmbed:f.rainoutEmbed,
      entryFeeAmt:f.entryFeeAmt, entryFeePublic:f.entryFeePublic, teamEntryOption:f.teamEntryOption,
      gateFeeAmt:f.gateFeeAmt, gateFeePublic:f.gateFeePublic,
      otherFeeAmt:f.otherFeeAmt, otherFeePublic:f.otherFeePublic, otherFeeDesc:f.otherFeeDesc,
      refundPolicy:f.refundPolicy,
      parks:[],
      divisions:f.divisions.map((d,i)=>({id:Date.now()+i,code:d.replace(/\s+/g,""),label:d,wl:"0-0-0",teams:0,flights:[]}))
    };
    dbSave('events',newEvent);
    alert(`Event "${newEvent.name}" created! Event ID: ${newEvent.evid}`);
    setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false,entryFeeAmt:"",entryFeePublic:"",gateFeeAmt:"",gateFeePublic:"",otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",refundPolicy:""}));
  }

  const inputStyle={width:"100%",padding:"7px 10px",border:"1px solid #cdd5df",borderRadius:4,fontSize:13};
  const labelStyle={display:"block",fontWeight:600,fontSize:12,color:"#4a5568",marginBottom:4,textTransform:"uppercase",letterSpacing:.5};
  const fieldWrap={display:"flex",flexDirection:"column"};
  const grid2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:16};
  const grid3={display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16};
  const toggleRow={display:"flex",alignItems:"center",gap:10,padding:"6px 0"};

  return(
    <div style={{maxWidth:900}}>
      <div className="card">
        <div className="card-hd"><span className="card-title">➕ Create New Event</span></div>
        <div className="card-body">

          <SectionHead title="Event Information"/>
          <div style={grid2}>
            <div style={{...fieldWrap,gridColumn:"1/-1"}}><label style={labelStyle}>Event Name *</label><input style={inputStyle} value={f.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Spring State Qualifier"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Sport</label>
              <select style={inputStyle} value={f.sport} onChange={e=>set("sport",e.target.value)}>
                <option>Baseball</option><option>Softball</option><option>Soccer</option>
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Stature</label>
              <select style={inputStyle} value={f.stature} onChange={e=>set("stature",e.target.value)}>
                {STATURES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Event Format</label>
              <select style={inputStyle} value={f.format} onChange={e=>set("format",e.target.value)}>
                {EVENT_FORMATS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Start Date *</label><input style={inputStyle} type="date" value={f.startDate} onChange={e=>set("startDate",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>End Date</label><input style={inputStyle} type="date" value={f.endDate} onChange={e=>set("endDate",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>Entry Deadline</label><input style={inputStyle} type="date" value={f.entryDeadline} onChange={e=>set("entryDeadline",e.target.value)}/></div>
            <div style={fieldWrap}><label style={labelStyle}>City / Location *</label><input style={inputStyle} value={f.city} onChange={e=>set("city",e.target.value)} placeholder="City"/></div>
            <div style={fieldWrap}><label style={labelStyle}>State *</label>
              <select style={inputStyle} value={f.state} onChange={e=>set("state",e.target.value)}>
                {ALL_STATES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Entry Policy</label>
              <select style={inputStyle} value={f.lwc} onChange={e=>set("lwc",e.target.value)}>
                {LWC_OPTIONS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Minimum Number of Games</label>
              <select style={inputStyle} value={f.minGames} onChange={e=>set("minGames",Number(e.target.value))}>
                {[2,3,4,5,6,7,8].map(n=><option key={n} value={n}>{n} Games</option>)}
              </select>
            </div>
            <div style={fieldWrap}><label style={labelStyle}>Maximum Entries per Division</label>
              <select style={inputStyle} value={f.maxEntries} onChange={e=>set("maxEntries",Number(e.target.value))}>
                {[3,4,5,6,7,8,9,10,12,14,16,18,20,24,28,32,40,48,56,64].map(n=><option key={n} value={n}>{n} Teams</option>)}
              </select>
            </div>
          </div>

          <SectionHead title="Directors"/>
          <div style={grid2}>
            <div style={fieldWrap}><label style={labelStyle}>Event Director *</label><input style={inputStyle} value={f.director} onChange={e=>set("director",e.target.value)} placeholder="Director full name"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Lodging Director</label><input style={inputStyle} value={f.lodgingDirector} onChange={e=>set("lodgingDirector",e.target.value)} placeholder="Lodging contact (optional)"/></div>
          </div>

          <SectionHead title="Age Divisions"/>
          <div style={{overflowX:"auto",marginBottom:8}}>
            <table style={{borderCollapse:"collapse",fontSize:13,width:"auto"}}>
              <thead>
                <tr>
                  <th style={{padding:"6px 14px",background:"#1a3a5c",color:"#fff",textAlign:"left",borderRadius:"4px 0 0 0",fontWeight:700,fontSize:12,letterSpacing:.5}}>Age</th>
                  {DIV_CLASSES.map(c=><th key={c} style={{padding:"6px 20px",background:"#1a3a5c",color:"#fff",textAlign:"center",fontWeight:700,fontSize:12,letterSpacing:.5,minWidth:60}}>{c}</th>)}
                </tr>
              </thead>
              <tbody>
                {AGES_WITH_CLASS.map((age,i)=>(
                  <tr key={age} style={{background:i%2===0?"#f8fafc":"#fff"}}>
                    <td style={{padding:"7px 14px",fontWeight:700,color:"#1a3a5c",borderRight:"1px solid #e2e8f0",whiteSpace:"nowrap"}}>{age}</td>
                    {DIV_CLASSES.map(cls=>{
                      const key=`${age} ${cls}`;
                      const sel=f.divisions.includes(key);
                      return(
                        <td key={cls} style={{padding:"7px 20px",textAlign:"center",border:"1px solid #e2e8f0"}}>
                          <input type="checkbox" checked={sel} onChange={()=>toggleDiv(key)}
                            style={{width:16,height:16,cursor:"pointer",accentColor:"#1a3a5c"}}/>
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {AGES_NO_CLASS.map((age,i)=>(
                  <tr key={age} style={{background:(AGES_WITH_CLASS.length+i)%2===0?"#f8fafc":"#fff"}}>
                    <td style={{padding:"7px 14px",fontWeight:700,color:"#1a3a5c",borderRight:"1px solid #e2e8f0"}}>{age}</td>
                    <td colSpan={5} style={{padding:"7px 20px",textAlign:"center",border:"1px solid #e2e8f0",color:"#888",fontSize:12}}>
                      <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                        <input type="checkbox" checked={f.divisions.includes(age)} onChange={()=>toggleDiv(age)}
                          style={{width:16,height:16,cursor:"pointer",accentColor:"#1a3a5c"}}/>
                        <span>Single Age Division</span>
                      </label>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {f.divisions.length>0&&<div style={{fontSize:12,color:"#1a3a5c",fontWeight:600,marginBottom:4}}>
            {f.divisions.length} selected: {f.divisions.join(" · ")}
          </div>}

          <SectionHead title="Event Details"/>
          <div style={{display:"grid",gap:14}}>
            <div style={fieldWrap}><label style={labelStyle}>Quick Details</label><input style={inputStyle} value={f.quickDetails} onChange={e=>set("quickDetails",e.target.value)} placeholder="Short summary shown on public event listing"/></div>
            <div style={fieldWrap}><label style={labelStyle}>Advanced Description</label><textarea style={{...inputStyle,resize:"vertical"}} rows={4} value={f.advancedDesc} onChange={e=>set("advancedDesc",e.target.value)} placeholder="Full event description, rules, special notes..."/></div>
            <div style={fieldWrap}><label style={labelStyle}>Hotel Information</label><textarea style={{...inputStyle,resize:"vertical"}} rows={3} value={f.hotelInfo} onChange={e=>set("hotelInfo",e.target.value)} placeholder="Hotel partner info, discount codes, booking links..."/></div>
          </div>

          <SectionHead title="Fees & Payments"/>
          <div style={{display:"grid",gap:16,marginBottom:8}}>
            <div style={grid3}>
              <div style={fieldWrap}>
                <label style={{...labelStyle,color:"#c0392b"}}>Entry Fee Amount *</label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:15,color:"#4a5568"}}>$</span>
                  <input style={inputStyle} type="number" min="0" step="0.01" value={f.entryFeeAmt} onChange={e=>set("entryFeeAmt",e.target.value)} placeholder="0.00"/>
                </div>
              </div>
              <div style={fieldWrap}>
                <label style={{...labelStyle,color:"#c0392b"}}>Entry Fees Displayed to Public *</label>
                <input style={inputStyle} value={f.entryFeePublic} onChange={e=>set("entryFeePublic",e.target.value)} placeholder='e.g. "$395 per team"'/>
              </div>
              <div style={fieldWrap}>
                <label style={{...labelStyle,color:"#c0392b"}}>Team Entry Options *</label>
                <select style={inputStyle} value={f.teamEntryOption} onChange={e=>set("teamEntryOption",e.target.value)}>
                  <option value="cc_only">Allow credit card entries only</option>
                  <option value="with_or_without">Allow entries with or without payment</option>
                </select>
              </div>
            </div>
            <div style={grid3}>
              <div style={fieldWrap}>
                <label style={labelStyle}>Gate Fee Amount <span style={{color:"#888",fontWeight:400}}>(Optional)</span></label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:15,color:"#4a5568"}}>$</span>
                  <input style={inputStyle} type="number" min="0" step="0.01" value={f.gateFeeAmt} onChange={e=>set("gateFeeAmt",e.target.value)} placeholder="0.00"/>
                </div>
              </div>
              <div style={fieldWrap}>
                <label style={labelStyle}>Gate Fees Displayed to Public</label>
                <input style={inputStyle} value={f.gateFeePublic} onChange={e=>set("gateFeePublic",e.target.value)} placeholder='e.g. "$5 adults, kids free"'/>
              </div>
            </div>
            <div style={grid3}>
              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fee Amount <span style={{color:"#888",fontWeight:400}}>(Optional)</span></label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:15,color:"#4a5568"}}>$</span>
                  <input style={inputStyle} type="number" min="0" step="0.01" value={f.otherFeeAmt} onChange={e=>set("otherFeeAmt",e.target.value)} placeholder="0.00"/>
                </div>
              </div>
              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fees Displayed to Public</label>
                <input style={inputStyle} value={f.otherFeePublic} onChange={e=>set("otherFeePublic",e.target.value)} placeholder="Public description of other fee"/>
              </div>
              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fee Description <span style={{color:"#888",fontWeight:400}}>(Optional)</span></label>
                <input style={inputStyle} value={f.otherFeeDesc} onChange={e=>set("otherFeeDesc",e.target.value)} placeholder="Internal note on other fee"/>
              </div>
            </div>
            <div style={fieldWrap}>
              <label style={{...labelStyle,color:"#c0392b"}}>Refund Policy Notes *</label>
              <textarea style={{...inputStyle,resize:"vertical"}} rows={3} value={f.refundPolicy} onChange={e=>set("refundPolicy",e.target.value)} placeholder="Describe your refund policy for teams..."/>
            </div>
          </div>

          <SectionHead title="Alerts & Features"/>
          <div style={{display:"grid",gap:12}}>
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.alertEnabled} onChange={e=>set("alertEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Alert Message</span>
            </label>
            {f.alertEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.alertMsg} onChange={e=>set("alertMsg",e.target.value)} placeholder="Alert message shown to teams on this event..."/></div>}
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.streamEnabled} onChange={e=>set("streamEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Live Streaming</span>
            </label>
            {f.streamEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.streamURL} onChange={e=>set("streamURL",e.target.value)} placeholder="Live stream URL..."/></div>}
            <div style={fieldWrap}><label style={labelStyle}>Rainout Line Embed</label><input style={inputStyle} value={f.rainoutEmbed} onChange={e=>set("rainoutEmbed",e.target.value)} placeholder="Rainout line embed code or URL"/></div>
          </div>

          <div style={{marginTop:28,display:"flex",gap:12}}>
            <button className="btn btn-primary" onClick={handleCreate}>✓ Create Event</button>
            <button className="btn btn-secondary" onClick={()=>setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false,entryFeeAmt:"",entryFeePublic:"",gateFeeAmt:"",gateFeePublic:"",otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",refundPolicy:""}))}>✕ Clear Form</button>
          </div>

        </div>
      </div>
    </div>
  );
}

/* ════════════════════ SIDEBAR NAV ════════════════════ */
const NAV=[
  {sec:"Management",items:[
    {id:"events",ico:"📅",label:"Event Management"},
    {id:"create",ico:"➕",label:"Create Event"},
  ]},
  {sec:"Scheduling Tools",items:[
    {id:"s-game-mgr",ico:"🗂",label:"Game Manager"},
    {id:"s-layout",ico:"📐",label:"Layout Builder"},
    {id:"s-bracket",ico:"🏆",label:"Brackets"},
    {id:"s-standings",ico:"📊",label:"Pool Standings"},
  ]},
  {sec:"Setup",items:[
    {id:"s-seeds",ico:"🎯",label:"Seeding"},
    {id:"s-parks",ico:"🏟",label:"Parks & Fields"},
    {id:"s-umpires",ico:"🟡",label:"Umpires"},
    {id:"s-pitching",ico:"⚾",label:"Pitching"},
    {id:"s-ppmatrix",ico:"🔢",label:"Pool Matrix"},
  ]},
  {sec:"Reports & Tools",items:[
    {id:"s-placing",ico:"🥇",label:"Final Placing"},
    {id:"s-rosters",ico:"👥",label:"Rosters"},
    {id:"s-livelock",ico:"🔒",label:"Live & Lock"},
  ]},
  {sec:"Public",items:[
    {id:"s-public",ico:"👁",label:"Public Fan View"},
  ]},
];
const SHORTCUT_IDS=new Set(NAV.flatMap(s=>s.items).map(i=>i.id).filter(i=>i.startsWith("s-")));

function ShortcutHint({id}){
  const labels={"s-game-mgr":["🗂","Game Manager","View/edit game assignments, swap teams, enter scores. Access via: Events → Event → Division → Pool Flight → Game Manager tab."],"s-layout":["📐","Layout Builder","Visual time-slot grid. Set fields, game durations, block times. Access via: Events → Event → Division → Pool Flight → Layout tab."],"s-bracket":["🏆","Brackets","Single/double elimination bracket management. Access via: Events → Event → Division → Bracket Flight → Bracket tab."],"s-standings":["📊","Pool Standings","Real-time W/L/T, PF/PA, run differential. Access via: Events → Event → Division → Pool Flight → Standings tab."],"s-seeds":["🎯","Seeding","USSSA Points + Power Rating seeding table. Access via: Events → Event → Division → Flight → Seeds tab."],"s-parks":["🏟","Parks & Fields","Select and assign tournament parks. Access via: Events → Event → Division → Flight → Parks tab."],"s-umpires":["🟡","Umpires","Assign certified umpires to games. Access via: Events → Event → Division → Flight → Umpires tab."],"s-pitching":["⚾","Pitching Tracker","Pitch counts and rest requirements by age group. Access via: Events → Event → Division → Pool Flight → Pitching tab."],"s-ppmatrix":["🔢","Pool Matrix","Serpentine seeding matrix calculator. Access via: Events → Event → Division → Flight → PP Matrix tab."],"s-placing":["🥇","Final Placing","Division champion and runner-up display. Access via: Events → Event → Division → Bracket Flight → Placing tab."],"s-rosters":["👥","Rosters","Team rosters for any division. Access via: Events → Event → Division → Flight → Contact tab."],"s-livelock":["🔒","Live & Lock Settings","Control public visibility and lock events. Access via: Events → Event → Division → Flight → Live & Lock tab."],"s-public":["👁","Public Fan View","Toggle any event to Public Fan View mode using the view toggle in the event detail page."]};
  const info=labels[id];
  if(!info)return null;
  const [ico,title,desc]=info;
  return(
    <div className="card">
      <div className="card-body" style={{textAlign:"center",padding:"50px 28px"}}>
        <div style={{fontSize:48,marginBottom:10}}>{ico}</div>
        <div style={{fontSize:17,fontWeight:800,color:"var(--navy)",marginBottom:6}}>{title}</div>
        <div style={{fontSize:13,color:"var(--gray)",maxWidth:420,margin:"0 auto",lineHeight:1.6}}>{desc}</div>
        <div style={{marginTop:20,padding:"12px 16px",background:"var(--blue-l)",borderRadius:8,fontSize:12,color:"var(--blue)",fontWeight:600}}>
          💡 Tip: All scheduling tools are available inline when you open an event and navigate to a specific division and flight.
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ APP ROOT ════════════════════ */
function App(){
  const [view,setView]=useState("events");
  const [selEv,setSelEv]=useState(null);
  const [events,setEvents]=useState(EVENTS_DB);
  const [allGames,setAllGames]=useState([...PG8,...PG9,...PG12]);
  const [allBracketGames,setAllBracketGames]=useState([...BG8,...BG9]);
  const [dbStatus,setDbStatus]=useState('connecting');
  const [liveDiv,setLiveDiv]=useState({status:'idle',updatedAt:null});
  useEffect(()=>{
    (async()=>{
      const rows=await dbLoad('events');
      if(rows&&rows.length>0){
        const merged=[...EVENTS_DB];
        rows.forEach(r=>{
          if(!merged.find(e=>String(e.id)===String(r.id)))
            merged.push({...r,divisions:r.divisions||[]});
        });
        setEvents(merged);
        setDbStatus('connected');
      }else{
        setDbStatus(rows!==null?'connected':'offline');
      }
    })();
  },[]);
  useEffect(()=>{
    setLiveDiv({status:'loading',updatedAt:null});
    fetch('https://usssa-poller.chad-157.workers.dev/divisions')
      .then(r=>r.json())
      .then(data=>{
        if(data.status==='ok'&&data.divisions){
          setEvents(prev=>prev.map(ev=>{
            const live=data.divisions[String(ev.id)];
            if(live&&live.length>0)return{...ev,divisions:live};
            return ev;
          }));
          setLiveDiv({status:'loaded',updatedAt:data.updatedAt,source:data.source});
        }else{
          setLiveDiv({status:'error',updatedAt:null});
        }
      })
      .catch(()=>setLiveDiv({status:'error',updatedAt:null}));
  },[]);
  function nav(id){setView(id);if(id==="events")setSelEv(null)}
  function selectEvent(ev){setSelEv(ev);setView("event-detail")}
  const title=()=>{
    if(view==="event-detail"&&selEv)return selEv.name;
    if(view==="create")return "Create New Event";
    return NAV.flatMap(s=>s.items).find(i=>i.id===view)?.label||"USSSA Tournament Manager";
  };
  const sub=()=>view==="event-detail"&&selEv?`${selEv.loc} · ${selEv.date}`:null;
  return(
    <div className="app">
      <nav className="sidebar">
        <div className="sb-logo">
          <div className="brand">USSSA</div>
          <div className="sub">Tournament Manager</div>
        </div>
        {NAV.map(s=>(
          <div key={s.sec} className="sb-sec">
            <div className="sb-lbl">{s.sec}</div>
            {s.items.map(item=>(
              <div key={item.id}
                className={`sb-item ${view===item.id||(item.id==="events"&&view==="event-detail")?"active":""}`}
                onClick={()=>nav(item.id)}>
                <span className="ico">{item.ico}</span>{item.label}
              </div>
            ))}
          </div>
        ))}
        <div className="sb-user">
          <div style={{fontSize:10,color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:.8}}>Signed in as</div>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",marginTop:2}}>Steve Hassett</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>steve@utproducts.com</div>
        </div>
      </nav>
      <main className="main">
        <div className="topbar">
          <div>
            <div className="tb-title">{title()}</div>
            {sub()&&<div className="tb-sub">{sub()}</div>}
          </div>
          <div className="tb-right">
            <span className={`badge ${dbStatus==='connected'?'b-green':dbStatus==='connecting'?'b-gold':'b-red'}`} style={{fontSize:10}}>{dbStatus==='connected'?'● DB Connected':dbStatus==='connecting'?'◌ Connecting...':'○ Offline (Demo)'}</span>
            {liveDiv.status==='loading'&&<span className="badge b-gold" style={{fontSize:10}}>⟳ Divisions loading…</span>}
            {liveDiv.status==='loaded'&&<span className="badge b-green" title={`Source: ${liveDiv.source} · Updated: ${new Date(liveDiv.updatedAt).toLocaleTimeString()}`} style={{fontSize:10}}>● Divisions live</span>}
            {liveDiv.status==='error'&&<span className="badge b-red" style={{fontSize:10}}>○ Divisions offline</span>}
            <span className="badge b-gray" style={{fontSize:10}}>2026 Season</span>
            {view!=="create"&&<button className="btn btn-primary btn-sm" onClick={()=>nav("create")}>+ New Event</button>}
          </div>
        </div>
        <div className="content">
          {view==="events"&&<Dashboard events={events} onSelect={selectEvent} onNav={nav}/>}
          {view==="event-detail"&&selEv&&<EventDetailView ev={selEv} onBack={()=>nav("events")}/>}
          {view==="create"&&<CreateEventView/>}
          {view==="s-game-mgr"&&<GameMgrView games={allGames} setGames={setAllGames} teams={ALL_TEAMS}/>}
          {view==="s-layout"&&<LayoutView games={allGames} setGames={setAllGames} teams={ALL_TEAMS}/>}
          {view==="s-bracket"&&<BracketView bGames={allBracketGames} setBGames={setAllBracketGames} teams={ALL_TEAMS} games={allGames} editable={true}/>}
          {view==="s-standings"&&<StandingsView teams={ALL_TEAMS} games={allGames}/>}
          {view==="s-seeds"&&<SeedsView teams={ALL_TEAMS}/>}
          {view==="s-parks"&&<ParksView eventParks={[]}/>}
          {view==="s-umpires"&&<UmpiresView/>}
          {view==="s-pitching"&&<PitchingView teams={ALL_TEAMS} games={allGames}/>}
          {view==="s-ppmatrix"&&<PPMatrixView/>}
          {view==="s-placing"&&<PlacingView bGames={allBracketGames} teams={ALL_TEAMS}/>}
          {view==="s-livelock"&&<LiveLockView/>}
          {SHORTCUT_IDS.has(view)&&!["s-game-mgr","s-layout","s-bracket","s-standings","s-seeds","s-parks","s-umpires","s-pitching","s-ppmatrix","s-placing","s-livelock"].includes(view)&&<ShortcutHint id={view}/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
